              <div className="text-xs text-slate-500 mt-0.5">
                依檔名模式：以下是從 {total} 張圖的檔名抽出的欄位 (idx)。確認無誤再繼續；若有異常，請修正檔名後重新上傳。
              </div>
            </div>
            <div className="px-5 py-4 space-y-3 text-sm">
              <div className="text-xs text-slate-500">
                偵測到 <b className="text-slate-700">{idxList.length}</b> 欄 · <b className="text-slate-700">{groups.length}</b> 個 SN(列)
              </div>
              {idxList.length === 0 ? (
                <div className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded p-2">
                  ⚠ 從檔名抽不到任何 idx — 請確認「對位用哪一段」的分段選取，或檔名格式。
                </div>
              ) : (
                <div className="flex flex-wrap gap-1.5">
                  {sortedIdx.map((s) => (
                    <span key={s} className="inline-flex items-center gap-1 px-2 py-0.5 rounded border bg-white border-sky-300 text-sky-800 text-xs font-mono">
                      {s}<span className="text-[10px] text-slate-400">×{counts[s]}</span>
                    </span>
                  ))}
                </div>
              )}
              {caseDupes.length > 0 && (
                <div className="text-[11px] text-amber-800 bg-amber-50 border border-amber-200 rounded px-2 py-1">
                  ⚠ 只差大小寫、會被當成不同欄(可能是檔名打錯)：
                  <span className="font-mono font-semibold"> {caseDupes.map((a) => a.join(" / ")).join("、")}</span>
                </div>
              )}
              {noIdx.length > 0 && (
                <div className="text-[11px] text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1">

                className="text-sm px-4 py-1.5 rounded-lg bg-sky-600 hover:bg-sky-700 text-white font-medium disabled:opacity-40 disabled:cursor-not-allowed">✓ 確認無誤，繼續</button>

    // Excel 儲存格錯誤值（#VALUE! #REF! …）—— 範本圖片區若殘留這些，多半是上次內嵌圖片(DISPIMG)
    //   算壞留下的，會干擾表頭偵測 / 貼圖 / 匯出 → 視為「髒範本」擋下。
    const EXCEL_ERR_RE = /^#(VALUE|REF|DIV\/0|N\/A|NAME\?|NULL|NUM|SPILL|CALC|GETTING_DATA)!?$/i;

    // 防呆：載入的 xlsx 範本資料區有殘留內容 → 阻擋對話框，要求換乾淨範本（可選擇仍要使用）
    function DirtyTemplateModal({ cells, onUseAnyway, onCancel }) {
      const cancelRef = useRef(null);
      const has = !!(cells && cells.length);
      // 開啟時焦點移到「取消載入」(否則焦點還在 file input → Enter 會再觸發載入)；
      //   Enter / Esc 都＝取消載入(安全動作)。「仍要使用」(用髒範本)只能用點的，不綁鍵。
      useEffect(() => {
        if (!has) return;
        if (cancelRef.current) cancelRef.current.focus();
        const onKey = (e) => {
          if (e.key === "Enter" || e.key === "Escape") { e.preventDefault(); onCancel(); }
        };
        document.addEventListener("keydown", onKey);
        return () => document.removeEventListener("keydown", onKey);
      }, [has]);
      if (!has) return null;
      const errN = cells.filter((c) => EXCEL_ERR_RE.test(String(c.text ?? "").trim())).length;
      const colL = (n) => { let s = ""; while (n > 0) { s = String.fromCharCode(65 + (n - 1) % 26) + s; n = Math.floor((n - 1) / 26); } return s; };
      const sample = cells.slice(0, 8).map((c) => `${colL(c.c)}${c.r}=${c.text}`).join("、");
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4">
          <div className="bg-white rounded-xl shadow-2xl max-w-lg w-full" onClick={(e) => e.stopPropagation()}>
            <div className="px-5 py-4 border-b bg-gradient-to-r from-amber-50 to-white rounded-t-xl">
              <div className="text-base font-semibold text-amber-800">⚠ 此範本含殘留內容，可能導致錯誤</div>
            </div>
            <div className="px-5 py-4 space-y-2 text-sm text-slate-700">
              <p>範本的「資料區（表頭以下）」偵測到 <b className="text-amber-700">{cells.length}</b> 個非空儲存格
                {errN > 0 && <>（含 <b className="text-amber-700">{errN}</b> 個錯誤值 <span className="font-mono">#VALUE!</span>，多為內嵌圖片殘留）</>}。
                乾淨範本此區應全部留空，由程式自動填入 SN 與圖片。</p>
              <p>殘留內容（如預填的 SN <span className="font-mono">2EG/2JG</span> 或 <span className="font-mono">#VALUE!</span>）會干擾表頭偵測、自動對位與匯出結果。</p>
              <div className="text-[11px] text-slate-500 bg-slate-50 border rounded px-2 py-1 font-mono break-all">{sample}{cells.length > 8 ? " …" : ""}</div>
              <p className="text-[13px]"><b>建議</b>：改用「只保留表頭＋框線、資料區全空」的乾淨範本，再重新載入。</p>
            </div>
            <div className="px-5 py-3 border-t flex justify-end gap-2 bg-slate-50 rounded-b-xl">
              <button onClick={onUseAnyway}
                className="text-sm px-3 py-1.5 rounded-lg border bg-white hover:bg-slate-100 text-slate-500">仍要使用</button>
              <button ref={cancelRef} onClick={onCancel}
                className="text-sm px-4 py-1.5 rounded-lg bg-amber-600 hover:bg-amber-700 text-white font-medium">取消載入，換範本</button>
            </div>
          </div>
        </div>
      );
    }

    function NumberInput({ label, value, onChange, step = 0.5, suffix, disabled, hint }) {
      return (
        <label className={`flex flex-col text-xs ${disabled ? "text-slate-400" : "text-slate-600"}`}>
          <span className="mb-1">{label}</span>
          <div className="relative">
            <input type="number" step={step} value={value} disabled={disabled}
              onChange={(e) => onChange(parseFloat(e.target.value) || 0)}
              title={hint}
              className={`border rounded px-2 py-1 text-sm w-full pr-7 ${disabled ? "bg-slate-100 cursor-not-allowed" : ""}`} />
            {suffix && <span className="absolute right-2 top-1.5 text-[10px] text-slate-400">{suffix}</span>}
          </div>
          {hint && disabled && <span className="text-[10px] text-sky-700 mt-0.5">{hint}</span>}
        </label>
      );
    }

    // 設定檔配方 (recipe) 管理：下拉選擇 / 儲存 / 匯出 / 匯入
    // 內含範本：存成 .ibp (zip)；舊版 .json 仍可讀
    function ConfigPanel({ cfg, setCfg, tplName, tplPath, setTplName, setTplPath, ws, setStatus, loadTemplateByPath, confirmAndReset, selectedName, setSelectedName, onClose }) {
      const [configs, setConfigs] = useState([]);
      const fileInputRef = useRef(null);

      const refreshList = async () => {
        try {
          const r = await fetch("/api/configs");
          const j = await r.json();
          setConfigs(j.configs || []);
        } catch (e) { /* ignore */ }
      };
      useEffect(() => { refreshList(); }, []);

      const doSave = async (overrideName) => {
        const defaultName = overrideName ?? selectedName ?? "";
        const name = prompt("配置名稱 (中英數、空白、底線、減號)", defaultName || "我的配置");
        if (!name) return;
        const recipe = cfgToRecipe(cfg, tplName);
        const r = await fetch("/api/configs", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, recipe, templatePath: tplPath || "" }),
        });
        const j = await r.json();
        if (!r.ok) { setStatus("錯誤: " + (j.error || "存檔失敗")); return; }
        const tag = j.hasTemplate ? "（含範本）" : "（不含範本）";
        setStatus(`✓ 已儲存配置「${j.name}」${tag}`);
        setSelectedName(j.name);
        await refreshList();
      };

      const doLoad = async (name) => {
        if (!name) return;
        try {
          const url = `/api/configs/${encodeURIComponent(name)}` + (ws ? `?workspace=${encodeURIComponent(ws)}` : "");
          const r = await fetch(url);
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "載入失敗");
          const apply = () => {
            setCfg((c) => applyRecipe(j, c));
            setSelectedName(name);
            const loaded = j._loaded || {};
            if (loaded.templatePath && loadTemplateByPath) {
              loadTemplateByPath(loaded.templatePath, loaded.templateName || "")
                .then(() => setStatus(`✓ 已載入「${name}」（範本一併載入）`))
                .catch(() => {});
            } else {
              const hint = j._meta?.templateHint;
              setStatus(`✓ 已載入「${name}」${hint ? `（提醒：請重新上傳範本「${hint}」+ 相關來源）` : "（請重新上傳範本與來源）"}`);
            }
          };
          if (confirmAndReset) {
            const ok = confirmAndReset(`載入配置「${name}」`, apply);
            if (!ok) setSelectedName("");  // 取消 → 還原下拉選擇
          } else {
            apply();
          }
        } catch (e) { setStatus("錯誤: " + e.message); }
      };

      const doDelete = async () => {
        if (!selectedName) return;
        if (!confirm(`確定刪除配置「${selectedName}」？`)) return;
        const r = await fetch(`/api/configs/${encodeURIComponent(selectedName)}`, { method: "DELETE" });
        const j = await r.json();
        if (!r.ok) { setStatus("錯誤: " + (j.error || "刪除失敗")); return; }
        setStatus(`✓ 已刪除「${selectedName}」`);
        setSelectedName("");
        await refreshList();
      };

      const doExport = () => {
        if (!selectedName) {
          setStatus("請先儲存配置，再匯出");
          return;
        }
        // 透過 server 端點下載完整 .ibp (含範本)
        window.location.href = `/api/configs/${encodeURIComponent(selectedName)}/download`;
      };

      const doImport = async (file) => {
        if (!file) return;
        try {
          const fd = new FormData();
          fd.append("file", file);
          const r = await fetch("/api/configs/import", { method: "POST", body: fd });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "匯入失敗");
          await refreshList();
          // 匯入後自動載入
          await doLoad(j.name);
        } catch (e) { setStatus("錯誤: 匯入失敗 — " + e.message); }
      };

      return (
        <div className="p-2 space-y-1.5">
          <div className="text-xs font-medium text-slate-700">📁 配置</div>

          {/* 載入：下拉選一個就直接套用 */}
          <select value={selectedName}
            onChange={(e) => { setSelectedName(e.target.value); if (e.target.value) { doLoad(e.target.value); onClose?.(); } }}
            title="選擇要載入的設定"
            className="w-full border rounded px-2 py-1 text-xs">
            <option value="">— 未選擇 —</option>
            {configs.map((c) => (
              <option key={c.name} value={c.name}>{c.name}</option>
            ))}
          </select>

          {/* 儲存：永遠彈出對話框問名字（預設帶目前選的） */}
          <button onClick={() => doSave(selectedName)}
            title={selectedName ? `存成新名稱或覆蓋「${selectedName}」` : "把目前 UI 設定存到 server"}
            className="w-full border rounded px-2 py-1 text-xs bg-emerald-50 hover:bg-emerald-100 text-emerald-800 border-emerald-300">
            💾 儲存當前設定
          </button>

          {/* 刪除：只在選了既有配置時顯示 */}
          {selectedName && (
            <button onClick={doDelete}
              className="w-full border rounded px-2 py-1 text-xs text-red-700 border-red-300 hover:bg-red-50">
              🗑️ 刪除「{selectedName}」
            </button>
          )}

          {/* 跨機器搬遷：小字 */}
          <div className="flex gap-2 text-[10px] text-slate-500 pt-1 border-t">
            <button onClick={doExport} className="hover:text-slate-700 hover:underline" title="匯出選中配置為 .ibp 檔 (含範本，給別台機器或同事用)">
              ⤓ 匯出 .ibp
            </button>
            <span className="text-slate-300">|</span>
            <button onClick={() => fileInputRef.current?.click()} className="hover:text-slate-700 hover:underline" title="從 .ibp / .json 檔匯入設定">
              ⤒ 匯入 .ibp
            </button>
            <input ref={fileInputRef} type="file" accept=".ibp,.json,application/json,application/zip"
              className="hidden"
              onChange={(e) => { doImport(e.target.files?.[0]); e.target.value = ""; }} />
          </div>
        </div>
      );
    }

    // Stepper：◀ value ▶ 或 ▲ value ▼。
    // 按下立即觸發；按住 350ms 後每 60ms 重複；Shift=粗、Alt=細、點數字可 inline 編輯。
    // 寬度固定避免 layout shift。
    function Stepper({ label, value, onChange, step = 0.5, suffix = "%", orient = "h" }) {
      const isH = orient === "h";
      const [editing, setEditing] = useState(false);
      const valueRef = useRef(value);
      valueRef.current = value;
      const holdTimers = useRef({ delay: null, repeat: null });

      const apply = (dir, e) => {
        const k = e && e.shiftKey ? 5 : e && e.altKey ? 0.2 : 1;
        const next = Math.round((valueRef.current + dir * step * k) * 100) / 100;
        onChange(next);
      };

      const startHold = (dir, e) => {
        apply(dir, e);  // 立即一次
        // 保留 modifier 狀態給 repeat 用
        const snapshot = { shiftKey: e.shiftKey, altKey: e.altKey };
        holdTimers.current.delay = setTimeout(() => {
          holdTimers.current.repeat = setInterval(() => apply(dir, snapshot), 60);
        }, 350);
      };
      const stopHold = () => {
        clearTimeout(holdTimers.current.delay);
        clearInterval(holdTimers.current.repeat);
        holdTimers.current.delay = null;
        holdTimers.current.repeat = null;
      };

      // 統一按鈕大小：48×40 px（w-12 h-10）
      const Btn = ({ dir, children }) => (
        <button
          onMouseDown={(e) => { e.preventDefault(); startHold(dir, e); }}
          onMouseUp={stopHold} onMouseLeave={stopHold}
          onTouchStart={(e) => { e.preventDefault(); startHold(dir, e.touches[0] || {}); }}
          onTouchEnd={stopHold}
          title="Shift=粗(×5) / Alt=細(×0.2) / 長按連續"
          className="w-9 h-9 flex items-center justify-center hover:bg-slate-200 text-slate-700 select-none">
          {children}
        </button>
      );

      // 顯示數字 — 固定寬度避免 layout shift
      const display = (
        <div className={`text-center text-xs ${isH ? "w-14" : "w-10"} flex flex-col justify-center`}
          style={{ minHeight: 36 }}>
          <div className="text-[10px] text-slate-400 leading-none mb-0.5">{label}</div>
          {editing ? (
            <input autoFocus type="number" step={step} value={value}
              onChange={(e) => onChange(parseFloat(e.target.value) || 0)}
              onBlur={() => setEditing(false)}
              onKeyDown={(e) => { if (e.key === "Enter") setEditing(false); }}
              className="w-12 mx-auto border rounded px-1 text-xs text-center" />
          ) : (
            <button onClick={() => setEditing(true)}
              className="tabular-nums font-medium hover:underline text-[11px]">
              {Math.round((value || 0) * 10) / 10}<span className="text-slate-400 text-[10px]">{suffix}</span>
            </button>
          )}
        </div>
      );

      return (
        <div className={`bg-slate-50 border border-slate-300 rounded-lg shadow-sm overflow-hidden ${isH
            ? "flex items-center"
            : "flex flex-col items-center w-10"}`}>
          <Btn dir={-1}>{isH ? "◀" : "▲"}</Btn>
          {display}
          <Btn dir={+1}>{isH ? "▶" : "▼"}</Btn>
        </div>
      );
    }

    // 依範本 SN（PPT）預覽：直接用 HTML 畫出表格（SN｜各影像欄）+ 照片，所有東西同一座標系 →
    //   天生對齊、不需疊在渲染 PNG 上、不受 LibreOffice 列高渲染差異影響。匯出仍用實際表格座標。
    function SnSlidePreview({ slidesTbl, slidesSnInfo, snList, sources, thumbUrl, fill, fit, perColCrop, globalCrop, previewUrl, pageTbl, slideW, slideH, stageW }) {
      const usePng = !!previewUrl;   // 有底圖（第1頁）→ 表格結構/表頭/SN 由 PNG 提供（像素級一致），HTML 只疊圖片
      const snRowStart = slidesSnInfo?.snRowStart || 2;   // 資料起始列(1-based)
      // 範本該格實際文字（給「非 SN、非圖片」欄顯示原值用 → 不管選哪欄,範本的值都會顯示）
      const tplTextAt = (ri, c1) => {
        const cell = ((pageTbl || slidesTbl).cells || []).find((x) => x.r === snRowStart + ri && x.c === c1);
        return cell ? String(cell.text || "").trim() : "";
      };
      const cw = slidesTbl.col_widths_cm || [];
      const rhArr = slidesTbl.row_heights_cm || [];
      const snCol0 = (slidesSnInfo.snCol || 1) - 1;
      const headerRow1 = (slidesSnInfo.snRowStart || 2) - 1;
      const dataRows = slidesSnInfo.dataRows || snList.length;
      const ncols = slidesTbl.cols || cw.length;
      const cols = [];
      for (let c1 = 1; c1 <= ncols; c1++) {
        const w = cw[c1 - 1] || 1;
        const cell = (slidesTbl.cells || []).find((x) => x.r === headerRow1 && x.c === c1);
        const header = cell ? String(cell.text || "").trim() : "";
        if (c1 - 1 === snCol0) { cols.push({ sn: true, header, w }); continue; }
        cols.push({ sn: false, header, w });
      }
      const srcForHeader = (h) => {
        const q = String(h || "").toLowerCase();
        if (!q) return null;
        return sources.find((s) => { const m = String(s.slidesCol || s.name || "").toLowerCase(); return m && m === q; });
      };
      const fileFor = (s, sn) => {
        if (!s) return null;
        const stem = String(sn).toLowerCase();
        return (s.files || []).find((x) => (x.name || "").replace(/\.[^./]+$/, "").toLowerCase() === stem);
      };
      // 投影片頁框：用真實投影片尺寸，表格依 left/top 定位 → 與「依檔名」的頁面預覽一致
      const SW = slideW || 25.4, SH = slideH || 14.29;
      const STAGE = stageW || 640;
      const pxPerCm = STAGE / SW;
      const boxH = Math.round(SH * pxPerCm);
      const tLeft = Math.round((slidesTbl.left_cm || 0) * pxPerCm);
      const tTop = Math.round((slidesTbl.top_cm || 0) * pxPerCm);
      const tWidth = Math.round(cols.reduce((a, c) => a + c.w, 0) * pxPerCm);
      // 有 PNG 底圖時，用後端從 PNG 量到的「實際表頭高/列間距」→ 圖片浮層才會精準落在 PNG 的儲存格內。
      const dataCm = (usePng && slidesTbl.row_pitch_cm != null) ? slidesTbl.row_pitch_cm : (rhArr[1] || 4.28);
      const headerCm = (usePng && slidesTbl.data_start_cm != null)
        ? Math.max(0.3, slidesTbl.data_start_cm - (slidesTbl.top_cm || 0)) : (rhArr[0] || 1.76);
      const rowH = Math.max(20, Math.round(dataCm * pxPerCm));
      const headerH = Math.max(16, Math.round(headerCm * pxPerCm));
      const f = Math.max(0.05, Math.min(1, (fill ?? 90) / 100));
      // SN 清單未產生時，顯示範本表格結構（表頭 + dataRows 個空白列），讓使用者確認範本載入正確
      const rows = snList.length ? snList : Array.from({ length: Math.max(1, dataRows) }, () => ({ sn: "" }));
      const isEmpty = snList.length === 0;
      // 等高對齊：取所有圖「都放得下」的共同高度(佔格高比例)→ 保比例、不裁切、全部同高
      const chCm = dataCm;
      let alignFrac = f;
      if (fit === "contain_align") {
        for (const item of rows) {
          for (const c of cols) {
            if (c.sn) continue;
            const s = srcForHeader(c.header);
            const file = fileFor(s, item.sn);
            if (!file || !file.w || !file.h) continue;
            // 用「裁切後的有效長寬」算共同高度（否則裁成扁/高長方形時比例會錯）
            const cr = perColCrop ? (s?.crop?.enabled ? s.crop : null) : globalCrop;
            const ew = file.w * (cr ? Math.max(0.01, cr.right - cr.left) : 1);
            const eh = file.h * (cr ? Math.max(0.01, cr.bottom - cr.top) : 1);
            alignFrac = Math.min(alignFrac, f, f * (c.w / chCm) * (eh / ew));
          }
        }
      }
      // HTML 表格實際渲染會比「指定列高總和」略高（邊框/行高累積），對佔滿投影片高度的表格就會溢出下緣。
      //   量測表格真實高度，若超出投影片框 → 整體等比縮小至剛好放下（錨左上、保比例），預覽外觀才和範本一致。
      const stageRef = useRef(null);
      const tblRef = useRef(null);
      const [fitScale, setFitScale] = useState(1);
      const [imgTick, setImgTick] = useState(0);   // 圖片載入後 +1 → 觸發 fitScale 重新量測（圖載入會讓 natH 變）
      useLayoutEffect(() => {
        const tbl = tblRef.current, stage = stageRef.current;
        if (!tbl) return;
        const natH = tbl.offsetHeight;                  // 實際渲染高（含 HTML 邊框/行高 overhead）
        const computedH = headerH + rows.length * rowH; // 依範本列高的應有高度（含下方留白才會正確）
        const avail = stage ? (stage.clientHeight - tbl.offsetTop - 1) : Infinity;
        // 校正 overhead 回「應有高度」→ 表格＝真實 cm 尺寸、下方留出範本該有的 margin；且絕不超出框。
        const want = Math.min(1, computedH > 0 ? computedH / natH : 1, natH > 0 ? avail / natH : 1);
        setFitScale((prev) => (Math.abs(prev - want) > 0.003 ? want : prev));
      }, [boxH, tTop, headerH, rowH, rows.length, cols.length, tWidth, imgTick]);
      return (
        <div ref={stageRef} className="stage border relative overflow-hidden shrink-0"
          style={{ width: STAGE, height: boxH, background: "#fff" }}>
          <div ref={tblRef} style={{ position: "absolute", left: tLeft, top: tTop, transform: usePng ? undefined : `scaleY(${fitScale})`, transformOrigin: "top left" }}>
          <table style={{ width: tWidth, borderCollapse: "collapse", tableLayout: "fixed", background: usePng ? "transparent" : "#fff" }}>
            <colgroup>{cols.map((c, i) => <col key={i} style={{ width: Math.round(c.w * pxPerCm) }} />)}</colgroup>
            <thead>
              <tr style={{ height: headerH }}>
                {cols.map((c, i) => (
                  <th key={i} className={`px-1 text-center align-middle ${usePng ? "border-transparent text-transparent" : "border border-slate-400 text-[11px] font-semibold text-slate-700"}`}>
                    {usePng ? "" : (c.sn ? (c.header || "SN") : c.header)}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((item, ri) => (
                <tr key={ri} style={{ height: rowH }} title={ri >= dataRows ? "超出範本列數 → 匯出時換頁" : undefined}>
                  {cols.map((c, ci) => {
                    if (c.sn) return (   // SN 欄：顯示 SN 清單值 + highlight（綠底）
                      <td key={ci} className="border border-slate-400 text-center text-xs font-semibold"
                        style={{ background: ri >= dataRows ? "#fff7ed" : "#ecfdf5" }}>{item.sn}</td>
                    );
                    const s = srcForHeader(c.header);
                    if (!s) return (   // 非 SN、非圖片欄（如 XX 標籤欄）→ 顯示範本實際文字（不管選哪欄都會顯示）
                      <td key={ci} className="border border-slate-400 text-center text-xs">{tplTextAt(ri, ci + 1)}</td>
                    );
                    const file = fileFor(s, item.sn);
                    const crop = perColCrop ? (s?.crop?.enabled ? s.crop : null) : globalCrop;
                    // 尺寸都用「相對固定高度容器」的百分比 → 即使 100% 也不會把列撐高
                    const imgStyle = fit === "cover"
                      ? { width: "100%", height: "100%", objectFit: "cover", display: "block" }
                      : fit === "fill"
                      ? { width: "100%", height: "100%", objectFit: "fill", display: "block" }
                      : fit === "contain_align"
                      // 等高對齊：所有圖同高(=共同高度)、保比例、不裁切 → 較高的會縮小到一致
                      ? { height: `${alignFrac * 100}%`, width: "auto", maxWidth: "100%", display: "block" }
                      // 完整貼邊：整張塞進格內(同時受寬高限制)
                      : { maxHeight: `${f * 100}%`, maxWidth: "94%", objectFit: "contain", display: "block" };
                    return (
                      <td key={ci} className={`p-0 ${usePng ? "border-transparent" : "border border-slate-400"}`}>
                        {/* 固定高度 = 列高、overflow hidden → 圖片再大也不撐高列 */}
                        <div style={{ height: rowH, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
                          {file ? <img src={thumbUrl(file.path, 240, crop)} style={imgStyle} onLoad={() => setImgTick((t) => t + 1)} /> : null}
                        </div>
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
          </div>
        </div>
      );
    }

    function ExcelPreview({ grid, cfg, orderedFiles, selected, thumbUrl, snList, snColIdx }) {
      if (!grid) {
        return (
          <div className="border rounded-lg bg-slate-50 p-8 text-center text-slate-500">
            上傳 Excel 範本後顯示預覽
          </div>
        );
      }
      const HEADER_W = 32, HEADER_H = 22;
      // 累計 px 位置
      const cumX = [0];
      grid.cols.forEach((c) => cumX.push(cumX[cumX.length - 1] + c.w_px));
      const cumY = [0];
      grid.rows.forEach((r) => cumY.push(cumY[cumY.length - 1] + r.h_px));
      const totalW = cumX[cumX.length - 1];
      const totalH = cumY[cumY.length - 1];

      // 邊框查詢表
      const borderMap = {};
      (grid.borders || []).forEach((b) => {
        borderMap[`${b.r},${b.c}`] = b;
      });
      const cellMap = {};
      grid.cells.forEach((cell) => { cellMap[`${cell.r},${cell.c}`] = cell; });

      // 我們的 placements
      let placements;
      if (cfg.snMatchMode) {
        // SN 對照模式：依 SN list × sources 算
        const perColCrop = cfg.cropMode === "per-col";
        const globalCrop = cfg.crop?.enabled ? cfg.crop : null;
        placements = [];
        for (const { sn, row } of (snList || [])) {
          const stem = sn.toLowerCase();
          for (const s of cfg.sources) {
            const f = (s.files || []).find((x) => (x.name || "").replace(/\.[^./]+$/, "").toLowerCase() === stem);
            if (!f) continue;
            const col = colLetterToIdx(s.targetCol);
            if (!col) continue;
            placements.push({
              path: f.path, row, col, span_cols: 1, span_rows: 1,
              _crop: perColCrop ? (s.crop?.enabled ? s.crop : null) : globalCrop,
            });
          }
        }
      } else {
        placements = computeExcelCells(cfg.excel, cfg.label, orderedFiles, cfg.autoAlign);
        // 依檔名 idx + 各欄獨立：對每個 placement 注入 per-idx crop (沒設定者 _crop=null 表示不裁剪、避免回退全域)
        if (cfg.autoAlign && cfg.cropMode === "per-col") {
          const idxCrops = cfg.label.idxCrops || {};
          placements = placements.map((pl) => {
            if (!pl.path) return pl;
            const f = orderedFiles.find((x) => x.path === pl.path);
            const { idx } = f ? extractGroupIdx(f.name || "", cfg.label.pattern) : { idx: null };
            const c = idx != null ? idxCrops[String(idx)] : null;
            return { ...pl, _crop: c?.enabled ? c : null };
          });
        }
      }

      const alignToFlex = { left: "flex-start", center: "center", right: "flex-end" };
      const vAlignToFlex = { top: "flex-start", center: "center", middle: "center", bottom: "flex-end" };

      // 圖片填法 + contain_align 每列共同高度（與後端 xlsx_writer 演算法一致）
      const fit = cfg.excel?.imgFit || "contain";
      const insetPct = Math.max(0, Math.min(45, cfg.excel?.containInset ?? 5));
      const inset = (fit === "contain" || fit === "contain_align" || fit === "fill") ? insetPct / 100 : 0;

      // 用後端給的原始 w/h + 裁剪比例「同步」算出 aspect（ih/iw），不依賴瀏覽器載入
      const fileByPath = {};
      (orderedFiles || []).forEach((f) => { fileByPath[f.path] = f; });
      // SN 對照模式：圖片在 cfg.sources[].files，需一併納入才能算出裁剪後 aspect（否則回退 0.75 → contain 高度不齊）
      (cfg.sources || []).forEach((s) => (s.files || []).forEach((f) => { fileByPath[f.path] = f; }));
      const aspectOf = (pl) => {
        const f = fileByPath[pl.path];
        if (!f || !f.w || !f.h) return 0.75;
        // 與 thumbUrl 同一套裁切解析：_crop===undefined → 回退全域 cfg.crop；null → 明確不裁切
        // （統一裁切+依檔名 模式 placement 無 _crop，否則 aspectOf 用原圖比例、縮圖卻已裁切 → 完整貼邊≠等高對齊）
        const c = pl._crop === undefined ? cfg.crop : pl._crop;
        if (c && c.enabled) {
          const cw = Math.max(0.01, (c.right - c.left)) * f.w;
          const ch = Math.max(0.01, (c.bottom - c.top)) * f.h;
          return cw ? ch / cw : 0.75;
        }
        return f.h / f.w;
      };

      const rowCommonH = {};
      if (fit === "contain_align") {
        for (const pl of placements) {
          if (pl.text != null || !pl.path) continue;
          const ci = pl.col - 1, ri = pl.row - 1;
          if (ci < 0 || ri < 0 || ci >= grid.cols.length || ri >= grid.rows.length) continue;
          const cw = (cumX[ci + pl.span_cols] || cumX[grid.cols.length]) - cumX[ci];
          const ch = (cumY[ri + pl.span_rows] || cumY[grid.rows.length]) - cumY[ri];
          const aspect = aspectOf(pl);
          const availW = cw * (1 - 2 * inset), availH = ch * (1 - 2 * inset);
          let fh = availW * aspect;
          if (fh > availH) fh = availH;
          rowCommonH[pl.row] = rowCommonH[pl.row] == null ? fh : Math.min(rowCommonH[pl.row], fh);
        }
      }

      return (
        <div className="border rounded-lg bg-white">
          <div style={{ position: "relative", width: totalW + HEADER_W, height: totalH + HEADER_H }}>
            {/* 左上角空白 */}
            <div style={{ position: "absolute", left: 0, top: 0, width: HEADER_W, height: HEADER_H,
              background: "#f1f5f9", borderRight: "1px solid #cbd5e1", borderBottom: "1px solid #cbd5e1" }} />

            {/* 欄字母 header */}
            {grid.cols.map((c, i) => (
              <div key={`col-${c.letter}`} style={{
                position: "absolute", top: 0, left: HEADER_W + cumX[i],
                width: c.w_px, height: HEADER_H,
                background: "#f1f5f9", borderRight: "1px solid #cbd5e1", borderBottom: "1px solid #cbd5e1",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 11, color: "#475569",
              }}>{c.letter}</div>
            ))}

            {/* 列號 header */}
            {grid.rows.map((r, i) => (
              <div key={`row-${r.r}`} style={{
                position: "absolute", left: 0, top: HEADER_H + cumY[i],
                width: HEADER_W, height: r.h_px,
                background: "#f1f5f9", borderRight: "1px solid #cbd5e1", borderBottom: "1px solid #cbd5e1",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 11, color: "#475569",
              }}>{r.r}</div>
            ))}

            {/* (移除無 content 的 cell 分隔線；範本既有的 border 由下方獨立渲染) */}

            {/* SN 欄 highlight（依範本 SN 模式，比照 ppt 預覽的綠底） */}
            {cfg.snMatchMode && snColIdx > 0 && snColIdx <= grid.cols.length && (snList || []).map(({ row }, i) => {
              const ri = row - 1;
              if (ri < 0 || ri >= grid.rows.length) return null;
              return (
                <div key={`snhl-${i}`} style={{
                  position: "absolute",
                  left: HEADER_W + cumX[snColIdx - 1], top: HEADER_H + cumY[ri],
                  width: grid.cols[snColIdx - 1].w_px, height: grid.rows[ri].h_px,
                  background: "#ecfdf5", pointerEvents: "none",
                }} />
              );
            })}

            {/* 邊框 (從範本讀的) */}
            {(grid.borders || []).map((b, i) => {
              const ci = b.c - 1, ri = b.r - 1;
              if (ci < 0 || ri < 0 || ci >= grid.cols.length || ri >= grid.rows.length) return null;
              const cw = grid.cols[ci].w_px, rh = grid.rows[ri].h_px;
              const x = HEADER_W + cumX[ci], y = HEADER_H + cumY[ri];
              return (
                <div key={`b-${i}`} style={{
                  position: "absolute", left: x, top: y, width: cw, height: rh,
                  borderTop: b.top ? "1px solid #334155" : "",
                  borderRight: b.right ? "1px solid #334155" : "",
                  borderBottom: b.bottom ? "1px solid #334155" : "",
                  borderLeft: b.left ? "1px solid #334155" : "",
                  pointerEvents: "none",
                }} />
              );
            })}

            {/* 範本中的文字 */}
            {grid.cells.map((cell, i) => {
              const ci = cell.c - 1, ri = cell.r - 1;
              if (ci < 0 || ri < 0 || ci >= grid.cols.length || ri >= grid.rows.length) return null;
              return (
                <div key={`txt-${i}`} style={{
                  position: "absolute",
                  left: HEADER_W + cumX[ci], top: HEADER_H + cumY[ri],
                  width: grid.cols[ci].w_px, height: grid.rows[ri].h_px,
                  padding: "2px 4px",
                  fontSize: cell.font_pt,
                  fontWeight: cell.bold ? 700 : 400,
                  display: "flex",
                  alignItems: vAlignToFlex[cell.v_align] || "flex-end",
                  justifyContent: alignToFlex[cell.h_align] || "flex-start",
                  overflow: "hidden", whiteSpace: "nowrap",
                  pointerEvents: "none",
                }}>{cell.text}</div>
              );
            })}

            {/* 我們新加的內容 (圖片 + SN 文字) */}
            {placements.map((pl, i) => {
              const ci = pl.col - 1, ri = pl.row - 1;
              if (ci < 0 || ri < 0 || ci >= grid.cols.length || ri >= grid.rows.length) return null;
              const w = (cumX[ci + pl.span_cols] || cumX[grid.cols.length]) - cumX[ci];
              const h = (cumY[ri + pl.span_rows] || cumY[grid.rows.length]) - cumY[ri];
              const x = HEADER_W + cumX[ci], y = HEADER_H + cumY[ri];
              if (pl.text !== undefined && pl.text !== null) {
                return (
                  <div key={`my-${i}`} style={{
                    position: "absolute", left: x, top: y, width: w, height: h,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: (pl.font_pt || 12), fontWeight: 700, color: "#0f172a",
                    pointerEvents: "none",
                  }}>{pl.text}</div>
                );
              }
              const ringCls = selected === pl.path ? "ring-4 ring-emerald-500 shadow-[0_0_18px_4px_rgba(16,185,129,0.7)] z-10" : "";
              if (fit === "contain_align") {
                // 等高對齊：該列共同高度，寬度依 aspect（同步算、不溢出），置中
                const aspect = aspectOf(pl);
                const fitH = rowCommonH[pl.row] || (h * (1 - 2 * inset));
                const fitW = aspect ? fitH / aspect : w * (1 - 2 * inset);
                return (
                  <img key={`my-${i}`} src={thumbUrl(pl.path, 400, pl._crop)}
                    data-preview-path={pl.path}
                    style={{
                      position: "absolute",
                      left: x + (w - fitW) / 2, top: y + (h - fitH) / 2,
                      width: fitW, height: fitH, objectFit: "contain",
                      scrollMargin: 30,
                    }}
                    className={ringCls} />
                );
              }
              return (
                <img key={`my-${i}`}
                  src={thumbUrl(pl.path, 400, pl._crop)}
                  data-preview-path={pl.path}
                  style={{
                    position: "absolute",
                    left: x + w * inset, top: y + h * inset,
                    width: w * (1 - 2 * inset), height: h * (1 - 2 * inset),
                    objectFit: fit,
                    scrollMargin: 30,
                  }}
                  className={ringCls} />
              );
            })}
          </div>
        </div>
      );
    }

    // 慶祝 / 成功 toast（A 魔法時刻 · B 價值量化 · C 匯出成功）
    function Toast({ toast, onClose }) {
      const theme = ({ magic: "from-violet-600 to-indigo-600", success: "from-emerald-600 to-teal-600" })[toast.kind] || "from-slate-700 to-slate-800";
      return (
        <div className="fixed top-4 z-[60]" style={{ left: "50%", transform: "translateX(-50%)", animation: "ibpToast .25s ease" }}>
          <style>{`@keyframes ibpToast{from{opacity:0;transform:translate(-50%,-8px)}to{opacity:1;transform:translate(-50%,0)}}`}</style>
          <div className={`flex items-center gap-3 px-4 py-2.5 rounded-xl shadow-2xl text-white bg-gradient-to-r ${theme}`}>
            <div>
              <div className="text-sm font-semibold">{toast.title}</div>
              {toast.sub && <div className="text-[12px] text-white/85">{toast.sub}</div>}
            </div>
            <button onClick={onClose} className="text-white/70 hover:text-white text-lg leading-none ml-1">×</button>
          </div>
        </div>
      );
    }

    // ① 空狀態引導（first-run）
    function WelcomeHero() {
      const Step = ({ n, icon, t }) => (
        <div className="flex flex-col items-center gap-1">
          <div className="w-12 h-12 rounded-2xl bg-white shadow flex items-center justify-center text-xl">{icon}</div>
          <div className="text-xs font-medium text-slate-600"><span className="text-indigo-500 font-bold mr-0.5">{n}.</span>{t}</div>
        </div>
      );
      return (
        <div className="absolute inset-0 flex items-center justify-center p-6 bg-gradient-to-b from-slate-50 to-white">
          <div className="text-center max-w-md">
            <div className="text-5xl mb-3">🖼️✨</div>
            <div className="text-xl font-bold text-slate-800 mb-1">把整批照片一鍵貼進範本</div>
            <div className="text-sm text-slate-500 mb-5">拖一個<b>範本</b>和<b>圖片資料夾</b>進來，程式會自動對齊、排版。</div>
            <div className="flex items-center justify-center gap-5 mb-5">
              <Step n="1" icon="📄" t="上傳範本" />
              <span className="text-slate-300 text-lg">→</span>
              <Step n="2" icon="🖼️" t="上傳圖片" />
              <span className="text-slate-300 text-lg">→</span>
              <Step n="3" icon="📤" t="匯出" />
            </div>
            <div className="text-[12px] text-slate-400">範本支援 .pptx / .key / .xlsx · 由左側面板拖入或點擊上傳</div>
          </div>
        </div>
      );
    }

    function App() {
      const [cfg, setCfg] = useState(DEFAULTS);
      const [files, setFiles] = useState([]);          // 原始檔案清單（由後端掃描）
      const [order, setOrder] = useState([]);          // 使用者調整後的順序 (paths array)
      const [selected, setSelected] = useState(null);  // 預覽 highlight (最後點的)
      const [selectedPaths, setSelectedPaths] = useState([]);  // 多選
      const anchorRef = useRef(0);                     // shift 範圍錨點
      const dragFromRef = useRef(null);                // 拖曳來源 path
      const [dragOverIdx, setDragOverIdx] = useState(null);  // 拖曳插入位置指示
      const listRef = useRef(null);                    // 檔案清單捲動容器
      const scrollDirRef = useRef(0);
      const scrollRafRef = useRef(null);
      const [currentPage, setCurrentPage] = useState(0);
      const [status, setStatus] = useState("");
      const [busy, setBusy] = useState(false);
      const [tplPath, setTplPath] = useState("");
      const [tplLoadSeq, setTplLoadSeq] = useState(0);   // 每次載入範本都 +1：即使 path 相同也強制重載表格資訊
      const [tplName, setTplName] = useState("");
      const [tpl, setTpl] = useState(null);
      const [mode, setMode] = useState("slides");
      const [xlGrid, setXlGrid] = useState(null);
      const [tableInfo, setTableInfo] = useState(null);   // pptx/key 範本表格資訊
      const [tableInfoLoading, setTableInfoLoading] = useState(false);
      const tableInfoReqRef = useRef(0);   // 防過期回應：只採用最新一次 table-info 請求的結果
      const [tblSkipCols, setTblSkipCols] = useState(1);  // 套用表格時略過左側幾欄（標籤欄）
      const [tblSkipRows, setTblSkipRows] = useState(1);  // 套用表格時略過頂部幾列（表頭）
      const [dragTpl, setDragTpl] = useState(false);
      const [dragImg, setDragImg] = useState(false);
      const [cropOpen, setCropOpen] = useState(false);
      const [cropSourceId, setCropSourceId] = useState(null);  // null = 不編輯 source crop; 否則為 source.id (snMatch 模式)
      const [cropIdxKey, setCropIdxKey] = useState(null);      // null = 不編輯 per-idx crop; 否則為 idx 字串 (依檔名 idx 模式)
      const [selectedCell, setSelectedCell] = useState(null); // {r, c} | null：2D 模式下「格子位置」選取（允許空格）

      // --- Undo / Redo ---
      const [historyPast, setHistoryPast] = useState([]);
      const [historyFuture, setHistoryFuture] = useState([]);
      const HISTORY_MAX = 50;

      // 當前載入的配置名稱（用於 header 顯示）
      const [currentConfigName, setCurrentConfigName] = useState("");
      const [configMenuOpen, setConfigMenuOpen] = useState(false);
      const [helpOpen, setHelpOpen] = useState(false);
      const [shortcutsOpen, setShortcutsOpen] = useState(false);
      const [toast, setToast] = useState(null);              // {kind,title,sub}
      const [idxConfirm, setIdxConfirm] = useState(null);    // 依檔名模式：上傳後 idx 確認對話框資料 | null
      const [tplWarnAck, setTplWarnAck] = useState(false);   // 已確認「髒範本」警告（每換範本重置）
      const toastTimerRef = useRef(null);
      const magicRef = useRef(false);
      const showToast = (t) => {
        setToast(t);
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        toastTimerRef.current = setTimeout(() => setToast(null), t.hold || 4200);
      };
      const [snList, setSnList] = useState([]);  // [{ sn, row }] from /api/template/sn-list
      const [ws, setWs] = useState("");
      const [zoom, setZoom] = useState(1);
      const stageWrapRef = useRef(null);
      const userZoomedRef = useRef(false);  // 一旦手動調整 zoom，auto-fit 停止
      const [versionInfo, setVersionInfo] = useState(null);

      useEffect(() => {
        fetch("/api/version").then((r) => r.json()).then(setVersionInfo).catch(() => {});
      }, []);

      // 自動 fit。使用者手動調 zoom 後 (userZoomedRef=true) auto-fit 停止，
      // 直到切換 mode/template 或按「⤢」鍵才再次觸發。
      useEffect(() => {
        userZoomedRef.current = false;  // 切 mode/template 重設為自動
        const el = stageWrapRef.current;
        if (!el) return;
        const recompute = () => {
          if (userZoomedRef.current) return;
          const containerW = el.clientWidth - 16;
          if (containerW <= 0) return;
          let contentW = 0;
          if (mode === "excel" && xlGrid) {
            contentW = xlGrid.cols.reduce((a, c) => a + c.w_px, 0) + 40;
          } else if (mode === "slides") {
            contentW = 656;   // 舞台寬(640)+小邊距；Y stepper 已移進舞台、不再額外佔寬
          }
          if (contentW > 0) {
            setZoom(Math.min(2.2, Math.max(0.3, containerW / contentW)));   // 允許放大填滿寬欄
          }
        };
        recompute();
        let ro;
        if (typeof ResizeObserver !== "undefined") {
          ro = new ResizeObserver(recompute);
          ro.observe(el);
        }
        window.addEventListener("resize", recompute);
        return () => {
          if (ro) ro.disconnect();
          window.removeEventListener("resize", recompute);
        };
      }, [mode, xlGrid, tplPath]);
      const tplInputRef = useRef(null);
      const imgInputRef = useRef(null);

      // 取得 workspace（server 一個 session 一份暫存資料夾）
      useEffect(() => {
        fetch("/api/workspace", { method: "POST" })
          .then((r) => r.json()).then((j) => setWs(j.workspace || ""))
          .catch(() => {});
      }, []);

      // 縮圖 URL：第 3 參數語意
      //   undefined  → 套用全域 cfg.crop
      //   null       → 明確不裁剪 (各欄模式但此欄無設定)
      //   crop obj   → 套用該 crop
      const thumbUrl = (path, size, cropOverride) => {
        const base = `/api/thumb?path=${encodeURIComponent(path)}&size=${size}`;
        const c = cropOverride === undefined ? cfg.crop : cropOverride;
        if (c && c.enabled) {
          return `${base}&crop=${c.left.toFixed(4)},${c.top.toFixed(4)},${c.right.toFixed(4)},${c.bottom.toFixed(4)}`;
        }
        return base;
      };

      const orderedFiles = useMemo(() => {
        const map = new Map(files.map((f) => [f.path, f]));
        return order.map((p) => map.get(p)).filter(Boolean);
      }, [files, order]);

      // ✨ 魔法時刻（A）+ 價值量化（B）：範本+圖片就緒、自動對齊好 → 慶祝（每批一次）
      useEffect(() => {
        const n = orderedFiles.length;
        if (n > 0 && tplPath && !magicRef.current) {
          magicRef.current = true;
          const mins = Math.max(1, Math.round(n * 20 / 60));
          showToast({ kind: "magic", title: `✨ ${n} 張已自動對齊範本！`, sub: `預估省下 ~${mins} 分鐘手動拖放` });
        } else if (n === 0) {
          magicRef.current = false;
        }
      }, [orderedFiles.length, tplPath]);

      // 鏡像目前所有可 undo 的 state，給 pushHistory / undo / redo 用
      const stateRef = useRef({});
      stateRef.current = {
        cfg, order, files, snList,
        selected, selectedCell, selectedPaths,
        xlGrid, tpl, tplPath, tplName, mode,
      };
      const SNAPSHOT_SETTERS = {
        cfg: setCfg, order: setOrder, files: setFiles, snList: setSnList,
        selected: setSelected, selectedCell: setSelectedCell, selectedPaths: setSelectedPaths,
        xlGrid: setXlGrid, tpl: setTpl, tplPath: setTplPath, tplName: setTplName, mode: setMode,
      };
      const captureSnapshot = (desc) => ({ ...stateRef.current, desc });
      const restoreSnapshot = (snap) => {
        for (const k of Object.keys(SNAPSHOT_SETTERS)) {
          if (k in snap) SNAPSHOT_SETTERS[k](snap[k]);
        }
      };
      const pushHistory = (desc) => {
        const snap = captureSnapshot(desc || "");
        setHistoryPast((past) => [...past.slice(-(HISTORY_MAX - 1)), snap]);
        setHistoryFuture([]);
      };
      const clearHistory = () => {
        setHistoryPast([]);
        setHistoryFuture([]);
      };
      // 通用「重新開始」前確認 + 重置 (給切換模式、載入配置等用)
      // reason: 顯示在 confirm 開頭，e.g. "切換模式"、"載入配置"
      // apply: 取得 confirm 通過後執行的動作 (callback)
      // 回傳是否真的執行了
      const confirmAndReset = (reason, apply) => {
        const hasUserState =
          historyPast.length > 0 || historyFuture.length > 0 ||
          files.length > 0 || snList.length > 0 ||
          (cfg.sources || []).some((s) => (s.files?.length || 0) > 0 || s.crop?.enabled) ||
          cfg.crop?.enabled ||
          Object.keys(cfg.label?.idxCrops || {}).length > 0;
        if (hasUserState) {
          if (!confirm(`${reason}會清掉 undo 歷史與所有調整 (已上傳的圖片、裁剪、來源 等)。範本會保留。確定？`)) return false;
        }
        clearHistory();
        setOrder([]);
        setFiles([]);
        setSnList([]);
        setSelected(null);
        setSelectedCell(null);
        setSelectedPaths([]);
        apply();
        return true;
      };

      // 模式切換 = fresh start
      const switchMode = (toSnMatch) => {
        if (!!toSnMatch === !!cfg.snMatchMode) return;
        confirmAndReset("切換模式", () => {
          setCfg((c) => {
            const fresh = JSON.parse(JSON.stringify(DEFAULTS));
            fresh.output = { ...fresh.output, path: c.output?.path || fresh.output.path };   // 保留輸出檔名；範本清空 → 不留 template/slide
            fresh.snMatchMode = !!toSnMatch;
            fresh.autoAlign = false;
            if (toSnMatch) {
              fresh.sources = [
                { id: 1, name: "A", folder: "", files: [], targetCol: "F", crop: { enabled: false, left: 0, top: 0, right: 1, bottom: 1 } },
                { id: 2, name: "B", folder: "", files: [], targetCol: "G", crop: { enabled: false, left: 0, top: 0, right: 1, bottom: 1 } },
              ];
            }
            return fresh;
          });
          // 換分群方式 → 清空已載入範本（避免沿用上一個模式的範本／結構，需重新載入合適範本）
          setTplPath(""); setTplName(""); setTpl(null); setXlGrid(null); setTableInfo(null);
          setFiles([]); setOrder([]); setSnList([]);
        });
      };
      const undo = () => {
        if (historyPast.length === 0) return;
        const last = historyPast[historyPast.length - 1];
        const current = captureSnapshot(last.desc || "redo");
        setHistoryPast((past) => past.slice(0, -1));
        setHistoryFuture((fut) => [...fut, current]);
        restoreSnapshot(last);
        setStatus(`↶ undo${last.desc ? `「${last.desc}」` : ""}`);
      };
      const redo = () => {
        if (historyFuture.length === 0) return;
        const next = historyFuture[historyFuture.length - 1];
        const current = captureSnapshot(next.desc || "undo");
        setHistoryFuture((fut) => fut.slice(0, -1));
        setHistoryPast((past) => [...past, current]);
        restoreSnapshot(next);
        setStatus(`↷ redo${next.desc ? `「${next.desc}」` : ""}`);
      };

      // 鍵盤：⌘Z / Ctrl+Z = undo；⇧⌘Z / Ctrl+Y = redo
      useEffect(() => {
        const onKey = (e) => {
          const t = e.target;
          const tag = t && t.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || (t && t.isContentEditable)) return;
          const mod = e.metaKey || e.ctrlKey;
          if (!mod) return;
          if (e.key === "z" || e.key === "Z") {
            e.preventDefault();
            if (e.shiftKey) redo(); else undo();
          } else if (e.key === "y" || e.key === "Y") {
            e.preventDefault();
            redo();
          }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [historyPast, historyFuture]);

      // 對位模式下，欄數由檔名 idx 自動決定（給輸入框顯示提示用）
      const autoIdxList = useMemo(
        () => cfg.autoAlign
          ? detectIdxList(orderedFiles, cfg.label.pattern, cfg.label.idxSort || "auto", cfg.label.idxOrder || [])
          : [],
        [cfg.autoAlign, orderedFiles, cfg.label.pattern, cfg.label.idxSort, cfg.label.idxOrder]
      );

      // 視覺化 2D 「導航 grid」：1D 模式視為 N×1；2D 模式直接用 cells/sources matrix
      const navGrid = useMemo(() => {
        if (cfg.snMatchMode) {
          return (snList || []).map((s) => {
            const stem = s.sn.toLowerCase();
            return (cfg.sources || []).map((src) =>
              (src.files || []).find((f) => (f.name || "").replace(/\.[^./]+$/, "").toLowerCase() === stem) || null
            );
          });
        }
        if (cfg.autoAlign && orderedFiles.length > 0) {
          const idxList = autoIdxList;
          if (!idxList.length) return orderedFiles.map((f) => [f]);
          const rows = buildRows(orderedFiles, cfg.label.pattern, idxList, true, new Set(cfg.label.idxIgnore || []));
          return rows.map((r) => r.cells);
        }
        return orderedFiles.map((f) => [f]);
      }, [cfg.snMatchMode, cfg.autoAlign, snList, cfg.sources, orderedFiles, autoIdxList, cfg.label.pattern]);

      // 鍵盤方向鍵切換選取
      // 2D 模式 (snMatch / 依檔名 idx)：用 selectedCell 移動位置，允許停在空格
      // 1D 模式 (順序填入)：用 path 移動
      const is2DMode = cfg.snMatchMode || cfg.autoAlign;
      useEffect(() => {
        const onKey = (e) => {
          const ARROWS = { ArrowDown: [1,0], ArrowUp: [-1,0], ArrowRight: [0,1], ArrowLeft: [0,-1] };
          if (!ARROWS[e.key]) return;
          const t = e.target;
          const tag = t && t.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || (t && t.isContentEditable)) return;
          if (!navGrid.length) return;
          const R = navGrid.length;
          const [dr, dc] = ARROWS[e.key];

          // 找起始位置：優先 selectedCell；2D 模式 fallback 從 selected path 找
          let cr = -1, cc = -1;
          if (selectedCell && selectedCell.r >= 0 && selectedCell.r < R && selectedCell.c >= 0 && selectedCell.c < (navGrid[selectedCell.r]?.length || 0)) {
            cr = selectedCell.r; cc = selectedCell.c;
          } else if (selected) {
            for (let r = 0; r < R && cr < 0; r++) {
              for (let c = 0; c < navGrid[r].length; c++) {
                if (navGrid[r][c]?.path === selected) { cr = r; cc = c; break; }
              }
            }
          }
          if (cr < 0) {
            // 沒選 → (0,0)
            cr = 0; cc = 0;
            e.preventDefault();
            const cell0 = navGrid[0][0];
            setSelectedCell({ r: 0, c: 0 });
            if (cell0) { setSelected(cell0.path); setSelectedPaths([cell0.path]); }
            else { setSelected(null); setSelectedPaths([]); }
            return;
          }

          let nr = cr + dr, nc = cc + dc;

          if (is2DMode) {
            // 2D：純粹移動位置、允許停在空格
            if (nr < 0 || nr >= R) return;
            const row = navGrid[nr] || [];
            if (nc < 0 || nc >= row.length) return;
            e.preventDefault();
            setSelectedCell({ r: nr, c: nc });
            anchorRef.current = nr;
            const cell = row[nc];
            if (cell) { setSelected(cell.path); setSelectedPaths([cell.path]); }
            else { setSelected(null); setSelectedPaths([]); }
            requestAnimationFrame(() => {
              const el = listRef.current;
              if (el) {
                const selEl = el.querySelector(`[data-r="${nr}"][data-c="${nc}"]`);
                if (selEl && selEl.scrollIntoView) selEl.scrollIntoView({ block: "nearest", inline: "nearest" });
              }
              if (cell?.path) {
                const previewImg = document.querySelector(`[data-preview-path="${CSS.escape(cell.path)}"]`);
                if (previewImg && previewImg.scrollIntoView) previewImg.scrollIntoView({ block: "nearest", inline: "nearest" });
              }
            });
          } else {
            // 1D：跳過空格
            while (nr >= 0 && nr < R) {
              const row = navGrid[nr] || [];
              if (nc < 0 || nc >= row.length) break;
              if (row[nc]) break;
              nr += dr; nc += dc;
            }
            if (nr < 0 || nr >= R) return;
            const row = navGrid[nr] || [];
            if (nc < 0 || nc >= row.length || !row[nc]) return;
            e.preventDefault();
            const target = row[nc];
            setSelected(target.path);
            setSelectedPaths([target.path]);
            setSelectedCell({ r: nr, c: nc });
            anchorRef.current = nr;
            setCurrentPage(Math.floor(nr / Math.max(1, cfg.grid.cols * cfg.grid.rows)));
            requestAnimationFrame(() => {
              const el = listRef.current;
              if (el) {
                const selEl =
                  el.querySelector(`[data-r="${nr}"][data-c="${nc}"]`) ||
                  el.querySelector(`[data-idx="${nr}"]`);
                if (selEl && selEl.scrollIntoView) selEl.scrollIntoView({ block: "nearest", inline: "nearest" });
              }
              const previewImg = document.querySelector(`[data-preview-path="${CSS.escape(target.path)}"]`);
              if (previewImg && previewImg.scrollIntoView) previewImg.scrollIntoView({ block: "nearest", inline: "nearest" });
            });
          }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [navGrid, selected, selectedCell, is2DMode, cfg.grid.cols, cfg.grid.rows]);

      // Delete/Backspace 鍵刪除選取的檔案 (snMatch 模式不適用 — 那邊檔案來自 sources)
      useEffect(() => {
        if (cfg.snMatchMode) return;
        const onKey = (e) => {
          if (e.key !== "Delete" && e.key !== "Backspace") return;
          const t = e.target;
          const tag = t && t.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || (t && t.isContentEditable)) return;
          const paths = selectedPaths.length ? selectedPaths : (selected ? [selected] : []);
          if (!paths.length) return;
          e.preventDefault();
          const sel = new Set(paths);
          pushHistory(`刪除 ${sel.size} 張`);
          setOrder((o) => o.filter((p) => !sel.has(p)));
          setFiles((fs) => fs.filter((f) => !sel.has(f.path)));
          setSelectedPaths([]);
          setSelected(null);
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [selectedPaths, selected, cfg.snMatchMode]);

      const setGrid = (path, value) => {
        setCfg((c) => {
          const next = structuredClone(c);
          let cur = next.grid;
          const parts = path.split(".");
          for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
          cur[parts[parts.length - 1]] = value;
          return next;
        });
      };

      // idx 對位模式：把 grid.cols 同步成偵測到的欄數，讓「面板顯示＝實際值＝版面用的」一致
      useEffect(() => {
        if (cfg.autoAlign && autoIdxList.length > 0 && cfg.grid.cols !== autoIdxList.length) {
          setGrid("cols", autoIdxList.length);
        }
      }, [cfg.autoAlign, autoIdxList.length, cfg.grid.cols]);

      const pick = async (kind, prompt, extensions, defaultPath) => {
        const r = await fetch("/api/pick", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ kind, prompt, extensions, default: defaultPath || "" }),
        });
        const j = await r.json();
        if (j.cancelled || !j.path) return null;
        return j.path;
      };

      // 已有 server-side 範本 path → 依副檔名觸發 slides / excel 對應的後處理
      const loadTemplateByPath = async (path, name) => {
        if (!path) return;
        setTplPath(path);
        setTplLoadSeq((n) => n + 1);   // 強制觸發換範本的重載（後端若固定存 template.pptx，path 不變也能重載）
        if (name) setTplName(name);
        const ext = (path.split(".").pop() || "").toLowerCase();
        const newMode = ext === "xlsx" ? "excel" : "slides";
        setMode(newMode);
        // 輸出格式預設跟著「原始範本副檔名」走：匯入 .key → 輸出 .key、.pptx → .pptx、.xlsx → .xlsx
        // (.key 上傳會被轉成 .pptx，所以 path 副檔名不可靠 → 用原始檔名 name 判斷)
        const nameExt = (name || "").split(".").pop().toLowerCase();
        const outExt = ["pptx", "key", "xlsx"].includes(nameExt)
          ? nameExt : (newMode === "excel" ? "xlsx" : "pptx");
        setCfg((c) => ({
          ...c,
          output: {
            ...c.output,
            path: (c.output.path || "out").replace(/\.(pptx|key|xlsx)$/i, "") + "." + outExt,
            template: path,
          },
        }));
        if (newMode === "slides") {
          setXlGrid(null);
          await doLoadTemplate(path);
        } else {
          setTpl(null);
          const gr = await fetch("/api/template/excel-grid", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path }),
          });
          const gj = await gr.json();
          if (gr.ok) {
            setXlGrid(gj);
            setStatus(`已載入 Excel 範本 (${gj.cols.length} 欄 × ${gj.rows.length} 列)`);
          } else {
            setStatus("錯誤: " + (gj.error || "讀取 Excel 範本失敗"));
          }
        }
      };

      const uploadTemplate = async (file) => {
        if (!ws || !file) return;
        // 先清掉舊 grid + 重置警告 → 避免「舊非法 grid 還在、ack 已 false」時警告閃一下
        setXlGrid(null);
        setTplWarnAck(false);
        setBusy(true); setStatus("上傳範本中…");
        try {
          const fd = new FormData();
          fd.append("workspace", ws);
          fd.append("file", file);
          const r = await fetch("/api/upload/template", { method: "POST", body: fd });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "上傳失敗");
          await loadTemplateByPath(j.path, file.name);
        } catch (e) { setStatus("錯誤: " + e.message); }
        finally { setBusy(false); }
      };

      // 真正上傳 + 掃描（不含確認）
      const doUploadImages = async (files) => {
        if (!ws || !files || files.length === 0) return;
        setBusy(true); setStatus(`上傳 ${files.length} 張圖片中…`);
        try {
          const fd = new FormData();
          fd.append("workspace", ws);
          for (const f of files) fd.append("files", f);
          const r = await fetch("/api/upload/images", { method: "POST", body: fd });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "上傳失敗");
          setCfg((c) => ({ ...c, folder: j.folder }));
          await doScanFolder(j.folder);   // 自動掃描
        } catch (e) { setStatus("錯誤: " + e.message); }
        finally { setBusy(false); }
      };

      // 上傳入口：依檔名模式下「先確認 idx、再上傳」。檔名在瀏覽器端(File.name)即可取得，
      //   不必先上傳就能抽 idx → 確認對話框出現在上傳之前；按「確認」才真的上傳，「取消」則什麼都不做。
      const uploadImages = (files) => {
        const list = [...(files || [])];
        if (!list.length) return;
        if (cfg.autoAlign) {
          const imgs = list.filter((f) => /\.(png|jpe?g|jfif|gif|bmp|webp|tiff?)$/i.test(f.name || ""));
          if (!imgs.length) { setStatus("沒有圖片檔 (png/jpg…)"); return; }
          setIdxConfirm({ ...analyzeFilenameIdx(imgs, cfg.label.pattern), _files: imgs });
          return;
        }
        doUploadImages(list);
      };

      // 讀取 pptx/key 範本中的表格幾何（列/欄/位置/各欄寬列高）
      // table-info 現在會渲染 PNG 量測 → 較慢；快速切換範本時舊回應可能比新的晚到，
      //   用 token 確保只採用「最新一次請求」的結果（且 path 仍相符），避免幾何錯置。
      const loadTableInfo = async (pathArg) => {
        const path = pathArg || tplPath;
        if (!path) { setStatus("請先上傳範本"); return; }
        const token = ++tableInfoReqRef.current;
        setTableInfoLoading(true);
        try {
          const r = await fetch("/api/template/table-info", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path }),
          });
          const j = await r.json();
          if (token !== tableInfoReqRef.current) return;   // 已有更新的請求 → 丟棄此過期回應
          if (!r.ok) throw new Error(j.error || "讀取失敗");
          setTableInfo(j);
          // 同步 cfg.slide 為表格幾何所屬的投影片尺寸 → 預覽縮放與 SN placement 座標系一致
          // （避免 cfg.slide 殘留舊範本尺寸時，疊加層與背景圖比例不符 → 看似沒對齊）
          if (j.slide?.width_cm) {
            setCfg((c) => (c.slide.width_cm === j.slide.width_cm && c.slide.height_cm === j.slide.height_cm)
              ? c : { ...c, slide: { width_cm: j.slide.width_cm, height_cm: j.slide.height_cm } });
          }
          setStatus(j.tables?.length ? `偵測到 ${j.tables.length} 個表格` : "此範本沒有表格");
        } catch (e) {
          if (token !== tableInfoReqRef.current) return;
          setTableInfo({ tables: [], error: e.message });
          setStatus("讀取表格失敗: " + e.message);
        } finally {
          if (token === tableInfoReqRef.current) setTableInfoLoading(false);
        }
      };

      // 換範本時：清掉舊資訊、重設 auto-apply 旗標、自動讀新範本的表格 (slides + pptx)
      const autoAppliedRef = useRef(false);
      const excelAutoRef = useRef(false);   // xlsx 表格偵測：每個範本只自動套一次
      useEffect(() => {
        autoAppliedRef.current = false;
        excelAutoRef.current = false;
        tableInfoReqRef.current++;   // 立即作廢前一個範本仍在飛行中的 table-info 請求
        setTableInfo(null);
        setTplWarnAck(false);   // 換範本 → 重置髒範本警告
        setCfg((c) => (c.snColPick === 1 ? c : { ...c, snColPick: 1 }));   // SN 欄選擇回預設第 1 欄
        if (tplPath && mode === "slides" && /\.pptx$/i.test(tplPath)) {
          loadTableInfo(tplPath);
        }
      }, [tplLoadSeq, tplPath, mode]);

      // xlsx：grid 載入後自動偵測表格位置 → 預設「起始 cell + SN 寫入欄」(每範本一次，比照 ppt/key)
      useEffect(() => {
        if (!xlGrid) { excelAutoRef.current = false; return; }
        if (excelAutoRef.current || cfg.snMatchMode) return;
        const d = detectExcelTable(xlGrid);
        if (!d) return;
        excelAutoRef.current = true;
        const headerOrder = (d.headerCols || []).slice();
        setCfg((c) => {
          const next = { ...c, excel: { ...c.excel, startCell: d.startCell, snCol: d.snCol, imgsPerRow: d.imgsPerRow } };
          // 表頭有文字 → 自動把 idx 欄位排成跟表頭一致（依檔名字母後綴自動對位，免手動排序）
          if (headerOrder.some((h) => h)) {
            next.label = { ...c.label, idxSort: "custom", idxOrder: headerOrder };
          }
          return next;
        });
        const L = (ci) => ((xlGrid.cols || [])[ci - 1] || {}).letter || "";
        const ord = headerOrder.filter((h) => h);
        setStatus(`偵測到表格 ${L(d.region.minC)}${d.region.minR}:${L(d.region.maxC)}${d.region.maxR} → 起始 ${d.startCell}、SN 欄 ${d.snCol}`
          + (ord.length ? `、欄位依表頭對位（${ord.join(" / ")}）` : ""));
      }, [xlGrid]);

      // 「依順序」已移除：依檔名(非 snMatch)固定用 idx 對位。自我修復——若舊 session / 舊
      // recipe 讓 autoAlign=false，強制回 true，否則「對位用哪一段?」欄位定義 UI 會消失且無 toggle 可救。
      useEffect(() => {
        if (!cfg.snMatchMode && !cfg.autoAlign) setCfg((c) => ({ ...c, autoAlign: true }));
      }, [cfg.snMatchMode, cfg.autoAlign]);

      // xlsx 依範本 SN：偵測範本「SN 欄」與其已填的值（給「讀範本欄」用，並可自動產生 SN 清單）
      // 注意：SN 起始列要看「表格首列(表頭)的下一列」，不能用 detectExcelTable 的 startCell——
      //   那個 startCell 是依「圖片欄有無文字」推算，若資料列的圖片欄已預填(如 QN1/QN2 的 UC3 值)，
      //   會把資料列誤判成表頭 → 起始列被往下推、漏掉前幾個 SN。
      const xlsxSn = useMemo(() => {
        if (mode !== "excel" || !xlGrid) return null;
        const d = detectExcelTable(xlGrid);
        if (!d) return null;
        // SN 欄＝表格最左欄 +(snColPick-1)；snColPick 是「相對表格的第幾欄」(1=最左)
        const tblCols = d.region.maxC - d.region.minC + 1;
        const pick = Math.max(1, Math.min(tblCols, cfg.snColPick || 1));
        const snColIdx = d.region.minC + (pick - 1);
        const letterOf = (ci) => ((xlGrid.cols || [])[ci - 1] || {}).letter || "";
        const headerRow = d.region.minR;   // 表格首列＝表頭（SN 標籤），SN 資料從下一列起
        const sns = (xlGrid.cells || [])
          .filter((c) => c.c === snColIdx && c.r > headerRow && String(c.text || "").trim())
          .sort((a, b) => a.r - b.r)
          .map((c) => ({ sn: String(c.text).trim(), row: c.r }));
        return { col: letterOf(snColIdx), startRow: headerRow + 1, sns };
      }, [mode, xlGrid, cfg.snColPick]);

      // 範本表頭欄位順序（給「依範本表頭」還原按鈕用；非 xlsx 表格則為空）。
      // 可靠依據：UI 的「起始 cell」——其欄＝影像欄起點、上一列＝表頭列；不靠猜 SN 欄。
      //   startCell 由偵測預填、且使用者可更正 → 改了 startCell，表頭欄位即跟著正確。
      const tblHeaderOrder = useMemo(() => {
        if (!xlGrid || !cfg.excel.startCell) return [];
        const sc = parseCell(cfg.excel.startCell);
        if (sc.row < 2) return [];                       // 起始列須 ≥2，上一列才有表頭
        const headerRow = sc.row - 1;
        const cells = xlGrid.cells || [];
        let maxC = sc.col;                                // 影像欄右界＝框線/文字最右欄
        for (const a of cells) if (a.c > maxC && String(a.text ?? "").trim()) maxC = a.c;
        for (const b of (xlGrid.borders || [])) if (b.c > maxC) maxC = b.c;
        const cols = [];
        for (let col = sc.col; col <= maxC; col++) {
          const cell = cells.find((c) => c.r === headerRow && c.c === col);
          cols.push(cell && cell.text != null ? String(cell.text).trim() : "");
        }
        while (cols.length && !cols[cols.length - 1]) cols.pop();   // 去尾端空白欄
        return cols;
      }, [xlGrid, cfg.excel.startCell]);

      // 防呆：乾淨範本的「資料區(表頭以下、表格範圍內)」應全空，交給程式填 SN＋貼圖。
      //   若資料區有任何非空儲存格 —— 不論是錯誤值(#VALUE! 殘留) 或預填的 SN/資料(如 2EG/2JG)
      //   —— 都視為髒範本，跳阻擋對話框。
      const tplDirtyCells = useMemo(() => {
        if (!xlGrid) return [];
        const d = detectExcelTable(xlGrid);
        if (!d || !d.region) return [];
        // 表頭＝表格最上一列(region.minR)，其下皆為資料區。不可用 startCell 推算 —— 殘留的
        //   #VALUE! 在影像欄會把表頭偵測往下推、反而把自己排除；直接用 minR+1 才抓得到。
        const { minR, minC, maxC } = d.region;
        const dataStartRow = minR + 1;
        return (xlGrid.cells || []).filter((c) =>
          c.r >= dataStartRow && c.c >= minC && c.c <= maxC &&
          c.text != null && String(c.text).trim() !== ""
        );
      }, [xlGrid]);

      // ppt/key 範本表格（給 SN 寫入儲存格的 max / 範圍提示用）
      const slidesTbl = (mode === "slides" && tableInfo && !tableInfo.error) ? (tableInfo.tables || [])[0] : null;
      // 依範本 SN（PPT）：偵測表頭/SN欄/資料列，並列出可對應的表頭欄（給來源欄位下拉用）
      const slidesSnInfo = (() => {
        if (!slidesTbl) return null;
        const d = detectSlidesTable(slidesTbl, cfg.snColPick) || { snCol: 1, snRowStart: 2 };
        const headerRow1 = d.snRowStart - 1, snCol0 = d.snCol - 1;
        const ncols = slidesTbl.cols || (slidesTbl.col_widths_cm || []).length;
        // 可對應欄 = SN 欄以外的所有欄（忠實呈現範本；SN 欄不列入對應目標）
        const headers = [];
        for (let c1 = 1; c1 <= ncols; c1++) {
          if (c1 - 1 === snCol0) continue;
          const cell = (slidesTbl.cells || []).find((x) => x.r === headerRow1 && x.c === c1);
          const text = cell ? String(cell.text || "").trim() : "";
          if (text) headers.push(text);
        }
        // SN 欄資料列已填的值 → 供「依範本 SN」直接讀取(pptx 用，不碰 openpyxl)。
        //   範本若有多頁（每頁一個同結構表格），跨「所有頁」依序彙整 SN → 自動湊成多頁的 SN 清單。
        const allTbls = (tableInfo?.tables || []);
        const snCells = [];
        for (const tbl of allTbls) {
          (tbl.cells || [])
            .filter((x) => x.c === d.snCol && x.r >= d.snRowStart && String(x.text || "").trim())
            .sort((a, b) => a.r - b.r)
            .forEach((x) => snCells.push(String(x.text).trim()));
        }
        return { ...d, headers, snCells, ncols, dataRows: Math.max(0, (slidesTbl.rows || 0) - (d.snRowStart - 1)) };
      })();

      // 載入範本時自動選 SN 欄（每個範本一次）：表頭關鍵字優先 → 只有一欄有資料 → 都不符合就不選(留第1欄手選)
      const snAutoColRef = useRef(-1);
      useEffect(() => {
        const KW = /sn|sample|config|序[號号]|樣品|样品|編[號号]|编[號号]|serial/i;
        const pick = (cells, ncols, headerR, dataStartR, colBase) => {
          for (let c = 1; c <= ncols; c++) {   // 1) 表頭含關鍵字
            const hc = cells.find((x) => x.r === headerR && x.c === (colBase + c - 1));
            if (hc && KW.test(String(hc.text || ""))) return c;
          }
          const withData = [];                 // 2) 只有一欄有資料值
          for (let c = 1; c <= ncols; c++) {
            if (cells.some((x) => x.c === (colBase + c - 1) && x.r >= dataStartR && String(x.text || "").trim())) withData.push(c);
          }
          return withData.length === 1 ? withData[0] : null;   // 3) 不確定 → null（不自動選）
        };
        let best = null;
        if (mode === "slides" && slidesTbl) {
          const d = detectSlidesTable(slidesTbl) || { snRowStart: 2 };
          const ncols = slidesTbl.cols || (slidesTbl.col_widths_cm || []).length;
          best = pick(slidesTbl.cells || [], ncols, d.snRowStart - 1, d.snRowStart, 1);
        } else if (mode === "excel" && xlGrid) {
          const d = detectExcelTable(xlGrid);
          if (d) best = pick(xlGrid.cells || [], d.region.maxC - d.region.minC + 1, d.region.minR, d.region.minR + 1, d.region.minC);
        } else return;
        if (snAutoColRef.current === tplLoadSeq) return;
        snAutoColRef.current = tplLoadSeq;
        // 一律覆寫成偵測結果（算不出就回第 1 欄）→ 避免沿用上一個範本殘留的選擇
        const target = best || 1;
        setCfg((cf) => (cf.snColPick === target ? cf : { ...cf, snColPick: target }));
      }, [slidesTbl, xlGrid, mode, tplLoadSeq]);

      // 依範本 SN：表格各欄選項（給「選 SN 欄」下拉用），value=相對表格的第幾欄(1-based)
      const snColOptions = (() => {
        if (mode === "slides" && slidesTbl) {
          const headerRow1 = (slidesSnInfo?.snRowStart || 2) - 1;
          const ncols = slidesTbl.cols || (slidesTbl.col_widths_cm || []).length;
          return Array.from({ length: ncols }, (_, i) => {
            const c1 = i + 1;
            const cell = (slidesTbl.cells || []).find((x) => x.r === headerRow1 && x.c === c1);
            const h = cell ? String(cell.text || "").trim() : "";
            return { value: c1, label: `第 ${c1} 欄${h ? `（${h}）` : ""}` };
          });
        }
        if (mode === "excel" && xlGrid) {
          const d = detectExcelTable(xlGrid);
          if (!d) return [];
          const opts = [];
          for (let ci = d.region.minC; ci <= d.region.maxC; ci++) {
            const cell = (xlGrid.cells || []).find((x) => x.r === d.region.minR && x.c === ci);
            const h = cell ? String(cell.text || "").trim() : "";
            const letter = ((xlGrid.cols || [])[ci - 1] || {}).letter || "";
            opts.push({ value: ci - d.region.minC + 1, label: `${letter} 欄${h ? `（${h}）` : ""}` });
          }
          return opts;
        }
        return [];
      })();

      // 套用表格：用表格座標填「位置 + 圖片區總寬」，圖片欄數/列數「跟隨使用者左側設定」
      // （表格常把多張圖放在一個寬的合併欄，欄數看不出來，所以用使用者的 cols 平分）
      const applyTable = (t, scOverride, srOverride, preserveWidth) => {
        if (!tableInfo) return;
        const W = tableInfo.slide.width_cm, H = tableInfo.slide.height_cm;
        const cw = t.col_widths_cm || [], rh = t.row_heights_cm || [];
        const sc = Math.max(0, Math.min(t.cols - 1, scOverride != null ? scOverride : tblSkipCols));
        const sr = Math.max(0, Math.min(t.rows - 1, srOverride != null ? srOverride : tblSkipRows));
        // ⚠ 實測：LibreOffice / PowerPoint 渲染表格以「列高加總」為準，忽略 graphicFrame 高度。
        //   所以用 sumRH(列高加總) 當有效表格高、各列用原始列高(不縮放)。欄寬同理用加總。
        const sumRH = rh.reduce((a, b) => a + b, 0) || t.height_cm;
        const labelW = cw.slice(0, sc).reduce((a, b) => a + b, 0);
        const imgAreaW = Math.max(0.1, cw.slice(sc).reduce((a, b) => a + b, 0));
        const headerH = rh.slice(0, sr).reduce((a, b) => a + b, 0);   // 不縮放
        const imgLeft = t.left_cm + labelW;
        const imgTop = t.top_cm + headerH;
        // 圖片列高：用「(列高加總 − 表頭) ÷ 圖片列數」平分（不縮放，對齊實際渲染）
        const imageRows = Math.max(1, t.rows - sr);
        const imgRowH = (sumRH - headerH) / imageRows;
        const pct = (v) => Math.round(v * 100) / 100;
        pushHistory("套用表格");
        setCfg((c) => {
          const cols = Math.max(1, c.grid.cols);          // 跟隨使用者「欄」設定
          // 預設：圖高填 ~88% 列高 → 反推圖寬(保比例)；剩餘空間均分成等距(含外緣)
          const firstFile = orderedFiles && orderedFiles[0];
          const aspect0 = firstFile && firstFile.h && firstFile.w ? firstFile.h / firstFile.w : 0.62;
          let dImgW = (imgRowH * 0.88) / aspect0;
          const slotW0 = imgAreaW / cols;
          if (dImgW > slotW0 * 0.96) dImgW = slotW0 * 0.96;
          const dGap = Math.max(0, (imgAreaW - cols * dImgW) / (cols + 1));
          return {
            ...c,
            slide: { width_cm: W, height_cm: H },
            grid: {
              ...c.grid,
              origin: { x: pct(imgLeft / W * 100), y: pct(imgTop / H * 100) },
              // 由 toggle 重新開啟智能排列時保留現有圖寬(填滿格高%不被打回預設)；初次/改略過欄列才用 88% 預設
              width: preserveWidth && c.grid.width > 0 ? c.grid.width : pct(dImgW / W * 100),
              areaW: pct(imgAreaW / W * 100),    // 圖片區總寬 → 整組置中
              gap: { x: pct(dGap / W * 100), y: 0 },  // 預設等距(間距X)，可調
              rowH: pct(imgRowH / H * 100),   // 鎖死列高 → 圖片保比例、垂直置中、貼齊表格列
              // cols / rows 都不動 → 完全跟隨左側面板「每頁網格」設定
            },
            label: {
              ...c.label,
              enabled: sc > 0,
              x: pct(t.left_cm / W * 100),
              width: pct(labelW / W * 100),
            },
          };
        });
        setStatus(`智能排列已開啟。欄、列數請用左側「每頁網格」設定（此表格有 ${Math.max(1, t.rows - sr)} 個圖片列）`);
      };

      // 關閉智能排列：把智能排列「當下」的幾何烘焙進「舊的等比手動模型」(rowH=0)，
      //   而非保留鎖死列高。這樣 ON→OFF 逐欄對齊不跳，且之後調尺寸回到「整體等比縮放」舊手感
      //   (列高=圖高隨尺寸一起長、垂直間距固定)，不會出現「先吃垂直留白、再撐水平」的怪行為。
      // 換算(以第一張的有效比例 asp 為準，統一裁切時精確；各欄不同裁切時為近似)：
      //   水平：實際圖寬 colW、即時等距 d(填滿 areaW)→ width=colW、gap.x=d、origin.x+=d(補左外緣)
      //   垂直：智能排列圖高 imgH 在格高 cellH 內置中 → 把上下留白轉成固定的 gap.y 與 origin.y 偏移
      //         gap.y = (cellH-imgH)+原gap.y、origin.y += (cellH-imgH)/2 → 逐列 y 與 ON 完全吻合
      const clearTable = () => {
        pushHistory("關閉智能排列");
        setCfg((c) => {
          const W = c.slide.width_cm, H = c.slide.height_cm, g = c.grid;
          const cellH = H * g.rowH / 100;
          const wCm = W * g.width / 100;
          const asp = effAspect((orderedFiles || [])[0]) || 0.62;
          const imgH = Math.min(wCm * asp, cellH);            // 智能排列當下的圖高
          const colW = asp > 0 ? imgH / asp : wCm;            // 智能排列當下的實際圖寬
          const cols = c.autoAlign ? Math.max(1, autoIdxList.length) : Math.max(1, g.cols);
          const areaWcm = W * g.areaW / 100;
          const d = Math.max(0, (areaWcm - cols * colW) / (cols + 1));   // 即時等距(含外緣)
          const gyCm = H * g.gap.y / 100;
          const pctW = (v) => Math.round(v / W * 100 * 100) / 100;
          const pctH = (v) => Math.round(v / H * 100 * 100) / 100;
          return {
            ...c,
            grid: {
              ...g,
              origin: {
                x: Math.round((g.origin.x + pctW(d)) * 100) / 100,
                y: Math.round((g.origin.y + pctH((cellH - imgH) / 2)) * 100) / 100,
              },
              gap: { x: pctW(d), y: pctH(cellH - imgH + gyCm) },
              width: pctW(colW),
              rowH: 0,      // 解除鎖死列高 → 尺寸調整回到「整體等比縮放」舊行為
              areaW: 0,
            },
          };
        });
        setStatus("智能排列已關閉（版面保留，可手動微調）");
      };
      const smartOn = cfg.grid.areaW > 0;

      // 有效比例：考慮裁切後的長寬比 (全域 cfg.crop 或 各欄 idxCrops)，避免圖被拉伸
      const cropOfFile = (f) => {
        if (!f) return null;
        if (cfg.autoAlign && cfg.cropMode === "per-col") {
          const { idx } = extractGroupIdx(f.name || "", cfg.label.pattern);
          const c = (cfg.label.idxCrops || {})[String(idx)];
          return c && c.enabled ? c : null;
        }
        return cfg.crop && cfg.crop.enabled ? cfg.crop : null;
      };
      const effAspect = (f) => {
        if (!f || !f.w || !f.h) return 0.75;
        let asp = f.h / f.w;
        const c = cropOfFile(f);
        if (c) {
          const cw = (c.right - c.left), ch = (c.bottom - c.top);
          if (cw > 0 && ch > 0) asp = (f.h * ch) / (f.w * cw);
        }
        return asp;
      };

      // 預設 ON：表格讀到後、若還沒套過且目前非智能模式，自動套用智能排列 (一次)
      useEffect(() => {
        if (!autoAppliedRef.current && !smartOn && tableInfo && (tableInfo.tables || []).length > 0) {
          autoAppliedRef.current = true;
          const t0 = tableInfo.tables[0];
          const d = detectSlidesTable(t0);   // 自動偵測表頭列 / 標籤欄 → 預設 略過 + SN 寫入位置
          if (d) {
            setTblSkipCols(d.skipCols);
            setTblSkipRows(d.skipRows);
            setCfg((c) => ({ ...c, slidesSn: { ...c.slidesSn, col: d.snCol, rowStart: d.snRowStart } }));
            applyTable(t0, d.skipCols, d.skipRows);
          } else {
            applyTable(t0);
          }
        }
      }, [tableInfo]);
      // 智能模式換算：
      //   smartHeightFillW = grid.width%，使圖高=格高 (= 填滿格高 100%)
      //   smartMaxWidthPct = grid.width 上限 = min(填滿格高, N欄填滿圖片區)；超過沒意義
      //   smartFillRatio   = 目前 grid.width 對應的「填滿格高 %」(顯示用)
      const _smartAspect = effAspect((orderedFiles || [])[0]) || 0.62;   // 含裁切的有效比例
      const smartHeightFillW = smartOn
        ? Math.round((cfg.slide.height_cm * cfg.grid.rowH / 100 / _smartAspect) / cfg.slide.width_cm * 100 * 100) / 100
        : 100;
      const smartMaxWidthPct = (() => {
        if (!smartOn) return Infinity;
        const areaW = cfg.slide.width_cm * cfg.grid.areaW / 100;
        const cols = cfg.autoAlign ? Math.max(1, autoIdxList.length) : Math.max(1, cfg.grid.cols);
        const widthFillW = areaW / cols / cfg.slide.width_cm * 100;   // N欄填滿時的 grid.width%
        return Math.round(Math.min(smartHeightFillW, widthFillW) * 100) / 100;
      })();
      const smartFillRatio = smartOn && smartHeightFillW > 0
        ? Math.round(cfg.grid.width / smartHeightFillW * 100)
        : 100;
      // 智能模式：grid.width 若超過上限 (裁切/比例變動後可能發生) → 自動夾回，避免「填滿格高」>100% 與溢出
      useEffect(() => {
        if (smartOn && isFinite(smartMaxWidthPct) && cfg.grid.width > smartMaxWidthPct + 0.01) {
          setGrid("width", smartMaxWidthPct);
        }
      }, [smartOn, smartMaxWidthPct, cfg.grid.width]);

      // drag-drop handlers
      const onDropTemplate = async (e) => {
        e.preventDefault(); setDragTpl(false);
        const fs = await filesFromDrop(e.dataTransfer);
        const tpl = fs.find((f) => /\.(pptx|key|xlsx)$/i.test(f.name)) || fs[0];
        if (tpl) uploadTemplate(tpl);
      };
      const onDropImages = async (e) => {
        e.preventDefault(); setDragImg(false);
        const fs = await filesFromDrop(e.dataTransfer);
        const imgs = fs.filter((f) => /\.(png|jpe?g|jfif|gif|bmp|webp|tiff?)$/i.test(f.name));
        if (imgs.length) uploadImages(imgs);
        else setStatus("拖入的內容沒有圖片檔 (png/jpg/webp/gif/bmp/tiff)");
      };

      const doScanFolder = async (folder) => {
        const r = await fetch("/api/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ folder, extensions: cfg.extensions }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || "scan failed");
        setFiles(j.files);
        setOrder(j.files.map((f) => f.path));
        setStatus(`偵測到 ${j.files.length} 張圖`);
        return j.files;
      };

      const doLoadTemplate = async (overridePath) => {
        const path = overridePath || tplPath;
        if (!path) return;
        setBusy(true); setStatus("載入範本中…");
        try {
          const r = await fetch("/api/template/load", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path }),
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "載入失敗");
          setTpl(j);
          setCfg((c) => ({
            ...c,
            slide: { width_cm: j.width_cm, height_cm: j.height_cm },
            output: { ...c.output, template: j.path },
          }));
          setStatus(`已載入範本 (${j.width_cm.toFixed(2)} × ${j.height_cm.toFixed(2)} cm)`);
        } catch (e) { setStatus("錯誤: " + e.message); }
        finally { setBusy(false); }
      };

      const scanOnly = async () => {
        const r = await fetch("/api/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ folder: cfg.folder, extensions: cfg.extensions }),
        });
