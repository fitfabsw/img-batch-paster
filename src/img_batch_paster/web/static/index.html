        const j = await r.json();
        if (!r.ok) throw new Error(j.error || "scan failed");
        return j;
      };

      const doScan = async () => {
        if (!cfg.folder) { setStatus("錯誤: 請先指定圖片資料夾"); return; }
        setBusy(true); setStatus("掃描中…");
        try {
          const j = await scanOnly();
          setFiles(j.files);
          setOrder(j.files.map((f) => f.path));  // 預設字母序
          setStatus(`偵測到 ${j.files.length} 張圖`);
        } catch (e) { setStatus("錯誤: " + e.message); setFiles([]); setOrder([]); }
        finally { setBusy(false); }
      };

      const doExport = async () => {
        // SN 對照模式 — 自成一條路徑
        if (cfg.snMatchMode) {
          if (!tplPath) { setStatus("錯誤: 請先上傳範本"); return; }
          if (!snList.length) { setStatus("錯誤: 請先提供 SN 清單"); return; }
          if (!cfg.sources.length) { setStatus("錯誤: 至少需一個來源"); return; }

          // PPT/Keynote：依範本 SN → 把照片填入「表格儲存格」(cell fill)，跟著格子走、任何檢視器都對齊
          if (mode === "slides") {
            if (!slidesTbl) { setStatus("錯誤: 此 PPT 範本沒有表格"); return; }
            setBusy(true); setStatus("組裝 SN 對照投影片…");
            try {
              const d = detectSlidesTable(slidesTbl, cfg.snColPick) || { snCol: 1, snRowStart: 2 };
              const snCol0 = d.snCol - 1, dataStart0 = d.snRowStart - 1;
              const headerRow1 = d.snRowStart - 1, ncols = slidesTbl.cols || (slidesTbl.col_widths_cm || []).length;
              const headerText = (c1) => { const cell = (slidesTbl.cells || []).find((x) => x.r === headerRow1 && x.c === c1); return cell ? String(cell.text || "").trim() : ""; };
              const colForSource = (s) => {                 // 來源 → 0-based 欄索引（依表頭名 / slidesCol）
                const want = String(s.slidesCol || s.name || "").toLowerCase();
                if (!want) return null;
                for (let c1 = 1; c1 <= ncols; c1++) { if (c1 - 1 === snCol0) continue; const h = headerText(c1).toLowerCase(); if (h && h === want) return c1 - 1; }
                return null;
              };
              const perCol = cfg.cropMode === "per-col";
              const globalCrop = cfg.crop?.enabled ? cfg.crop : null;
              const dataRows = Math.max(1, (slidesTbl.rows || 0) - dataStart0);
              // 已上傳但對不到欄的來源 → 擋下，不偷偷略過（避免照片沒貼進去卻沒回饋）
              const unmatched = cfg.sources.filter((s) => (s.files?.length || 0) > 0 && colForSource(s) == null).map((s) => s.name);
              if (unmatched.length) throw new Error(`來源「${unmatched.join("、")}」的資料夾名對不到表頭欄（Before/After…）→ 請在「對應欄」手選欄位，或改資料夾名後重新上傳`);
              const pages = []; let mapped = 0;
              for (let p = 0; p * dataRows < snList.length; p++) {
                const sn = [], img = [];
                for (let k = 0; k < dataRows; k++) {
                  const idx = p * dataRows + k; const r0 = dataStart0 + k;
                  if (idx >= snList.length) {   // 末頁不滿 → 寫空字串清掉範本預填的殘留 SN
                    sn.push({ row: r0, col: snCol0, text: "", font_pt: cfg.label.font_pt || 14, bold: true });
                    continue;
                  }
                  const item = snList[idx];
                  sn.push({ row: r0, col: snCol0, text: item.sn, font_pt: cfg.label.font_pt || 14, bold: true });
                  const stem = String(item.sn).toLowerCase();
                  for (const s of cfg.sources) {
                    const c0 = colForSource(s); if (c0 == null) continue;
                    const f = (s.files || []).find((x) => (x.name || "").replace(/\.[^./]+$/, "").toLowerCase() === stem);
                    if (!f) continue;
                    img.push({ row: r0, col: c0, path: f.path, crop: perCol ? (s.crop?.enabled ? s.crop : null) : globalCrop });
                    mapped++;
                  }
                }
                pages.push({ sn, img });
              }
              if (!mapped) throw new Error("沒有可匯出的圖片（檢查 SN 與來源檔名、來源資料夾名 vs 表頭是否對應）");
              const fitMode = cfg.snAdjust?.fit || "contain";
              const fillFrac = Math.max(5, Math.min(100, cfg.snAdjust?.fill ?? 90)) / 100;
              // 等高對齊：算出所有圖「都放得下」的共同高度(佔格高比例)，傳給後端 → 保比例不裁切、全部同高
              let alignFrac = fillFrac;
              if (fitMode === "contain_align") {
                const cwArr = slidesTbl.col_widths_cm || [];
                const chCm = (slidesTbl.row_heights_cm || [])[1] || 4.28;
                const fileByPath = {};
                cfg.sources.forEach((s) => (s.files || []).forEach((x) => { fileByPath[x.path] = x; }));
                for (const pg of pages) for (const ic of pg.img) {
                  const fl = fileByPath[ic.path];
                  if (!fl || !fl.w || !fl.h) continue;
                  // 用裁切後的有效長寬比（ic.crop 已是解析後的每張裁切）
                  const cr = ic.crop;
                  const ew = fl.w * (cr ? Math.max(0.01, cr.right - cr.left) : 1);
                  const eh = fl.h * (cr ? Math.max(0.01, cr.bottom - cr.top) : 1);
                  const colW = cwArr[ic.col] || chCm;
                  alignFrac = Math.min(alignFrac, fillFrac, fillFrac * (colW / chCm) * (eh / ew));
                }
              }
              const body = JSON.stringify({
                snCellPages: pages, fill: fillFrac, fit: fitMode, alignFrac,
                output: cfg.output, workspace: ws,
              });
              setStatus(`匯出 PPT 中… (${mapped} 張圖 · ${pages.length} 頁)`);
              const r = await fetch("/api/export", { method: "POST", headers: { "Content-Type": "application/json" }, body });
              const j = await r.json();
              if (!r.ok) throw new Error(j.error || "export failed");
              const pgMsg = pages.length > 1 ? ` · ${pages.length} 頁` : "";
              if (j.download_url) { window.open(j.download_url, "_blank"); setStatus(`✓ 已匯出 (SN 對照 PPT, ${mapped} 張${pgMsg})`); }
              else setStatus(`✓ ${j.output}${pgMsg}`);
            } catch (e) { setStatus("錯誤: " + e.message); }
            finally { setBusy(false); }
            return;
          }

          setBusy(true); setStatus("組裝 SN 對照 cells…");
          try {
            const perCol = cfg.cropMode === "per-col";
            const cells = [];
            for (const { sn, row } of snList) {
              const stem = sn.toLowerCase();
              for (const s of cfg.sources) {
                const f = (s.files || []).find((x) => (x.name || "").replace(/\.[^./]+$/, "").toLowerCase() === stem);
                if (!f) continue;
                const col = colLetterToIdx(s.targetCol);
                if (!col) continue;
                cells.push({
                  path: f.path, row, col,
                  span_cols: 1, span_rows: 1,
                  crop: perCol && s.crop?.enabled ? s.crop : null,
                });
              }
            }
            if (!cells.length) throw new Error("沒有可匯出的圖片 (檢查 SN 與來源檔名是否對應)");
            const body = JSON.stringify({
              cells, output: cfg.output, workspace: ws,
              embedInCell: !!cfg.excel.embedInCell,
              imgFit: cfg.excel.imgFit || "contain",
              containInset: Math.max(0, Math.min(45, cfg.excel.containInset ?? 5)) / 100,
              crop: !perCol ? cfg.crop : null,  // 統一模式：送 global crop
            });
            setStatus(`匯出 Excel 中… (${cells.length} 格)`);
            const r = await fetch("/api/export", {
              method: "POST", headers: { "Content-Type": "application/json" }, body,
            });
            const j = await r.json();
            if (!r.ok) throw new Error(j.error || "export failed");
            if (j.download_url) {
              window.open(j.download_url, "_blank");
              setStatus(`✓ 已匯出 ${cells.length} 格 (SN 對照)`);
            } else {
              setStatus(`✓ ${j.output}`);
            }
          } catch (e) { setStatus("錯誤: " + e.message); }
          finally { setBusy(false); }
          return;
        }

        if (!cfg.folder) { setStatus("錯誤: 請先指定圖片資料夾"); return; }
        setBusy(true); setStatus("匯出中…");
        try {
          let arr = orderedFiles;
          if (arr.length === 0) {
            setStatus("掃描中…");
            const j = await scanOnly();
            setFiles(j.files);
            setOrder(j.files.map((f) => f.path));
            arr = j.files;
          }
          // 依檔名 idx + 各欄獨立：以檔名抽 idx → 查 idxCrops 注入 per-placement crop
          const perColIdxCrop = cfg.autoAlign && cfg.cropMode === "per-col";
          const idxCrops = cfg.label.idxCrops || {};
          const attachIdxCrop = (pl) => {
            if (!perColIdxCrop || !pl.path) return pl;
            // 從 placement 找對應的 file 取檔名抽 idx
            const f = arr.find((x) => x.path === pl.path);
            if (!f) return pl;
            const { idx } = extractGroupIdx(f.name || "", cfg.label.pattern);
            if (idx == null) return pl;
            const c = idxCrops[String(idx)];
            return c?.enabled ? { ...pl, crop: c } : pl;
          };
          let body;
          if (mode === "excel") {
            const cells = computeExcelCells(cfg.excel, cfg.label, arr, cfg.autoAlign).map(attachIdxCrop);
            if (cells.length === 0) throw new Error("沒有可匯出的圖片");
            setStatus(`匯出 Excel 中… (${cells.length} 格)`);
            body = JSON.stringify({
              cells, output: cfg.output, workspace: ws,
              embedInCell: !!cfg.excel.embedInCell,
              imgFit: cfg.excel.imgFit || "contain",
              containInset: Math.max(0, Math.min(45, cfg.excel.containInset ?? 5)) / 100,
              crop: perColIdxCrop ? null : cfg.crop,
            });
          } else {
            const pages = computePages(cfg.slide, cfg.grid, arr, cfg.label, cfg.autoAlign, effAspect)
              .map((page) => page.map(attachIdxCrop));
            if (pages.length === 0) throw new Error("沒有可匯出的圖片");
            setStatus(`匯出中… (${pages.length} 頁)`);
            body = JSON.stringify({
              slide: cfg.slide, pages, output: cfg.output, workspace: ws,
              snInCell: cfg.label.enabled && cfg.slidesSn.inCell,
              snCol: Math.max(0, (cfg.slidesSn.col || 1) - 1),
              snRowStart: Math.max(0, (cfg.slidesSn.rowStart || 2) - 1),
              crop: perColIdxCrop ? null : cfg.crop,
            });
          }
          const r = await fetch("/api/export", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body,
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "export failed");
          if (j.download_url) {
            // 觸發瀏覽器下載
            const a = document.createElement("a");
            a.href = j.download_url;
            a.download = "";
            document.body.appendChild(a); a.click(); a.remove();
            setStatus(`✓ 已產出 ${j.pages} 頁，已開始下載`);
            showToast({ kind: "success", title: "✓ 已下載！", sub: `${j.pages} 頁完成 · 換一批圖、用同設定可再匯出` });
          } else {
            setStatus(`✓ 已輸出 ${j.pages} 頁: ${j.output}`);
          }
        } catch (e) { setStatus("錯誤: " + e.message); console.error(e); }
        finally { setBusy(false); }
      };

      // --- 選取 ---
      const selPathsOrFallback = () =>
        selectedPaths.length ? selectedPaths : (selected ? [selected] : []);

      const onItemClick = (e, path, idx) => {
        if (e.shiftKey && anchorRef.current != null) {
          const a = anchorRef.current, b = idx;
          const [lo, hi] = a < b ? [a, b] : [b, a];
          setSelectedPaths(orderedFiles.slice(lo, hi + 1).map((f) => f.path));
        } else if (e.metaKey || e.ctrlKey) {
          setSelectedPaths((prev) =>
            prev.includes(path) ? prev.filter((p) => p !== path) : [...prev, path]);
          anchorRef.current = idx;
        } else {
          setSelectedPaths([path]);
          anchorRef.current = idx;
          setCurrentPage(Math.floor(idx / Math.max(1, cfg.grid.cols * cfg.grid.rows)));
        }
        setSelected(path);
      };

      // --- 排序 / 刪除 ---
      const moveSelected = (delta) => {
        const sel = new Set(selPathsOrFallback());
        if (!sel.size) return;
        pushHistory(delta < 0 ? "上移" : "下移");
        setOrder((o) => {
          const next = [...o];
          const idxs = next.map((p, i) => (sel.has(p) ? i : -1)).filter((i) => i >= 0);
          const seq = delta < 0 ? idxs : [...idxs].reverse();
          for (const i of seq) {
            const t = i + delta;
            if (t < 0 || t >= next.length || sel.has(next[t])) continue;
            [next[i], next[t]] = [next[t], next[i]];
          }
          return next;
        });
      };
      const moveTop = () => {
        const sel = new Set(selPathsOrFallback());
        if (!sel.size) return;
        pushHistory("置頂");
        setOrder((o) => [...o.filter((p) => sel.has(p)), ...o.filter((p) => !sel.has(p))]);
      };
      const moveBottom = () => {
        const sel = new Set(selPathsOrFallback());
        if (!sel.size) return;
        pushHistory("置底");
        setOrder((o) => [...o.filter((p) => !sel.has(p)), ...o.filter((p) => sel.has(p))]);
      };
      const deleteSelected = () => {
        const sel = new Set(selPathsOrFallback());
        if (!sel.size) return;
        pushHistory(`刪除 ${sel.size} 張`);
        setOrder((o) => o.filter((p) => !sel.has(p)));
        setFiles((fs) => fs.filter((f) => !sel.has(f.path)));
        setSelectedPaths([]);
        setSelected(null);
      };
      const resetSort = () => {
        pushHistory("A→Z 排序");
        // 自然排序：數字段當數字比，QN2 在 QN10 前面（非純字典序）
        setOrder([...files]
          .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: "base" }))
          .map((f) => f.path));
        setSelectedPaths([]);
      };

      // --- 拖曳重排 ---
      // 拖曳到清單上/下緣自動捲動
      const startAutoScroll = () => {
        if (scrollRafRef.current) return;
        const step = () => {
          const el = listRef.current;
          if (el && scrollDirRef.current !== 0) el.scrollTop += scrollDirRef.current * 10;
          scrollRafRef.current = requestAnimationFrame(step);
        };
        scrollRafRef.current = requestAnimationFrame(step);
      };
      const stopAutoScroll = () => {
        if (scrollRafRef.current) { cancelAnimationFrame(scrollRafRef.current); scrollRafRef.current = null; }
        scrollDirRef.current = 0;
      };
      const onListDragOver = (e) => {
        const el = listRef.current;
        if (!el) return;
        const rect = el.getBoundingClientRect();
        const EDGE = 48;
        if (e.clientY < rect.top + EDGE) scrollDirRef.current = -1;
        else if (e.clientY > rect.bottom - EDGE) scrollDirRef.current = 1;
        else scrollDirRef.current = 0;
        if (scrollDirRef.current !== 0) startAutoScroll();
        else stopAutoScroll();
      };

      const onItemDragStart = (e, path) => {
        const inSel = selectedPaths.includes(path);
        if (!inSel) { setSelectedPaths([path]); setSelected(path); }
        dragFromRef.current = path;
        e.dataTransfer.effectAllowed = "move";
        // 多選時顯示「移動 N 個檔案」的拖曳殘影
        const count = inSel ? selectedPaths.length : 1;
        if (count > 1) {
          const ghost = document.createElement("div");
          ghost.textContent = `移動 ${count} 個檔案`;
          ghost.style.cssText =
            "position:absolute;top:-1000px;left:-1000px;padding:6px 12px;" +
            "background:#059669;color:#fff;border-radius:8px;font-size:13px;" +
            "font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.25);white-space:nowrap;";
          document.body.appendChild(ghost);
          e.dataTransfer.setDragImage(ghost, 12, 12);
          setTimeout(() => { try { document.body.removeChild(ghost); } catch (_) {} }, 0);
        }
      };
      const onItemDrop = (e, targetPath) => {
        e.preventDefault();
        const from = dragFromRef.current;
        setDragOverIdx(null);
        if (!from) return;
        pushHistory("拖曳重排");
        const movingSet = new Set(selectedPaths.includes(from) ? selectedPaths : [from]);
        setOrder((o) => {
          const movingOrdered = o.filter((p) => movingSet.has(p));
          const without = o.filter((p) => !movingSet.has(p));
          let at = without.indexOf(targetPath);
          if (at < 0) at = without.length;
          return [...without.slice(0, at), ...movingOrdered, ...without.slice(at)];
        });
        dragFromRef.current = null;
        stopAutoScroll();
      };

      // --- 對位模式：以 SN 群組為單位拖曳重排 ---
      const onCardDragStart = (e, group) => {
        dragFromRef.current = `__group:${group}`;
        e.dataTransfer.effectAllowed = "move";
        const ghost = document.createElement("div");
        ghost.textContent = `移動 SN「${group}」`;
        ghost.style.cssText =
          "position:absolute;top:-1000px;left:-1000px;padding:6px 12px;" +
          "background:#0284c7;color:#fff;border-radius:8px;font-size:13px;" +
          "font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.25);white-space:nowrap;";
        document.body.appendChild(ghost);
        e.dataTransfer.setDragImage(ghost, 12, 12);
        setTimeout(() => { try { document.body.removeChild(ghost); } catch (_) {} }, 0);
      };
      const onCardDrop = (e, targetGroup) => {
        e.preventDefault();
        const from = dragFromRef.current;
        setDragOverIdx(null);
        dragFromRef.current = null;
        stopAutoScroll();
        if (!from || !from.startsWith("__group:")) return;
        const fromGroup = from.slice(8);
        if (fromGroup === targetGroup) return;
        pushHistory(`移動 SN 列「${fromGroup}」`);
        const pattern = cfg.label.pattern;
        const fileMap = new Map(files.map((f) => [f.path, f]));
        setOrder((o) => {
          const map = new Map();
          const groupOrder = [];
          for (const p of o) {
            const f = fileMap.get(p);
            if (!f) continue;
            const g = extractGroupIdx(f.name, pattern).group;
            if (!map.has(g)) { map.set(g, []); groupOrder.push(g); }
            map.get(g).push(p);
          }
          const fi = groupOrder.indexOf(fromGroup);
          if (fi < 0) return o;
          groupOrder.splice(fi, 1);
          const ti = targetGroup == null ? groupOrder.length : groupOrder.indexOf(targetGroup);
          groupOrder.splice(ti < 0 ? groupOrder.length : ti, 0, fromGroup);
          return groupOrder.flatMap((g) => map.get(g));
        });
      };

      // --- 預覽 ---
      const STAGE_W = 640;
      // 依範本 SN（slides）：縮放用「table-info 回報的真實投影片尺寸」(背景 PNG + placement 同座標系)，
      //   避免 cfg.slide 殘留錯誤高度時，背景被垂直拉伸到不同比例 → 越往下越歪。
      //   依檔名 placement 仍以 cfg.slide 計算，故維持 cfg.slide（已另在 table-info 同步成正確值）。
      const previewSlide = (cfg.snMatchMode && mode === "slides" && tableInfo?.slide?.width_cm)
        ? tableInfo.slide : cfg.slide;
      const scale = STAGE_W / previewSlide.width_cm;
      const stageH = previewSlide.height_cm * scale;
      // 依範本 SN（PPT）：用範本表格幾何把多來源圖依 SN 貼進儲存格 → 預覽與匯出共用
      const snSlide = (cfg.snMatchMode && mode === "slides" && slidesTbl && snList.length)
        ? (() => {
            const d = detectSlidesTable(slidesTbl, cfg.snColPick) || { snCol: 1, snRowStart: 2 };
            return computeSnMatchSlides(slidesTbl, snList, cfg.sources, {
              snCol1: d.snCol, dataStartRow1: d.snRowStart,
              fontPt: cfg.label.font_pt || 18,
              fill: cfg.snAdjust?.fill ?? 90,
              dx: cfg.snAdjust?.manual ? (cfg.snAdjust?.dx ?? 0) : 0,
              dy: cfg.snAdjust?.manual ? (cfg.snAdjust?.dy ?? 0) : 0,
              dataStartCm: slidesTbl.data_start_cm, rowPitchCm: slidesTbl.row_pitch_cm,
              perColCrop: cfg.cropMode === "per-col",
              globalCrop: cfg.crop?.enabled ? cfg.crop : null,
            });
          })()
        : null;
      const _pagesRaw = computePages(cfg.slide, cfg.grid, orderedFiles, cfg.label, cfg.autoAlign, effAspect);
      // SN 寫入表格儲存格：預覽也要反映 → 把 SN 文字移到「範本表格的目標儲存格」矩形(與圖片位置脫鉤)，
      //   欄 = slidesSn.col-1、列 = (rowStart-1) + 該列 row_idx，幾何取自 tableInfo(left/top/各欄寬/各列高)。
      const snInCellPreview = cfg.label.enabled && cfg.slidesSn.inCell && slidesTbl;
      const snCellRect = (rowIdx) => {
        const cw = slidesTbl.col_widths_cm || [], rh = slidesTbl.row_heights_cm || [];
        const col0 = Math.max(0, (cfg.slidesSn.col || 1) - 1);
        const row0 = Math.max(0, (cfg.slidesSn.rowStart || 2) - 1) + (rowIdx || 0);
        if (col0 >= cw.length || row0 >= rh.length) return null;
        return {
          x_cm: slidesTbl.left_cm + cw.slice(0, col0).reduce((a, b) => a + b, 0),
          y_cm: slidesTbl.top_cm + rh.slice(0, row0).reduce((a, b) => a + b, 0),
          w_cm: cw[col0], h_cm: rh[row0],
        };
      };
      // 每個 placement 注入「解析後的裁切」(全域 cfg.crop 或 各欄 idxCrops) → 預覽縮圖才會裁切、且不被拉伸
      //   依範本 SN（PPT）模式直接用 snSlide.pages（placement 已含座標 + _crop）。
      const pages = snSlide ? snSlide.pages : _pagesRaw.map((page) => page.map((pl) => {
        if (pl.text !== undefined && pl.text !== null) {
          if (snInCellPreview) {
            const r = snCellRect(pl.row_idx);
            if (r) return { ...pl, ...r, _snCell: true };
          }
          return pl;
        }
        if (!pl.path) return pl;
        const f = orderedFiles.find((x) => x.path === pl.path);
        return { ...pl, _crop: cropOfFile(f) };
      }));
      const imgW_cm = cfg.slide.width_cm * cfg.grid.width / 100;
      const firstAnchor = orderedFiles[0];
      const previewH_cm = firstAnchor && firstAnchor.w ? imgW_cm * (firstAnchor.h / firstAnchor.w) : null;
      const perPage = Math.max(1, cfg.grid.cols) * Math.max(1, cfg.grid.rows);

      // 決定 crop modal 編輯的對象：cropSourceId → 來源 crop；cropIdxKey → per-idx crop；否則全域 crop
      const editingSource = cropSourceId != null ? cfg.sources.find((s) => s.id === cropSourceId) : null;
      const editingIdxKey = cropIdxKey;
      // 對於 per-idx：找一張該 idx 的代表圖
      const idxRepFile = editingIdxKey
        ? orderedFiles.find((f) => {
            const ex = extractGroupIdx(f.name || "", cfg.label.pattern);
            return String(ex.idx) === String(editingIdxKey);
          })
        : null;
      // 全域 crop：先找 orderedFiles；snMatch 模式 fallback 從 sources 找
      const allSrcFiles = cfg.sources?.flatMap((s) => s.files || []) || [];
      const cropTargetFile = editingSource
        ? (editingSource.files?.find((f) => f.path === selected) || editingSource.files?.[0])
        : editingIdxKey
        ? (idxRepFile || orderedFiles[0])
        : (selected && (orderedFiles.find((f) => f.path === selected) || allSrcFiles.find((f) => f.path === selected)))
          || orderedFiles[0] || allSrcFiles[0];
      const cropInitial = editingSource
        ? editingSource.crop
        : editingIdxKey
        ? (cfg.label.idxCrops?.[editingIdxKey] || { enabled: false, left: 0, top: 0, right: 1, bottom: 1 })
        : cfg.crop;

      const closeCropEdit = () => {
        setCropOpen(false);
        setCropSourceId(null);
        setCropIdxKey(null);
      };

      return (
        <div className="max-w-[1600px] mx-auto p-4 h-screen flex flex-col">
          {helpOpen && <HelpModal onClose={() => setHelpOpen(false)} />}
          {shortcutsOpen && <ShortcutsModal onClose={() => setShortcutsOpen(false)} />}
          {idxConfirm && (
            <IdxConfirmModal
              data={idxConfirm}
              onConfirm={() => { const fs = idxConfirm._files; setIdxConfirm(null); doUploadImages(fs); }}
              onCancel={() => { setIdxConfirm(null); setStatus("已取消上傳，請修正檔名後重新上傳"); }} />
          )}
          {toast && <Toast toast={toast} onClose={() => setToast(null)} />}

                  {(() => {
                    if (!snList.length) return null;
                    const snSet = new Set(snList.map((x) => String(x.sn).toLowerCase()));
                    const stem = (f) => (f.name || "").replace(/\.[^./]+$/, "").toLowerCase();
                    const deadSources = cfg.sources.filter((s) => {
                      const files = s.files || [];
                      return files.length > 0 && !files.some((f) => snSet.has(stem(f)));

                    if (!deadSources.length) return null;
                    const unmatched = deadSources.flatMap((s) => s.files || []);
                    const sample = unmatched.slice(0, 5).map((f) => f.name).join("、");
                    const names = deadSources.map((s) => s.name).filter(Boolean).join("、");

                          if (pl.text !== undefined && pl.text !== null) {
                            return (
                              <div key={i} style={{
                                ...style,
                                display: "flex", alignItems: "center", justifyContent: "center",
                                fontSize: (pl.font_pt || 18) * scale / 28.35,
                                fontWeight: pl.bold ? 700 : 400,
                                color: "#111",
                                ...(pl._snCell ? {
                                  // 不透明背景蓋掉範本原本預填的 SN（避免疊字）；只顯示乾淨的單一 SN
                                  background: "#eafaf1",
                                  outline: "1px dashed rgba(16,185,129,0.7)",
                                  outlineOffset: -1,
                                } : {}),
                              }}
                              title={pl._snCell ? "SN 將寫入此儲存格（匯出結果，會覆蓋範本原值）" : undefined}>
                                {pl.text}
                              </div>
                            );
                          }
                          return (
                            <img key={i}
                              src={thumbUrl(pl.path, 400, pl._crop)}
                              data-preview-path={pl.path}
                              style={{ ...style, scrollMargin: 30 }}
                              className={selected === pl.path ? "ring-4 ring-emerald-500 shadow-[0_0_18px_4px_rgba(16,185,129,0.7)] z-10 relative" : "border border-slate-300"} />
                          );
                        })}
                          </div>

                          {/* 舞台下方：主控制（尺寸／填滿格高）——各模式同位置同大小。
                              X/Y 位移、X起/間距 等已浮入預覽。 */}
                          <div className="flex justify-center mt-3">
                            <div className="relative">
                              {cfg.snMatchMode ? (
                                <Stepper label="填滿格高" orient="h" step={2} value={cfg.snAdjust?.fill ?? 90}
                                  onChange={(v) => setCfg((c) => ({ ...c, snAdjust: { ...c.snAdjust, fill: Math.max(5, Math.min(100, v)) } }))} />
                              ) : smartOn ? (
                                <Stepper label="填滿格高" orient="h" step={2} value={smartFillRatio}
                                  onChange={(r) => {
                                    const rr = Math.max(5, Math.min(100, r));
                                    setGrid("width", Math.min(Math.round(rr / 100 * smartHeightFillW * 100) / 100, smartMaxWidthPct));
                                  }} />
                              ) : (
                                <Stepper label="尺寸" orient="h" value={cfg.grid.width}
                                  onChange={(v) => setGrid("width", v)} />
                              )}
                              <div className="absolute left-0 right-0 top-full text-[10px] text-slate-400 text-center mt-1 pointer-events-none">
                                {(cfg.snMatchMode || smartOn) ? "100% = 圖高填滿格高" : "按比例縮放"}
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                      )}
                       </div>
                      </div>

                      {/* 智能排列：自動讀範本表格、預設對齊。一個 toggle 搞定。依範本 SN 模式不適用 */}
                      {tplPath && mode === "slides" && !cfg.snMatchMode && (() => {
                        const tbl = tableInfo && !tableInfo.error && (tableInfo.tables || [])[0];
                        const imageRows = tbl ? Math.max(1, tbl.rows - Math.min(tbl.rows - 1, tblSkipRows)) : 0;
                        return (
                          <div className="mt-3 pt-3 border-t border-slate-100 shrink-0 flex items-center gap-3 flex-wrap">
                            <button onClick={() => smartOn ? clearTable() : (tbl && applyTable(tbl, undefined, undefined, autoAppliedRef.current))}
                              disabled={!tbl}
                              className={`text-xs px-3 py-1 rounded-full border font-medium ${smartOn
                                ? "bg-emerald-600 text-white border-emerald-700 hover:bg-emerald-700"
                                : "bg-white text-slate-600 border-slate-300 hover:bg-slate-50"} disabled:opacity-40 disabled:cursor-not-allowed`}
                              title="圖片自動對齊範本表格格子。再按一次切回手動網格">
                              ✨ 智能排列：{smartOn ? "開" : "關"}
                            </button>
                            <span className="text-[11px] text-slate-500 flex-1 min-w-[10rem]">
                              {tableInfoLoading ? "讀取範本表格中…"
                                : !tbl ? "此範本沒有表格 — 智能排列不適用，改用左側「每頁網格」＋下方 steppers 手動排"
                                : smartOn ? `圖片已對齊範本表格（${imageRows} 個圖片列）· 用上方「填滿格高」調大小`
                                : "已關閉 — 改用手動網格"}
                            </span>
                            {tbl && smartOn && (
                              <div className="flex items-center gap-2 text-[10px] text-slate-400">
                                <label className="flex items-center gap-1">略過左側
                                  <input type="number" min="0" max={Math.max(0, tbl.cols - 1)} value={tblSkipCols}
                                    onChange={(e) => { const v = Math.max(0, Math.min(tbl.cols - 1, parseInt(e.target.value) || 0)); setTblSkipCols(v); applyTable(tbl, v, tblSkipRows); }}
                                    className="w-9 border rounded px-1 py-0.5" />欄</label>
                                <label className="flex items-center gap-1">頂部
                                  <input type="number" min="0" max={Math.max(0, tbl.rows - 1)} value={tblSkipRows}
                                    onChange={(e) => { const v = Math.max(0, Math.min(tbl.rows - 1, parseInt(e.target.value) || 0)); setTblSkipRows(v); applyTable(tbl, tblSkipCols, v); }}
                                    className="w-9 border rounded px-1 py-0.5" />列</label>
                              </div>
                            )}
                          </div>
                        );
                      })()}
                    </>
                  );
                })()}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
