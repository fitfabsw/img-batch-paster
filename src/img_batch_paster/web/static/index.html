                                <div className="text-[10px] font-mono">{colLabel}</div>
                                <div className="text-[10px]">空</div>
                              </div>
                            );
                          }
                          const isSel = selectedPaths.includes(f.path) || isCellSel;
                          return (
                            <div key={ci} data-r={rIdx} data-c={ci}
                              onClick={(e) => { onItemClick(e, f.path, orderedFiles.indexOf(f)); setSelectedCell({ r: rIdx, c: ci }); }}
                              draggable={false}
                              title={f.name}
                              className={`aspect-square rounded overflow-hidden border cursor-pointer relative ${
                                isSel ? "ring-2 ring-emerald-500 border-emerald-500" : "border-slate-200 hover:border-slate-400"
                              }`}>
                              <img src={thumbUrl(f.path, 120, showPerColCrop ? ((cfg.label.idxCrops || {})[idxList[ci]] || null) : undefined)}
                                className="w-full h-full object-cover pointer-events-none" />
                              <div className="absolute bottom-0 left-0 right-0 text-[9px] text-center bg-black/50 text-white py-0.5 font-mono">{colLabel}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                  </>;
                })() : orderedFiles.map((f, idx) => {
                  const isSel = selectedPaths.includes(f.path);
                  return (
                    <div key={f.path}
                      data-idx={idx}
                      draggable
                      onDragStart={(e) => onItemDragStart(e, f.path)}
                      onDragOver={(e) => { e.preventDefault(); if (dragOverIdx !== idx) setDragOverIdx(idx); }}
                      onDrop={(e) => onItemDrop(e, f.path)}
                      onClick={(e) => onItemClick(e, f.path, idx)}
                      style={{ boxShadow: dragOverIdx === idx ? "inset 0 2px 0 0 #059669" : "" }}
                      className={`flex items-center gap-2 rounded p-1 cursor-pointer select-none ${
                        isSel ? "bg-emerald-100 ring-1 ring-emerald-400" : "hover:bg-slate-50"
                      }`}>
                      <div className="text-xs text-slate-400 w-6 text-right tabular-nums">{idx + 1}</div>
                      <img src={thumbUrl(f.path, 80)}
                        className="w-10 h-10 object-cover border rounded pointer-events-none" />
                      <div className="flex-1 min-w-0 text-xs truncate" title={f.name}>{f.name}</div>
                      <div className="text-slate-300 text-xs pr-1" title="拖曳排序">⋮⋮</div>
                    </div>
                  );
                })}
                {/* 拖到最底：放在清單末端的 drop zone */}
                <div
                  onDragOver={(e) => { e.preventDefault(); setDragOverIdx(9999); }}
                  onDrop={(e) => cfg.autoAlign ? onCardDrop(e, null) : onItemDrop(e, null)}
                  style={{ height: 12, boxShadow: dragOverIdx === 9999 ? `inset 0 2px 0 0 ${cfg.autoAlign ? "#0284c7" : "#059669"}` : "" }} />
                </>}
              </div>
              {orderedFiles.length > 0 && (
                <div className="border-t p-2 space-y-1">
                  {!cfg.autoAlign && (
                    <div className="flex gap-1 text-xs">
                      <button onClick={() => moveSelected(-1)} disabled={!selPathsOrFallback().length}
                        className="flex-1 border rounded py-1 hover:bg-slate-100 disabled:opacity-40">▲ 上移</button>
                      <button onClick={() => moveSelected(1)} disabled={!selPathsOrFallback().length}
                        className="flex-1 border rounded py-1 hover:bg-slate-100 disabled:opacity-40">▼ 下移</button>
                      <button onClick={moveTop} disabled={!selPathsOrFallback().length}
                        className="flex-1 border rounded py-1 hover:bg-slate-100 disabled:opacity-40">置頂</button>
                      <button onClick={moveBottom} disabled={!selPathsOrFallback().length}
                        className="flex-1 border rounded py-1 hover:bg-slate-100 disabled:opacity-40">置底</button>
                    </div>
                  )}
                  <button onClick={deleteSelected} disabled={!selPathsOrFallback().length}
                    title="Delete / Backspace 鍵也可刪除"
                    className="w-full border border-red-300 text-red-600 rounded py-1 text-xs hover:bg-red-50 disabled:opacity-40">
                    刪除選取 ({selPathsOrFallback().length})
                  </button>
                  <div className="text-[10px] text-slate-400 text-center">
                    {cfg.autoAlign
                      ? "拖曳 SN 卡片＝改列順序 · 點圖＝選取 · Del／⌫ 刪除"
                      : "Shift＝範圍選取 · ⌘/Ctrl＝多選 · 拖曳＝排序 · Del／⌫ 刪除"}
                  </div>
                </div>
              )}
            </div>

            {/* 右欄：預覽 */}
            <div className="col-span-6 min-h-0">
              <div className="bg-white rounded-lg shadow p-4 h-full flex flex-col min-h-0">
                {(() => {
                  const total = Math.max(1, pages.length);
                  const pi = Math.min(currentPage, total - 1);
                  const pagePls = pages[pi] || [];
                  const zoomFit = () => {
                    const el = stageWrapRef.current;
                    if (!el) return;
                    // 取得容器可用寬度
                    const containerW = el.clientWidth - 16;
                    let contentW = STAGE_W;
                    if (mode === "excel" && xlGrid) {
                      const cumX = xlGrid.cols.reduce((a, c) => a + c.w_px, 0);
                      contentW = cumX + 32;
                    }
                    userZoomedRef.current = false;  // ⤢ 鈕重新開啟 auto-fit
                    setZoom(Math.min(2, Math.max(0.1, containerW / contentW)));
                  };
                  return (
                    <>
                      <div className="flex items-center justify-between gap-2 flex-wrap pb-2 mb-2 border-b border-slate-100 shrink-0">
                        <div className="text-sm text-slate-500 flex items-center gap-2">
                          預覽
                          <span className={`text-[10px] px-1.5 py-0.5 rounded border ${
                            cfg.snMatchMode ? "bg-purple-100 text-purple-700 border-purple-300"
                              : "bg-slate-100 text-slate-600 border-slate-300"
                          }`}>
                            {cfg.snMatchMode ? "📋 依範本 SN" : cfg.autoAlign ? "📷 依檔名 · idx" : "📷 依檔名 · 順序"}
                          </span>
                          {mode === "slides" && (
                            <span className="ml-1 text-[10px] text-slate-400" title="Stepper ◀▶ 操作">Shift＝粗調 · Alt＝微調</span>
                          )}
                        </div>
                        <div className="flex items-center gap-2 text-sm">
                          {/* zoom 控制 */}
                          <div className="flex items-center gap-0 border rounded overflow-hidden">
                            <button onClick={() => { userZoomedRef.current = true; setZoom((z) => Math.max(0.1, Math.round((z - 0.1) * 100) / 100)); }}
                              className="px-2 py-0.5 hover:bg-slate-100" title="縮小">−</button>
                            <button onClick={() => { userZoomedRef.current = true; setZoom(1); }}
                              className="px-2 py-0.5 hover:bg-slate-100 tabular-nums text-xs" title="100%">{Math.round(zoom * 100)}%</button>
                            <button onClick={() => { userZoomedRef.current = true; setZoom((z) => Math.min(3, Math.round((z + 0.1) * 100) / 100)); }}
                              className="px-2 py-0.5 hover:bg-slate-100" title="放大">+</button>
                            <button onClick={zoomFit}
                              className="px-2 py-0.5 hover:bg-slate-100 text-xs border-l" title="符合寬度">⤢</button>
                          </div>
                          {/* 頁面導覽 */}
                          {mode === "slides" && (
                            <>
                              <button onClick={() => setCurrentPage((p) => Math.max(0, p - 1))}
                                disabled={pi === 0}
                                className="border rounded px-2 py-0.5 disabled:opacity-30 hover:bg-slate-100">◀</button>
                              <span className="tabular-nums">第 <b>{pi + 1}</b> / {pages.length || 1} 頁</span>
                              <button onClick={() => setCurrentPage((p) => Math.min(total - 1, p + 1))}
                                disabled={pi >= total - 1}
                                className="border rounded px-2 py-0.5 disabled:opacity-30 hover:bg-slate-100">▶</button>
                            </>
                          )}
                        </div>
                      </div>
                      <div ref={stageWrapRef} className="flex-1 min-h-0" style={{ overflow: "auto" }}>
                       <div style={{ zoom: zoom, MozTransform: `scale(${zoom})`, MozTransformOrigin: "top left" }}>

                      {mode === "excel" && (
                        <ExcelPreview grid={xlGrid} cfg={cfg} orderedFiles={orderedFiles} selected={selected} thumbUrl={thumbUrl} snList={snList} />
                      )}
                      {mode === "slides" && (
                      <div className="flex gap-3 items-start justify-center">
                        {/* 垂直軸 stepper：Y 起點、垂直 gap。智能排列模式自動鎖定 →
                            用 visibility:hidden 隱形但保留版面寬度，避免切換時舞台 re-fit 改變大小 */}
                        <div className="flex flex-col gap-5 pt-1"
                             style={smartOn ? { visibility: "hidden" } : undefined}>
                          <Stepper label="Y 起" orient="v" value={cfg.grid.origin.y}
                            onChange={(v) => setGrid("origin.y", v)} />
                          <Stepper label="間距Y" orient="v" value={cfg.grid.gap.y}
                            onChange={(v) => setGrid("gap.y", v)} />
                        </div>

                        {/* 舞台 + 下方水平 stepper */}
                        <div>
                          <div className={`${tpl && tpl.preview_url ? "" : "stage"} border relative overflow-hidden`}
                            style={{
                              width: STAGE_W, height: stageH,
                              backgroundImage: tpl && tpl.preview_url ? `url(${tpl.preview_url})` : undefined,
                              backgroundSize: "100% 100%", backgroundRepeat: "no-repeat",
                            }}>
                            {busy && (
                              <div className="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-10">
                                <div className="spinner mb-3"></div>
                                <div className="text-sm text-slate-700 font-medium px-4 text-center max-w-[80%]">
                                  {status || "處理中…"}
                                </div>
                              </div>
                            )}
                        {pagePls.map((pl, i) => {
                          const style = {
                            position: "absolute",
                            left: pl.x_cm * scale,
                            top: pl.y_cm * scale,
                            width: pl.w_cm * scale,
                            height: pl.h_cm * scale,
                          };
                          if (pl.text !== undefined && pl.text !== null) {
                            return (
                              <div key={i} style={{
                                ...style,
                                display: "flex", alignItems: "center", justifyContent: "center",
                                fontSize: (pl.font_pt || 18) * scale / 28.35,
                                fontWeight: pl.bold ? 700 : 400,
                                color: "#111",
                              }}>
                                {pl.text}
                              </div>
                            );
                          }
                          return (
                            <img key={i}
                              src={thumbUrl(pl.path, 400, pl._crop)}
                              data-preview-path={pl.path}
                              style={{ ...style, scrollMargin: 30 }}
                              className={selected === pl.path ? "ring-4 ring-emerald-500 shadow-[0_0_18px_4px_rgba(16,185,129,0.7)] z-10 relative" : "border border-slate-300"} />
                          );
                        })}
                          </div>

                          {/* 舞台下方：水平軸 stepper。智能排列模式只留「尺寸」(其餘自動) */}
                          <div className="flex gap-x-5 gap-y-10 mt-3 justify-center flex-wrap"
                               style={{ maxWidth: STAGE_W }}>
                            {!smartOn && (
                              <Stepper label="X 起" orient="h" value={cfg.grid.origin.x}
                                onChange={(v) => setGrid("origin.x", v)} />
                            )}
                            <div className="relative">
                              {smartOn ? (
                                <Stepper label="填滿格高" orient="h" step={2} value={smartFillRatio}
                                  onChange={(r) => {
                                    const rr = Math.max(5, Math.min(100, r));
                                    setGrid("width", Math.min(Math.round(rr / 100 * smartHeightFillW * 100) / 100, smartMaxWidthPct));
                                  }} />
                              ) : (
                                <Stepper label="尺寸" orient="h" value={cfg.grid.width}
                                  onChange={(v) => setGrid("width", v)} />
                              )}
                              <div className="absolute left-0 right-0 top-full text-[10px] text-slate-400 text-center mt-1 pointer-events-none">
                                {smartOn ? "100% = 圖高填滿格高" : "按比例縮放"}
                              </div>
                            </div>
                            {!smartOn && (
                              <Stepper label="間距X" orient="h" value={cfg.grid.gap.x}
                                onChange={(v) => setGrid("gap.x", v)} />
                            )}
                            {!smartOn && cfg.label.enabled && (
                              <Stepper label="SN X" orient="h" value={cfg.label.x}
                                onChange={(v) => setCfg((c) => ({ ...c, label: { ...c.label, x: v } }))} />
                            )}
                          </div>
                        </div>
                      </div>
                      )}
                       </div>
                      </div>

                      {/* 智能排列：自動讀範本表格、預設對齊。一個 toggle 搞定 */}
                      {mode === "slides" && (() => {
                        const tbl = tableInfo && !tableInfo.error && (tableInfo.tables || [])[0];
                        const imageRows = tbl ? Math.max(1, tbl.rows - Math.min(tbl.rows - 1, tblSkipRows)) : 0;
                        return (
                          <div className="mt-3 pt-3 border-t border-slate-100 shrink-0 flex items-center gap-3 flex-wrap">
                            <button onClick={() => smartOn ? clearTable() : (tbl && applyTable(tbl))}
                              disabled={!tbl}
                              className={`text-xs px-3 py-1 rounded-full border font-medium ${smartOn
                                ? "bg-emerald-600 text-white border-emerald-700 hover:bg-emerald-700"
                                : "bg-white text-slate-600 border-slate-300 hover:bg-slate-50"} disabled:opacity-40 disabled:cursor-not-allowed`}
                              title="圖片自動對齊範本表格格子。再按一次切回手動網格">
                              ✨ 智能排列：{smartOn ? "開" : "關"}
                            </button>
                            <span className="text-[11px] text-slate-500 flex-1 min-w-[10rem]">
                              {tableInfoLoading ? "讀取範本表格中…"
                                : !tbl ? "此範本沒有表格 — 智能排列不適用，改用左側「每頁網格」＋下方 steppers 手動排"
                                : smartOn ? `圖片已對齊範本表格（${imageRows} 個圖片列）· 用上方「填滿格高」調大小`
                                : "已關閉 — 改用手動網格"}
                            </span>
                            {tbl && smartOn && (
                              <div className="flex items-center gap-2 text-[10px] text-slate-400">
                                <label className="flex items-center gap-1">略過左側
                                  <input type="number" min="0" value={tblSkipCols}
                                    onChange={(e) => { const v = Math.max(0, parseInt(e.target.value) || 0); setTblSkipCols(v); applyTable(tbl, v, tblSkipRows); }}
                                    className="w-9 border rounded px-1 py-0.5" />欄</label>
                                <label className="flex items-center gap-1">頂部
                                  <input type="number" min="0" value={tblSkipRows}
                                    onChange={(e) => { const v = Math.max(0, parseInt(e.target.value) || 0); setTblSkipRows(v); applyTable(tbl, tblSkipCols, v); }}
                                    className="w-9 border rounded px-1 py-0.5" />列</label>
                              </div>
                            )}
                          </div>
                        );
                      })()}
                    </>
                  );
                })()}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
