      const [zoom, setZoom] = useState(1);
      const stageWrapRef = useRef(null);
      const userZoomedRef = useRef(false);  // 一旦手動調整 zoom，auto-fit 停止
      const [versionInfo, setVersionInfo] = useState(null);

      useEffect(() => {
        fetch("/api/version").then((r) => r.json()).then(setVersionInfo).catch(() => {});
      }, []);

      // 自動 fit。使用者手動調 zoom 後 (userZoomedRef=true) auto-fit 停止，
      // 直到切換 mode/template 或按「⤢」鍵才再次觸發。
      useEffect(() => {
        userZoomedRef.current = false;  // 切 mode/template 重設為自動
        const el = stageWrapRef.current;
        if (!el) return;
        const recompute = () => {
          if (userZoomedRef.current) return;
          const containerW = el.clientWidth - 16;
          if (containerW <= 0) return;
          let contentW = 0;
          if (mode === "excel" && xlGrid) {
            contentW = xlGrid.cols.reduce((a, c) => a + c.w_px, 0) + 40;
          } else if (mode === "slides") {
            contentW = 720;
          }
          if (contentW > 0) {
            setZoom(Math.min(1, Math.max(0.3, containerW / contentW)));
          }
        };
        recompute();
        let ro;
        if (typeof ResizeObserver !== "undefined") {
          ro = new ResizeObserver(recompute);
          ro.observe(el);
        }
        window.addEventListener("resize", recompute);
        return () => {
          if (ro) ro.disconnect();
          window.removeEventListener("resize", recompute);
        };
      }, [mode, xlGrid, tplPath]);
      const tplInputRef = useRef(null);
      const imgInputRef = useRef(null);

      // 取得 workspace（server 一個 session 一份暫存資料夾）
      useEffect(() => {
        fetch("/api/workspace", { method: "POST" })
          .then((r) => r.json()).then((j) => setWs(j.workspace || ""))
          .catch(() => {});
      }, []);

      // 縮圖 URL：對位/順序預覽的圖都從這拿，若有啟用 crop 就帶上 query
      // 第三參數可傳入特定 crop (snMatch 模式用 source.crop 覆寫全域)
      const thumbUrl = (path, size, cropOverride) => {
        const base = `/api/thumb?path=${encodeURIComponent(path)}&size=${size}`;
        const c = cropOverride || cfg.crop;
        if (c && c.enabled) {
          return `${base}&crop=${c.left.toFixed(4)},${c.top.toFixed(4)},${c.right.toFixed(4)},${c.bottom.toFixed(4)}`;
        }
        return base;
      };

      const orderedFiles = useMemo(() => {
        const map = new Map(files.map((f) => [f.path, f]));
        return order.map((p) => map.get(p)).filter(Boolean);
      }, [files, order]);

      // 對位模式下，欄數由檔名 idx 自動決定（給輸入框顯示提示用）
      const autoIdxList = useMemo(
        () => cfg.autoAlign
          ? detectIdxList(orderedFiles, cfg.label.pattern, cfg.label.idxSort || "auto", cfg.label.idxOrder || [])
          : [],
        [cfg.autoAlign, orderedFiles, cfg.label.pattern, cfg.label.idxSort, cfg.label.idxOrder]
      );

      // 鍵盤上下方向鍵切換選取（焦點不在輸入框時才生效）
      useEffect(() => {
        const onKey = (e) => {
          if (e.key !== "ArrowDown" && e.key !== "ArrowUp") return;
          const t = e.target;
          const tag = t && t.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || (t && t.isContentEditable)) return;
          if (!orderedFiles.length) return;
          const curIdx = selected ? orderedFiles.findIndex((f) => f.path === selected) : -1;
          const delta = e.key === "ArrowDown" ? 1 : -1;
          let nxt = curIdx < 0 ? 0 : curIdx + delta;
          if (nxt < 0) nxt = 0;
          if (nxt >= orderedFiles.length) nxt = orderedFiles.length - 1;
          if (nxt === curIdx) return;
          e.preventDefault();
          const target = orderedFiles[nxt];
          setSelected(target.path);
          setSelectedPaths([target.path]);
          anchorRef.current = nxt;
          setCurrentPage(Math.floor(nxt / Math.max(1, cfg.grid.cols * cfg.grid.rows)));
          // 自動捲動讓選中項目可見
          requestAnimationFrame(() => {
            const el = listRef.current;
            if (!el) return;
            const item = el.querySelector(`[data-idx="${nxt}"]`);
            if (item && item.scrollIntoView) item.scrollIntoView({ block: "nearest" });
          });
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [orderedFiles, selected, cfg.grid.cols, cfg.grid.rows]);

      const setGrid = (path, value) => {
        setCfg((c) => {
          const next = structuredClone(c);
          let cur = next.grid;
          const parts = path.split(".");
          for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
          cur[parts[parts.length - 1]] = value;
          return next;
        });
      };

      const pick = async (kind, prompt, extensions, defaultPath) => {
        const r = await fetch("/api/pick", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ kind, prompt, extensions, default: defaultPath || "" }),
        });
        const j = await r.json();
        if (j.cancelled || !j.path) return null;
        return j.path;
      };

      const useDefaultTemplate = async () => {
        if (!ws) return;
        setBusy(true); setStatus("套用預設範本…");
        try {
          const r = await fetch("/api/template/default", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ workspace: ws }),
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "失敗");
          setTplPath(j.path);
          setTplName(j.name || "default.pptx");
          await doLoadTemplate(j.path);
        } catch (e) { setStatus("錯誤: " + e.message); }
        finally { setBusy(false); }
      };

      // 已有 server-side 範本 path → 依副檔名觸發 slides / excel 對應的後處理
      const loadTemplateByPath = async (path, name) => {
        if (!path) return;
        setTplPath(path);
        if (name) setTplName(name);
        const ext = (path.split(".").pop() || "").toLowerCase();
        const newMode = ext === "xlsx" ? "excel" : "slides";
        setMode(newMode);
        setCfg((c) => ({
          ...c,
          output: {
            ...c.output,
            path: (c.output.path || "out").replace(/\.(pptx|key|xlsx)$/i, "") + (newMode === "excel" ? ".xlsx" : ".pptx"),
            template: path,
          },
        }));
        if (newMode === "slides") {
          setXlGrid(null);
          await doLoadTemplate(path);
        } else {
          setTpl(null);
          const gr = await fetch("/api/template/excel-grid", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path }),
          });
          const gj = await gr.json();
          if (gr.ok) {
            setXlGrid(gj);
            setStatus(`已載入 Excel 範本 (${gj.cols.length} 欄 × ${gj.rows.length} 列)`);
          } else {
            setStatus("錯誤: " + (gj.error || "讀取 Excel 範本失敗"));
          }
        }
      };

      const uploadTemplate = async (file) => {
        if (!ws || !file) return;
        setBusy(true); setStatus("上傳範本中…");
        try {
          const fd = new FormData();
          fd.append("workspace", ws);
          fd.append("file", file);
          const r = await fetch("/api/upload/template", { method: "POST", body: fd });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "上傳失敗");
          await loadTemplateByPath(j.path, file.name);
        } catch (e) { setStatus("錯誤: " + e.message); }
        finally { setBusy(false); }
      };

      const uploadImages = async (files) => {
        if (!ws || !files || files.length === 0) return;
        setBusy(true); setStatus(`上傳 ${files.length} 張圖片中…`);
        try {
          const fd = new FormData();
          fd.append("workspace", ws);
          for (const f of files) fd.append("files", f);
          const r = await fetch("/api/upload/images", { method: "POST", body: fd });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "上傳失敗");
          setCfg((c) => ({ ...c, folder: j.folder }));
          // 自動掃描
          await doScanFolder(j.folder);
        } catch (e) { setStatus("錯誤: " + e.message); }
        finally { setBusy(false); }
      };

      // drag-drop handlers
      const onDropTemplate = async (e) => {
        e.preventDefault(); setDragTpl(false);
        const fs = await filesFromDrop(e.dataTransfer);
        const tpl = fs.find((f) => /\.(pptx|key|xlsx)$/i.test(f.name)) || fs[0];
        if (tpl) uploadTemplate(tpl);
      };
      const onDropImages = async (e) => {
        e.preventDefault(); setDragImg(false);
        const fs = await filesFromDrop(e.dataTransfer);
        const imgs = fs.filter((f) => /\.(png|jpe?g)$/i.test(f.name));
        if (imgs.length) uploadImages(imgs);
        else setStatus("拖入的內容沒有圖片檔 (png/jpg)");
      };

      const doScanFolder = async (folder) => {
        const r = await fetch("/api/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ folder, extensions: cfg.extensions }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || "scan failed");
        setFiles(j.files);
        setOrder(j.files.map((f) => f.path));
        setStatus(`偵測到 ${j.files.length} 張圖`);
      };

      const doLoadTemplate = async (overridePath) => {
        const path = overridePath || tplPath;
        if (!path) return;
        setBusy(true); setStatus("載入範本中…");
        try {
          const r = await fetch("/api/template/load", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path }),
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "載入失敗");
          setTpl(j);
          setCfg((c) => ({
            ...c,
            slide: { width_cm: j.width_cm, height_cm: j.height_cm },
            output: { ...c.output, template: j.path },
          }));
          setStatus(`已載入範本 (${j.width_cm.toFixed(2)} × ${j.height_cm.toFixed(2)} cm)`);
        } catch (e) { setStatus("錯誤: " + e.message); }
        finally { setBusy(false); }
      };

      const scanOnly = async () => {
        const r = await fetch("/api/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ folder: cfg.folder, extensions: cfg.extensions }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || "scan failed");
        return j;
      };

      const doScan = async () => {
        if (!cfg.folder) { setStatus("錯誤: 請先指定圖片資料夾"); return; }
        setBusy(true); setStatus("掃描中…");
        try {
          const j = await scanOnly();
          setFiles(j.files);
          setOrder(j.files.map((f) => f.path));  // 預設字母序
          setStatus(`偵測到 ${j.files.length} 張圖`);
        } catch (e) { setStatus("錯誤: " + e.message); setFiles([]); setOrder([]); }
        finally { setBusy(false); }
      };

      const doExport = async () => {
        // SN 對照模式 — 自成一條路徑
        if (cfg.snMatchMode) {
          if (!tplPath) { setStatus("錯誤: 請先上傳 Excel 範本"); return; }
          if (!snList.length) { setStatus("錯誤: 請先載入 SN list"); return; }
          if (!cfg.sources.length) { setStatus("錯誤: 至少需一個來源"); return; }
          setBusy(true); setStatus("組裝 SN 對照 cells…");
          try {
            const cells = [];
            for (const { sn, row } of snList) {
              const stem = sn.toLowerCase();
              for (const s of cfg.sources) {
                const f = (s.files || []).find((x) => (x.name || "").replace(/\.[^./]+$/, "").toLowerCase() === stem);
                if (!f) continue;
                const col = colLetterToIdx(s.targetCol);
                if (!col) continue;
                cells.push({
                  path: f.path, row, col,
                  span_cols: 1, span_rows: 1,
                  crop: s.crop?.enabled ? s.crop : null,
                });
              }
            }
            if (!cells.length) throw new Error("沒有可匯出的圖片 (檢查 SN 與來源檔名是否對應)");
            const body = JSON.stringify({
              cells, output: cfg.output, workspace: ws,
              embedInCell: !!cfg.excel.embedInCell,
              imgFit: cfg.excel.imgFit || "cover",
              containInset: Math.max(0, Math.min(45, cfg.excel.containInset ?? 5)) / 100,
            });
            setStatus(`匯出 Excel 中… (${cells.length} 格)`);
            const r = await fetch("/api/export", {
              method: "POST", headers: { "Content-Type": "application/json" }, body,
            });
            const j = await r.json();
            if (!r.ok) throw new Error(j.error || "export failed");
            if (j.download_url) {
              window.open(j.download_url, "_blank");
              setStatus(`✓ 已匯出 ${cells.length} 格 (SN 對照)`);
            } else {
              setStatus(`✓ ${j.output}`);
            }
          } catch (e) { setStatus("錯誤: " + e.message); }
          finally { setBusy(false); }
          return;
        }

        if (!cfg.folder) { setStatus("錯誤: 請先指定圖片資料夾"); return; }
        setBusy(true); setStatus("匯出中…");
        try {
          let arr = orderedFiles;
          if (arr.length === 0) {
            setStatus("掃描中…");
            const j = await scanOnly();
            setFiles(j.files);
            setOrder(j.files.map((f) => f.path));
            arr = j.files;
          }
          let body;
          if (mode === "excel") {
            const cells = computeExcelCells(cfg.excel, cfg.label, arr, cfg.autoAlign);
            if (cells.length === 0) throw new Error("沒有可匯出的圖片");
            setStatus(`匯出 Excel 中… (${cells.length} 格)`);
            body = JSON.stringify({
              cells, output: cfg.output, workspace: ws,
              embedInCell: !!cfg.excel.embedInCell,
              imgFit: cfg.excel.imgFit || "cover",
              containInset: Math.max(0, Math.min(45, cfg.excel.containInset ?? 5)) / 100,
              crop: cfg.crop,
            });
          } else {
            const pages = computePages(cfg.slide, cfg.grid, arr, cfg.label, cfg.autoAlign);
            if (pages.length === 0) throw new Error("沒有可匯出的圖片");
            setStatus(`匯出中… (${pages.length} 頁)`);
            body = JSON.stringify({
              slide: cfg.slide, pages, output: cfg.output, workspace: ws,
              snInCell: cfg.label.enabled && cfg.slidesSn.inCell,
              snCol: Math.max(0, (cfg.slidesSn.col || 1) - 1),
              snRowStart: Math.max(0, (cfg.slidesSn.rowStart || 2) - 1),
              crop: cfg.crop,
            });
          }
          const r = await fetch("/api/export", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body,
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "export failed");
          if (j.download_url) {
            // 觸發瀏覽器下載
            const a = document.createElement("a");
            a.href = j.download_url;
            a.download = "";
            document.body.appendChild(a); a.click(); a.remove();
            setStatus(`✓ 已產出 ${j.pages} 頁，已開始下載`);
          } else {
            setStatus(`✓ 已輸出 ${j.pages} 頁: ${j.output}`);
          }
        } catch (e) { setStatus("錯誤: " + e.message); console.error(e); }
        finally { setBusy(false); }
      };

      // --- 選取 ---
      const selPathsOrFallback = () =>
        selectedPaths.length ? selectedPaths : (selected ? [selected] : []);

      const onItemClick = (e, path, idx) => {
        if (e.shiftKey && anchorRef.current != null) {
          const a = anchorRef.current, b = idx;
          const [lo, hi] = a < b ? [a, b] : [b, a];
          setSelectedPaths(orderedFiles.slice(lo, hi + 1).map((f) => f.path));
        } else if (e.metaKey || e.ctrlKey) {
          setSelectedPaths((prev) =>
            prev.includes(path) ? prev.filter((p) => p !== path) : [...prev, path]);
          anchorRef.current = idx;
        } else {
          setSelectedPaths([path]);
          anchorRef.current = idx;
          setCurrentPage(Math.floor(idx / Math.max(1, cfg.grid.cols * cfg.grid.rows)));
        }
        setSelected(path);
      };

      // --- 排序 / 刪除 ---
      const moveSelected = (delta) => {
        const sel = new Set(selPathsOrFallback());
        if (!sel.size) return;
        setOrder((o) => {
          const next = [...o];
          const idxs = next.map((p, i) => (sel.has(p) ? i : -1)).filter((i) => i >= 0);
          const seq = delta < 0 ? idxs : [...idxs].reverse();
          for (const i of seq) {
            const t = i + delta;
            if (t < 0 || t >= next.length || sel.has(next[t])) continue;
            [next[i], next[t]] = [next[t], next[i]];
          }
          return next;
        });
      };
      const moveTop = () => {
        const sel = new Set(selPathsOrFallback());
        if (!sel.size) return;
        setOrder((o) => [...o.filter((p) => sel.has(p)), ...o.filter((p) => !sel.has(p))]);
      };
      const moveBottom = () => {
        const sel = new Set(selPathsOrFallback());
        if (!sel.size) return;
        setOrder((o) => [...o.filter((p) => !sel.has(p)), ...o.filter((p) => sel.has(p))]);
      };
      const deleteSelected = () => {
        const sel = new Set(selPathsOrFallback());
        if (!sel.size) return;
        setOrder((o) => o.filter((p) => !sel.has(p)));
        setFiles((fs) => fs.filter((f) => !sel.has(f.path)));
        setSelectedPaths([]);
        setSelected(null);
      };
      const resetSort = () => {
        setOrder([...files].sort((a, b) => a.name.localeCompare(b.name)).map((f) => f.path));
        setSelectedPaths([]);
      };

      // --- 拖曳重排 ---
      // 拖曳到清單上/下緣自動捲動
      const startAutoScroll = () => {
        if (scrollRafRef.current) return;
        const step = () => {
          const el = listRef.current;
          if (el && scrollDirRef.current !== 0) el.scrollTop += scrollDirRef.current * 10;
          scrollRafRef.current = requestAnimationFrame(step);
        };
        scrollRafRef.current = requestAnimationFrame(step);
      };
      const stopAutoScroll = () => {
        if (scrollRafRef.current) { cancelAnimationFrame(scrollRafRef.current); scrollRafRef.current = null; }
        scrollDirRef.current = 0;
      };
      const onListDragOver = (e) => {
        const el = listRef.current;
        if (!el) return;
        const rect = el.getBoundingClientRect();
        const EDGE = 48;
        if (e.clientY < rect.top + EDGE) scrollDirRef.current = -1;
        else if (e.clientY > rect.bottom - EDGE) scrollDirRef.current = 1;
        else scrollDirRef.current = 0;
        if (scrollDirRef.current !== 0) startAutoScroll();
        else stopAutoScroll();
      };

      const onItemDragStart = (e, path) => {
        const inSel = selectedPaths.includes(path);
        if (!inSel) { setSelectedPaths([path]); setSelected(path); }
        dragFromRef.current = path;
        e.dataTransfer.effectAllowed = "move";
        // 多選時顯示「移動 N 個檔案」的拖曳殘影
        const count = inSel ? selectedPaths.length : 1;
        if (count > 1) {
          const ghost = document.createElement("div");
          ghost.textContent = `移動 ${count} 個檔案`;
          ghost.style.cssText =
            "position:absolute;top:-1000px;left:-1000px;padding:6px 12px;" +
            "background:#059669;color:#fff;border-radius:8px;font-size:13px;" +
            "font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.25);white-space:nowrap;";
          document.body.appendChild(ghost);
          e.dataTransfer.setDragImage(ghost, 12, 12);
          setTimeout(() => { try { document.body.removeChild(ghost); } catch (_) {} }, 0);
        }
      };
      const onItemDrop = (e, targetPath) => {
        e.preventDefault();
        const from = dragFromRef.current;
        setDragOverIdx(null);
        if (!from) return;
        const movingSet = new Set(selectedPaths.includes(from) ? selectedPaths : [from]);
        setOrder((o) => {
          const movingOrdered = o.filter((p) => movingSet.has(p));
          const without = o.filter((p) => !movingSet.has(p));
          let at = without.indexOf(targetPath);
          if (at < 0) at = without.length;
          return [...without.slice(0, at), ...movingOrdered, ...without.slice(at)];
        });
        dragFromRef.current = null;
        stopAutoScroll();
      };

      // --- 對位模式：以 SN 群組為單位拖曳重排 ---
      const onCardDragStart = (e, group) => {
        dragFromRef.current = `__group:${group}`;
        e.dataTransfer.effectAllowed = "move";
        const ghost = document.createElement("div");
        ghost.textContent = `移動 SN「${group}」`;
        ghost.style.cssText =
          "position:absolute;top:-1000px;left:-1000px;padding:6px 12px;" +
          "background:#0284c7;color:#fff;border-radius:8px;font-size:13px;" +
          "font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.25);white-space:nowrap;";
        document.body.appendChild(ghost);
        e.dataTransfer.setDragImage(ghost, 12, 12);
        setTimeout(() => { try { document.body.removeChild(ghost); } catch (_) {} }, 0);
      };
      const onCardDrop = (e, targetGroup) => {
        e.preventDefault();
        const from = dragFromRef.current;
        setDragOverIdx(null);
        dragFromRef.current = null;
        stopAutoScroll();
        if (!from || !from.startsWith("__group:")) return;
        const fromGroup = from.slice(8);
        if (fromGroup === targetGroup) return;
        const pattern = cfg.label.pattern;
        const fileMap = new Map(files.map((f) => [f.path, f]));
        setOrder((o) => {
          const map = new Map();
          const groupOrder = [];
          for (const p of o) {
            const f = fileMap.get(p);
            if (!f) continue;
            const g = extractGroupIdx(f.name, pattern).group;
            if (!map.has(g)) { map.set(g, []); groupOrder.push(g); }
            map.get(g).push(p);
          }
          const fi = groupOrder.indexOf(fromGroup);
          if (fi < 0) return o;
          groupOrder.splice(fi, 1);
          const ti = targetGroup == null ? groupOrder.length : groupOrder.indexOf(targetGroup);
          groupOrder.splice(ti < 0 ? groupOrder.length : ti, 0, fromGroup);
          return groupOrder.flatMap((g) => map.get(g));
        });
      };

      // --- 預覽 ---
      const STAGE_W = 640;
      const scale = STAGE_W / cfg.slide.width_cm;
      const stageH = cfg.slide.height_cm * scale;
      const pages = computePages(cfg.slide, cfg.grid, orderedFiles, cfg.label, cfg.autoAlign);
      const imgW_cm = cfg.slide.width_cm * cfg.grid.width / 100;

                        className="w-10 h-10 object-cover border rounded pointer-events-none" />
                      <div className="flex-1 min-w-0 text-xs truncate" title={f.name}>{f.name}</div>
                      <div className="text-slate-300 text-xs pr-1" title="拖曳排序">⋮⋮</div>
                    </div>
                  );
                })}
                {/* 拖到最底：放在清單末端的 drop zone */}
                <div
                  onDragOver={(e) => { e.preventDefault(); setDragOverIdx(9999); }}
                  onDrop={(e) => cfg.autoAlign ? onCardDrop(e, null) : onItemDrop(e, null)}
                  style={{ height: 12, boxShadow: dragOverIdx === 9999 ? `inset 0 2px 0 0 ${cfg.autoAlign ? "#0284c7" : "#059669"}` : "" }} />
                </>}
              </div>
              {orderedFiles.length > 0 && (
                <div className="border-t p-2 space-y-1">
                  {!cfg.autoAlign && (
                    <div className="flex gap-1 text-xs">
                      <button onClick={() => moveSelected(-1)} disabled={!selPathsOrFallback().length}
                        className="flex-1 border rounded py-1 hover:bg-slate-100 disabled:opacity-40">▲ 上移</button>
                      <button onClick={() => moveSelected(1)} disabled={!selPathsOrFallback().length}
                        className="flex-1 border rounded py-1 hover:bg-slate-100 disabled:opacity-40">▼ 下移</button>
                      <button onClick={moveTop} disabled={!selPathsOrFallback().length}
                        className="flex-1 border rounded py-1 hover:bg-slate-100 disabled:opacity-40">置頂</button>
                      <button onClick={moveBottom} disabled={!selPathsOrFallback().length}
                        className="flex-1 border rounded py-1 hover:bg-slate-100 disabled:opacity-40">置底</button>
                    </div>
                  )}
                  <button onClick={deleteSelected} disabled={!selPathsOrFallback().length}
                    className="w-full border border-red-300 text-red-600 rounded py-1 text-xs hover:bg-red-50 disabled:opacity-40">
                    刪除選取 ({selPathsOrFallback().length})
                  </button>
                  <div className="text-[10px] text-slate-400 text-center">
                    {cfg.autoAlign
                      ? "拖曳 SN 卡片＝改列順序 · 點圖＝選取"
                      : "Shift＝範圍選取 · ⌘/Ctrl＝多選 · 拖曳＝排序"}
                  </div>
                </div>
              )}
            </div>

            {/* 右欄：預覽 */}
            <div className="col-span-6 min-h-0">
              <div className="bg-white rounded-lg shadow p-4 h-full overflow-auto">
                {(() => {
                  const total = Math.max(1, pages.length);
                  const pi = Math.min(currentPage, total - 1);
                  const pagePls = pages[pi] || [];
                  const zoomFit = () => {
                    const el = stageWrapRef.current;
                    if (!el) return;
                    // 取得容器可用寬度
                    const containerW = el.clientWidth - 16;
                    let contentW = STAGE_W;
                    if (mode === "excel" && xlGrid) {
                      const cumX = xlGrid.cols.reduce((a, c) => a + c.w_px, 0);
                      contentW = cumX + 32;
                    }
                    userZoomedRef.current = false;  // ⤢ 鈕重新開啟 auto-fit
                    setZoom(Math.min(2, Math.max(0.1, containerW / contentW)));
                  };
                  return (
                    <>
                      <div className="flex items-center justify-between mb-2 gap-2 flex-wrap">
                        <div className="text-sm text-slate-500 flex items-center gap-2">
                          預覽
                          <span className={`text-[10px] px-1.5 py-0.5 rounded border ${
                            cfg.snMatchMode ? "bg-purple-100 text-purple-700 border-purple-300"
                              : cfg.autoAlign ? "bg-sky-100 text-sky-700 border-sky-300"
                              : "bg-slate-100 text-slate-600 border-slate-300"
                          }`}>
                            {cfg.snMatchMode ? "📋 範本驅動" : cfg.autoAlign ? "📷 依檔名 idx" : "📷 依順序"}
                          </span>
                          <span className="ml-1 text-[10px] text-slate-400">Shift＝粗調 · Alt＝微調</span>
                        </div>
                        <div className="flex items-center gap-2 text-sm">
                          {/* zoom 控制 */}
                          <div className="flex items-center gap-0 border rounded overflow-hidden">
                            <button onClick={() => { userZoomedRef.current = true; setZoom((z) => Math.max(0.1, Math.round((z - 0.1) * 100) / 100)); }}
                              className="px-2 py-0.5 hover:bg-slate-100" title="縮小">−</button>
                            <button onClick={() => { userZoomedRef.current = true; setZoom(1); }}
                              className="px-2 py-0.5 hover:bg-slate-100 tabular-nums text-xs" title="100%">{Math.round(zoom * 100)}%</button>
                            <button onClick={() => { userZoomedRef.current = true; setZoom((z) => Math.min(3, Math.round((z + 0.1) * 100) / 100)); }}
                              className="px-2 py-0.5 hover:bg-slate-100" title="放大">+</button>
                            <button onClick={zoomFit}
                              className="px-2 py-0.5 hover:bg-slate-100 text-xs border-l" title="符合寬度">⤢</button>
                          </div>
                          {/* 頁面導覽 */}
                          {mode === "slides" && (
                            <>
                              <button onClick={() => setCurrentPage((p) => Math.max(0, p - 1))}
                                disabled={pi === 0}
                                className="border rounded px-2 py-0.5 disabled:opacity-30 hover:bg-slate-100">◀</button>
                              <span className="tabular-nums">第 <b>{pi + 1}</b> / {pages.length || 1} 頁</span>
                              <button onClick={() => setCurrentPage((p) => Math.min(total - 1, p + 1))}
                                disabled={pi >= total - 1}
                                className="border rounded px-2 py-0.5 disabled:opacity-30 hover:bg-slate-100">▶</button>
                            </>
                          )}
                        </div>
                      </div>
                      <div ref={stageWrapRef} style={{ overflow: "auto" }}>
                       <div style={{ zoom: zoom, MozTransform: `scale(${zoom})`, MozTransformOrigin: "top left" }}>

                      {mode === "excel" && (
                        <ExcelPreview grid={xlGrid} cfg={cfg} orderedFiles={orderedFiles} selected={selected} thumbUrl={thumbUrl} snList={snList} />
                      )}
                      {mode === "slides" && (
                      <div className="flex gap-3 items-start justify-center">
                        {/* 垂直軸 stepper：Y 起點、垂直 gap */}
                        <div className="flex flex-col gap-5 pt-1">
                          <Stepper label="Y 起" orient="v" value={cfg.grid.origin.y}
                            onChange={(v) => setGrid("origin.y", v)} />
                          <Stepper label="間距Y" orient="v" value={cfg.grid.gap.y}
                            onChange={(v) => setGrid("gap.y", v)} />
                        </div>

                        {/* 舞台 + 下方水平 stepper */}
                        <div>
                          <div className={`${tpl && tpl.preview_url ? "" : "stage"} border relative overflow-hidden`}
                            style={{
                              width: STAGE_W, height: stageH,
                              backgroundImage: tpl && tpl.preview_url ? `url(${tpl.preview_url})` : undefined,
                              backgroundSize: "100% 100%", backgroundRepeat: "no-repeat",
                            }}>
                            {busy && (
                              <div className="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-10">
                                <div className="spinner mb-3"></div>
                                <div className="text-sm text-slate-700 font-medium px-4 text-center max-w-[80%]">
                                  {status || "處理中…"}
                                </div>
                              </div>
                            )}
                        {pagePls.map((pl, i) => {
                          const style = {
                            position: "absolute",
                            left: pl.x_cm * scale,
                            top: pl.y_cm * scale,
                            width: pl.w_cm * scale,
                            height: pl.h_cm * scale,
                          };
                          if (pl.text !== undefined && pl.text !== null) {
                            return (
                              <div key={i} style={{
                                ...style,
                                display: "flex", alignItems: "center", justifyContent: "center",
                                fontSize: (pl.font_pt || 18) * scale / 28.35,
                                fontWeight: pl.bold ? 700 : 400,
                                color: "#111",
                              }}>
                                {pl.text}
                              </div>
                            );
                          }
                          return (
                            <img key={i}
                              src={thumbUrl(pl.path, 400)}
                              style={style}
                              className={selected === pl.path ? "ring-4 ring-emerald-500 shadow-[0_0_18px_4px_rgba(16,185,129,0.7)] z-10 relative" : "border border-slate-300"} />
                          );
                        })}
                          </div>

                          {/* 舞台下方：水平軸 stepper (max-width 鎖住，不讓 SN X 把父欄撐寬) */}
                          <div className="flex gap-x-5 gap-y-10 mt-3 justify-center flex-wrap"
                               style={{ maxWidth: STAGE_W }}>
                            <Stepper label="X 起" orient="h" value={cfg.grid.origin.x}
                              onChange={(v) => setGrid("origin.x", v)} />
                            <div className="relative">
                              <Stepper label="尺寸" orient="h" value={cfg.grid.width}
                                onChange={(v) => setGrid("width", v)} />
                              <div className="absolute left-0 right-0 top-full text-[10px] text-slate-400 text-center mt-1 pointer-events-none">
                                按比例縮放
                              </div>
                            </div>
                            <Stepper label="間距X" orient="h" value={cfg.grid.gap.x}
                              onChange={(v) => setGrid("gap.x", v)} />
                            {cfg.label.enabled && (
                              <Stepper label="SN X" orient="h" value={cfg.label.x}
                                onChange={(v) => setCfg((c) => ({ ...c, label: { ...c.label, x: v } }))} />
                            )}
                          </div>
                        </div>
                      </div>
                      )}
                       </div>
                      </div>
                    </>
                  );
                })()}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
