<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>img-batch-paster</title>
  <script src="/static/vendor/react.development.js"></script>
  <script src="/static/vendor/react-dom.development.js"></script>
  <script src="/static/vendor/babel.min.js"></script>
  <script src="/static/vendor/tailwindcss.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
    .stage { background: repeating-conic-gradient(#f3f4f6 0 25%, #ffffff 0 50%) 50% / 20px 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 36px; height: 36px; border: 4px solid #cbd5e1; border-top-color: #059669;
               border-radius: 50%; animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect, useRef } = React;

    const DEFAULTS = {
      folder: "",
      extensions: [".png", ".jpg", ".jpeg"],
      slide: { width_cm: 25.4, height_cm: 14.29 },
      grid: {
        origin: { x: 8, y: 15 },
        width: 25,
        gap:   { x: 2, y: 3 },
        cols: 3,
        rows: 3,
      },
      label: {
        enabled: true,
        pattern: "{group}-{idx}",
        x: 2,
        font_pt: 18,
      },
      excel: {
        startCell: "B5",
        imgsPerRow: 4,
        cellCols: 1,
        cellRows: 1,
        gapRows: 0,
        snCol: "A",
        embedInCell: false,
        imgFit: "cover",   // cover (裁切填滿) | contain (完整留白) | fill (拉伸)
      },
      output: { path: "./out.pptx", template: null },
    };

    function parseCell(ref) {
      const m = (ref || "").trim().match(/^([A-Za-z]+)(\d+)$/);
      if (!m) return { col: 1, row: 1 };
      const letters = m[1].toUpperCase();
      let col = 0;
      for (const ch of letters) col = col * 26 + (ch.charCodeAt(0) - 64);
      return { col, row: parseInt(m[2], 10) };
    }

    // 計算 Excel 的儲存格 placements
    function computeExcelCells(excel, label, orderedFiles) {
      if (!orderedFiles || orderedFiles.length === 0) return [];
      const start = parseCell(excel.startCell);
      const snCol = excel.snCol ? parseCell(excel.snCol + "1").col : 0;
      const stepCol = Math.max(1, excel.cellCols);
      const stepRow = Math.max(1, excel.cellRows) + Math.max(0, excel.gapRows);
      const perRow = Math.max(1, excel.imgsPerRow);
      const cells = [];
      for (let i = 0; i < orderedFiles.length; i += perRow) {
        const row = orderedFiles.slice(i, i + perRow);
        const rIdx = i / perRow;
        const targetRow = start.row + rIdx * stepRow;
        // 列標籤（SN）寫入 snCol
        if (label && label.enabled && snCol > 0) {
          const group = extractGroup(row[0].name || row[0].path.split("/").pop(), label.pattern);
          cells.push({
            row: targetRow, col: snCol, span_cols: 1, span_rows: excel.cellRows,
            text: group, font_pt: label.font_pt,
          });
        }
        row.forEach((f, ci) => {
          cells.push({
            path: f.path,
            row: targetRow,
            col: start.col + ci * stepCol,
            span_cols: excel.cellCols,
            span_rows: excel.cellRows,
          });
        });
      }
      return cells;
    }

    // 從檔名抽 group：pattern 用 {group} 和 {idx} 兩個 placeholder
    function extractGroup(filename, pattern) {
      const stem = filename.replace(/\.[^./]+$/, "");
      const escaped = pattern.replace(/[.+?^$()|\[\]\\]/g, "\\$&")
        .replace("{group}", "(.+?)").replace("{idx}", ".+?");
      try {
        const m = stem.match(new RegExp("^" + escaped + "$"));
        if (m && m[1]) return m[1];
      } catch (e) {}
      return stem;  // fallback：整個檔名
    }

    // 把檔案依「每頁 cols × rows」切成多頁；每頁從 origin 開始重新計算
    function computePages(slide, grid, orderedFiles, label) {
      if (!orderedFiles || orderedFiles.length === 0) return [];
      const W = slide.width_cm, H = slide.height_cm;
      const ox = W * grid.origin.x / 100;
      const oy = H * grid.origin.y / 100;
      const w  = W * grid.width / 100;
      const gx = W * grid.gap.x / 100;
      const gy = H * grid.gap.y / 100;
      const cols = Math.max(1, grid.cols);
      const rows = Math.max(1, grid.rows);
      const perPage = cols * rows;

      const pages = [];
      for (let p = 0; p < orderedFiles.length; p += perPage) {
        const pageFiles = orderedFiles.slice(p, p + perPage);
        const placements = [];
        let cur_y = oy;
        for (let i = 0; i < pageFiles.length; i += cols) {
          const row = pageFiles.slice(i, i + cols);
          const anchor = row[0];
          const aspect = anchor.h && anchor.w ? anchor.h / anchor.w : 0.75;
          const row_h = w * aspect;
          // 列標籤：抽 group from first file's name；寬度 = 「label.x → origin.x」這段
          if (label && label.enabled) {
            const group = extractGroup(anchor.name || anchor.path.split("/").pop(), label.pattern);
            const lx_cm = W * label.x / 100;
            const lw_cm = Math.max(0.5, ox - lx_cm);
            placements.push({
              text: group,
              x_cm: lx_cm,
              y_cm: cur_y,
              w_cm: lw_cm,
              h_cm: row_h,
              font_pt: label.font_pt,
              align: "center",
              bold: true,
            });
          }
          row.forEach((f, ci) => {
            placements.push({
              path: f.path,
              x_cm: ox + ci * (w + gx),
              y_cm: cur_y,
              w_cm: w, h_cm: row_h,
            });
          });
          cur_y += row_h + gy;
        }
        pages.push(placements);
      }
      return pages;
    }

    function NumberInput({ label, value, onChange, step = 0.5, suffix }) {
      return (
        <label className="flex flex-col text-xs text-slate-600">
          <span className="mb-1">{label}</span>
          <div className="relative">
            <input type="number" step={step} value={value}
              onChange={(e) => onChange(parseFloat(e.target.value) || 0)}
              className="border rounded px-2 py-1 text-sm w-full pr-7" />
            {suffix && <span className="absolute right-2 top-1.5 text-[10px] text-slate-400">{suffix}</span>}
          </div>
        </label>
      );
    }

    // Stepper：◀ value ▶ 或 ▲ value ▼。
    // 按下立即觸發；按住 350ms 後每 60ms 重複；Shift=粗、Alt=細、點數字可 inline 編輯。
    // 寬度固定避免 layout shift。
    function Stepper({ label, value, onChange, step = 0.5, suffix = "%", orient = "h" }) {
      const isH = orient === "h";
      const [editing, setEditing] = useState(false);
      const valueRef = useRef(value);
      valueRef.current = value;
      const holdTimers = useRef({ delay: null, repeat: null });

      const apply = (dir, e) => {
        const k = e && e.shiftKey ? 5 : e && e.altKey ? 0.2 : 1;
        const next = Math.round((valueRef.current + dir * step * k) * 100) / 100;
        onChange(next);
      };

      const startHold = (dir, e) => {
        apply(dir, e);  // 立即一次
        // 保留 modifier 狀態給 repeat 用
        const snapshot = { shiftKey: e.shiftKey, altKey: e.altKey };
        holdTimers.current.delay = setTimeout(() => {
          holdTimers.current.repeat = setInterval(() => apply(dir, snapshot), 60);
        }, 350);
      };
      const stopHold = () => {
        clearTimeout(holdTimers.current.delay);
        clearInterval(holdTimers.current.repeat);
        holdTimers.current.delay = null;
        holdTimers.current.repeat = null;
      };

      // 統一按鈕大小：48×40 px（w-12 h-10）
      const Btn = ({ dir, children }) => (
        <button
          onMouseDown={(e) => { e.preventDefault(); startHold(dir, e); }}
          onMouseUp={stopHold} onMouseLeave={stopHold}
          onTouchStart={(e) => { e.preventDefault(); startHold(dir, e.touches[0] || {}); }}
          onTouchEnd={stopHold}
          title="Shift=粗(×5) / Alt=細(×0.2) / 長按連續"
          className="w-12 h-10 flex items-center justify-center hover:bg-slate-200 text-slate-700 select-none">
          {children}
        </button>
      );

      // 顯示數字 — 固定寬度避免 layout shift
      const display = (
        <div className={`text-center text-xs ${isH ? "w-20" : "w-12"} flex flex-col justify-center`}
          style={{ minHeight: 40 }}>
          <div className="text-[10px] text-slate-400 leading-none mb-0.5">{label}</div>
          {editing ? (
            <input autoFocus type="number" step={step} value={value}
              onChange={(e) => onChange(parseFloat(e.target.value) || 0)}
              onBlur={() => setEditing(false)}
              onKeyDown={(e) => { if (e.key === "Enter") setEditing(false); }}
              className="w-16 mx-auto border rounded px-1 text-xs text-center" />
          ) : (
            <button onClick={() => setEditing(true)}
              className="tabular-nums font-medium hover:underline">
              {value}<span className="text-slate-400 text-[10px]">{suffix}</span>
            </button>
          )}
        </div>
      );

      return (
        <div className={`bg-slate-50 border border-slate-300 rounded-lg shadow-sm overflow-hidden ${isH
            ? "flex items-center"
            : "flex flex-col items-center w-12"}`}>
          <Btn dir={-1}>{isH ? "◀" : "▲"}</Btn>
          {display}
          <Btn dir={+1}>{isH ? "▶" : "▼"}</Btn>
        </div>
      );
    }

    function ExcelPreview({ grid, cfg, orderedFiles, selected }) {
      if (!grid) {
        return (
          <div className="border rounded-lg bg-slate-50 p-8 text-center text-slate-500">
            上傳 Excel 範本後顯示預覽
          </div>
        );
      }
      const HEADER_W = 32, HEADER_H = 22;
      // 累計 px 位置
      const cumX = [0];
      grid.cols.forEach((c) => cumX.push(cumX[cumX.length - 1] + c.w_px));
      const cumY = [0];
      grid.rows.forEach((r) => cumY.push(cumY[cumY.length - 1] + r.h_px));
      const totalW = cumX[cumX.length - 1];
      const totalH = cumY[cumY.length - 1];

      // 邊框查詢表
      const borderMap = {};
      (grid.borders || []).forEach((b) => {
        borderMap[`${b.r},${b.c}`] = b;
      });
      const cellMap = {};
      grid.cells.forEach((cell) => { cellMap[`${cell.r},${cell.c}`] = cell; });

      // 我們的 placements
      const placements = computeExcelCells(cfg.excel, cfg.label, orderedFiles);

      const alignToFlex = { left: "flex-start", center: "center", right: "flex-end" };
      const vAlignToFlex = { top: "flex-start", center: "center", middle: "center", bottom: "flex-end" };

      return (
        <div className="border rounded-lg bg-white">
          <div style={{ position: "relative", width: totalW + HEADER_W, height: totalH + HEADER_H }}>
            {/* 左上角空白 */}
            <div style={{ position: "absolute", left: 0, top: 0, width: HEADER_W, height: HEADER_H,
              background: "#f1f5f9", borderRight: "1px solid #cbd5e1", borderBottom: "1px solid #cbd5e1" }} />

            {/* 欄字母 header */}
            {grid.cols.map((c, i) => (
              <div key={`col-${c.letter}`} style={{
                position: "absolute", top: 0, left: HEADER_W + cumX[i],
                width: c.w_px, height: HEADER_H,
                background: "#f1f5f9", borderRight: "1px solid #cbd5e1", borderBottom: "1px solid #cbd5e1",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 11, color: "#475569",
              }}>{c.letter}</div>
            ))}

            {/* 列號 header */}
            {grid.rows.map((r, i) => (
              <div key={`row-${r.r}`} style={{
                position: "absolute", left: 0, top: HEADER_H + cumY[i],
                width: HEADER_W, height: r.h_px,
                background: "#f1f5f9", borderRight: "1px solid #cbd5e1", borderBottom: "1px solid #cbd5e1",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 11, color: "#475569",
              }}>{r.r}</div>
            ))}

            {/* (移除無 content 的 cell 分隔線；範本既有的 border 由下方獨立渲染) */}

            {/* 邊框 (從範本讀的) */}
            {(grid.borders || []).map((b, i) => {
              const ci = b.c - 1, ri = b.r - 1;
              if (ci < 0 || ri < 0 || ci >= grid.cols.length || ri >= grid.rows.length) return null;
              const cw = grid.cols[ci].w_px, rh = grid.rows[ri].h_px;
              const x = HEADER_W + cumX[ci], y = HEADER_H + cumY[ri];
              return (
                <div key={`b-${i}`} style={{
                  position: "absolute", left: x, top: y, width: cw, height: rh,
                  borderTop: b.top ? "1px solid #334155" : "",
                  borderRight: b.right ? "1px solid #334155" : "",
                  borderBottom: b.bottom ? "1px solid #334155" : "",
                  borderLeft: b.left ? "1px solid #334155" : "",
                  pointerEvents: "none",
                }} />
              );
            })}

            {/* 範本中的文字 */}
            {grid.cells.map((cell, i) => {
              const ci = cell.c - 1, ri = cell.r - 1;
              if (ci < 0 || ri < 0 || ci >= grid.cols.length || ri >= grid.rows.length) return null;
              return (
                <div key={`txt-${i}`} style={{
                  position: "absolute",
                  left: HEADER_W + cumX[ci], top: HEADER_H + cumY[ri],
                  width: grid.cols[ci].w_px, height: grid.rows[ri].h_px,
                  padding: "2px 4px",
                  fontSize: cell.font_pt,
                  fontWeight: cell.bold ? 700 : 400,
                  display: "flex",
                  alignItems: vAlignToFlex[cell.v_align] || "flex-end",
                  justifyContent: alignToFlex[cell.h_align] || "flex-start",
                  overflow: "hidden", whiteSpace: "nowrap",
                  pointerEvents: "none",
                }}>{cell.text}</div>
              );
            })}

            {/* 我們新加的內容 (圖片 + SN 文字) */}
            {placements.map((pl, i) => {
              const ci = pl.col - 1, ri = pl.row - 1;
              if (ci < 0 || ri < 0 || ci >= grid.cols.length || ri >= grid.rows.length) return null;
              const w = (cumX[ci + pl.span_cols] || cumX[grid.cols.length]) - cumX[ci];
              const h = (cumY[ri + pl.span_rows] || cumY[grid.rows.length]) - cumY[ri];
              const x = HEADER_W + cumX[ci], y = HEADER_H + cumY[ri];
              if (pl.text !== undefined && pl.text !== null) {
                return (
                  <div key={`my-${i}`} style={{
                    position: "absolute", left: x, top: y, width: w, height: h,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: (pl.font_pt || 12), fontWeight: 700, color: "#0f172a",
                    pointerEvents: "none",
                  }}>{pl.text}</div>
                );
              }
              return (
                <img key={`my-${i}`}
                  src={`/api/thumb?path=${encodeURIComponent(pl.path)}&size=400`}
                  style={{ position: "absolute", left: x, top: y, width: w, height: h, objectFit: cfg.excel?.imgFit || "cover" }}
                  className={selected === pl.path ? "ring-2 ring-emerald-500" : ""} />
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [cfg, setCfg] = useState(DEFAULTS);
      const [files, setFiles] = useState([]);          // 原始檔案清單（由後端掃描）
      const [order, setOrder] = useState([]);          // 使用者調整後的順序 (paths array)
      const [selected, setSelected] = useState(null);  // 目前選中的 path
      const [currentPage, setCurrentPage] = useState(0);
      const [status, setStatus] = useState("");
      const [busy, setBusy] = useState(false);
      const [tplPath, setTplPath] = useState("");
      const [tplName, setTplName] = useState("");
      const [tpl, setTpl] = useState(null);
      const [mode, setMode] = useState("slides");
      const [xlGrid, setXlGrid] = useState(null);
      const [ws, setWs] = useState("");
      const [zoom, setZoom] = useState(1);
      const stageWrapRef = useRef(null);
      const userZoomedRef = useRef(false);  // 一旦手動調整 zoom，auto-fit 停止
      const [versionInfo, setVersionInfo] = useState(null);

      useEffect(() => {
        fetch("/api/version").then((r) => r.json()).then(setVersionInfo).catch(() => {});
      }, []);

      // 自動 fit。使用者手動調 zoom 後 (userZoomedRef=true) auto-fit 停止，
      // 直到切換 mode/template 或按「⤢」鍵才再次觸發。
      useEffect(() => {
        userZoomedRef.current = false;  // 切 mode/template 重設為自動
        const el = stageWrapRef.current;
        if (!el) return;
        const recompute = () => {
          if (userZoomedRef.current) return;
          const containerW = el.clientWidth - 16;
          if (containerW <= 0) return;
          let contentW = 0;
          if (mode === "excel" && xlGrid) {
            contentW = xlGrid.cols.reduce((a, c) => a + c.w_px, 0) + 40;
          } else if (mode === "slides") {
            contentW = 720;
          }
          if (contentW > 0) {
            setZoom(Math.min(1, Math.max(0.3, containerW / contentW)));
          }
        };
        recompute();
        let ro;
        if (typeof ResizeObserver !== "undefined") {
          ro = new ResizeObserver(recompute);
          ro.observe(el);
        }
        window.addEventListener("resize", recompute);
        return () => {
          if (ro) ro.disconnect();
          window.removeEventListener("resize", recompute);
        };
      }, [mode, xlGrid, tplPath]);
      const tplInputRef = useRef(null);
      const imgInputRef = useRef(null);

      // 取得 workspace（server 一個 session 一份暫存資料夾）
      useEffect(() => {
        fetch("/api/workspace", { method: "POST" })
          .then((r) => r.json()).then((j) => setWs(j.workspace || ""))
          .catch(() => {});
      }, []);

      const orderedFiles = useMemo(() => {
        const map = new Map(files.map((f) => [f.path, f]));
        return order.map((p) => map.get(p)).filter(Boolean);
      }, [files, order]);

      const setGrid = (path, value) => {
        setCfg((c) => {
          const next = structuredClone(c);
          let cur = next.grid;
          const parts = path.split(".");
          for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
          cur[parts[parts.length - 1]] = value;
          return next;
        });
      };

      const pick = async (kind, prompt, extensions, defaultPath) => {
        const r = await fetch("/api/pick", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ kind, prompt, extensions, default: defaultPath || "" }),
        });
        const j = await r.json();
        if (j.cancelled || !j.path) return null;
        return j.path;
      };

      const useDefaultTemplate = async () => {
        if (!ws) return;
        setBusy(true); setStatus("套用預設範本…");
        try {
          const r = await fetch("/api/template/default", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ workspace: ws }),
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "失敗");
          setTplPath(j.path);
          setTplName(j.name || "default.pptx");
          await doLoadTemplate(j.path);
        } catch (e) { setStatus("錯誤: " + e.message); }
        finally { setBusy(false); }
      };

      const uploadTemplate = async (file) => {
        if (!ws || !file) return;
        setBusy(true); setStatus("上傳範本中…");
        try {
          const fd = new FormData();
          fd.append("workspace", ws);
          fd.append("file", file);
          const r = await fetch("/api/upload/template", { method: "POST", body: fd });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "上傳失敗");
          setTplPath(j.path);
          setTplName(file.name);
          const newMode = j.mode || "slides";
          setMode(newMode);
          // 同步輸出副檔名
          setCfg((c) => ({
            ...c,
            output: { ...c.output, path: (c.output.path.replace(/\.(pptx|key|xlsx)$/i, "")) +
              (newMode === "excel" ? ".xlsx" : ".pptx") },
          }));
          if (newMode === "slides") {
            await doLoadTemplate(j.path);
          } else {
            setTpl(null);
            setCfg((c) => ({ ...c, output: { ...c.output, template: j.path } }));
            const gr = await fetch("/api/template/excel-grid", {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ path: j.path }),
            });
            const gj = await gr.json();
            if (!gr.ok) throw new Error(gj.error || "讀取 Excel 範本失敗");
            setXlGrid(gj);
            setStatus(`已載入 Excel 範本 (${gj.cols.length} 欄 × ${gj.rows.length} 列)`);
          }
        } catch (e) { setStatus("錯誤: " + e.message); }
        finally { setBusy(false); }
      };

      const uploadImages = async (files) => {
        if (!ws || !files || files.length === 0) return;
        setBusy(true); setStatus(`上傳 ${files.length} 張圖片中…`);
        try {
          const fd = new FormData();
          fd.append("workspace", ws);
          for (const f of files) fd.append("files", f);
          const r = await fetch("/api/upload/images", { method: "POST", body: fd });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "上傳失敗");
          setCfg((c) => ({ ...c, folder: j.folder }));
          // 自動掃描
          await doScanFolder(j.folder);
        } catch (e) { setStatus("錯誤: " + e.message); }
        finally { setBusy(false); }
      };

      const doScanFolder = async (folder) => {
        const r = await fetch("/api/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ folder, extensions: cfg.extensions }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || "scan failed");
        setFiles(j.files);
        setOrder(j.files.map((f) => f.path));
        setStatus(`偵測到 ${j.files.length} 張圖`);
      };

      const doLoadTemplate = async (overridePath) => {
        const path = overridePath || tplPath;
        if (!path) return;
        setBusy(true); setStatus("載入範本中…");
        try {
          const r = await fetch("/api/template/load", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path }),
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "載入失敗");
          setTpl(j);
          setCfg((c) => ({
            ...c,
            slide: { width_cm: j.width_cm, height_cm: j.height_cm },
            output: { ...c.output, template: j.path },
          }));
          setStatus(`已載入範本 (${j.width_cm.toFixed(2)} × ${j.height_cm.toFixed(2)} cm)`);
        } catch (e) { setStatus("錯誤: " + e.message); }
        finally { setBusy(false); }
      };

      const scanOnly = async () => {
        const r = await fetch("/api/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ folder: cfg.folder, extensions: cfg.extensions }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || "scan failed");
        return j;
      };

      const doScan = async () => {
        if (!cfg.folder) { setStatus("錯誤: 請先指定圖片資料夾"); return; }
        setBusy(true); setStatus("掃描中…");
        try {
          const j = await scanOnly();
          setFiles(j.files);
          setOrder(j.files.map((f) => f.path));  // 預設字母序
          setStatus(`偵測到 ${j.files.length} 張圖`);
        } catch (e) { setStatus("錯誤: " + e.message); setFiles([]); setOrder([]); }
        finally { setBusy(false); }
      };

      const doExport = async () => {
        if (!cfg.folder) { setStatus("錯誤: 請先指定圖片資料夾"); return; }
        setBusy(true); setStatus("匯出中…");
        try {
          let arr = orderedFiles;
          if (arr.length === 0) {
            setStatus("掃描中…");
            const j = await scanOnly();
            setFiles(j.files);
            setOrder(j.files.map((f) => f.path));
            arr = j.files;
          }
          let body;
          if (mode === "excel") {
            const cells = computeExcelCells(cfg.excel, cfg.label, arr);
            if (cells.length === 0) throw new Error("沒有可匯出的圖片");
            setStatus(`匯出 Excel 中… (${cells.length} 格)`);
            body = JSON.stringify({
              cells, output: cfg.output, workspace: ws,
              embedInCell: !!cfg.excel.embedInCell,
              imgFit: cfg.excel.imgFit || "cover",
            });
          } else {
            const pages = computePages(cfg.slide, cfg.grid, arr, cfg.label);
            if (pages.length === 0) throw new Error("沒有可匯出的圖片");
            setStatus(`匯出中… (${pages.length} 頁)`);
            body = JSON.stringify({ slide: cfg.slide, pages, output: cfg.output, workspace: ws });
          }
          const r = await fetch("/api/export", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body,
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "export failed");
          if (j.download_url) {
            // 觸發瀏覽器下載
            const a = document.createElement("a");
            a.href = j.download_url;
            a.download = "";
            document.body.appendChild(a); a.click(); a.remove();
            setStatus(`✓ 已產出 ${j.pages} 頁，已開始下載`);
          } else {
            setStatus(`✓ 已輸出 ${j.pages} 頁: ${j.output}`);
          }
        } catch (e) { setStatus("錯誤: " + e.message); console.error(e); }
        finally { setBusy(false); }
      };

      // --- 排序操作 ---
      const moveBy = (path, delta) => {
        setOrder((o) => {
          const idx = o.indexOf(path);
          if (idx < 0) return o;
          const tgt = idx + delta;
          if (tgt < 0 || tgt >= o.length) return o;
          const next = [...o];
          [next[idx], next[tgt]] = [next[tgt], next[idx]];
          return next;
        });
      };
      const moveTop    = (path) => setOrder((o) => [path, ...o.filter((p) => p !== path)]);
      const moveBottom = (path) => setOrder((o) => [...o.filter((p) => p !== path), path]);
      const resetSort  = () => setOrder([...files].sort((a, b) => a.name.localeCompare(b.name)).map((f) => f.path));

      // --- 預覽 ---
      const STAGE_W = 640;
      const scale = STAGE_W / cfg.slide.width_cm;
      const stageH = cfg.slide.height_cm * scale;
      const pages = computePages(cfg.slide, cfg.grid, orderedFiles, cfg.label);
      const imgW_cm = cfg.slide.width_cm * cfg.grid.width / 100;
      const firstAnchor = orderedFiles[0];
      const previewH_cm = firstAnchor && firstAnchor.w ? imgW_cm * (firstAnchor.h / firstAnchor.w) : null;
      const perPage = Math.max(1, cfg.grid.cols) * Math.max(1, cfg.grid.rows);

      return (
        <div className="max-w-[1600px] mx-auto p-4 h-screen flex flex-col">
          <h1 className="text-xl font-bold mb-3 flex items-baseline gap-2">
            img-batch-paster
            {versionInfo && (
              <span className="text-[11px] font-normal text-slate-400 tabular-nums">
                v{versionInfo.version}
                {versionInfo.branch && versionInfo.branch !== "?" && (
                  <span className={`ml-1 px-1.5 py-0.5 rounded font-sans ${versionInfo.branch === "main" ? "bg-slate-200 text-slate-700" : "bg-amber-100 text-amber-800"}`}>
                    {versionInfo.branch}
                  </span>
                )}
                {" · "}{versionInfo.commit} · {versionInfo.date}
              </span>
            )}
          </h1>

          <div className="grid grid-cols-12 gap-4 flex-1 min-h-0">
            {/* 左欄：設定 */}
            <div className="col-span-3 bg-white rounded-lg shadow flex flex-col min-h-0">
              <div className="p-3 space-y-3 overflow-y-auto flex-1">
                <div>
                  <label className="text-sm font-medium">範本 (.pptx / .key / .xlsx)</label>
                  <div className="flex gap-1 mt-1">
                    <button onClick={() => tplInputRef.current?.click()}
                      className="flex-1 border rounded px-2 py-1 text-sm hover:bg-slate-100 text-left truncate">
                      📤 {tplName || (tplPath ? tplPath.split("/").pop() : "上傳範本…")}
                    </button>
                    <button onClick={useDefaultTemplate} title="使用預設範本"
                      className="border rounded px-2 py-1 text-xs hover:bg-slate-100">
                      預設
                    </button>
                    <input ref={tplInputRef} type="file"
                      accept=".pptx,.key,.xlsx,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.apple.keynote,application/zip"
                      className="hidden"
                      onChange={(e) => uploadTemplate(e.target.files?.[0])} />
                  </div>
                  <div className="text-[10px] text-slate-400 mt-1">.key 需 server 在 macOS（Keynote 轉檔約 10-30 秒）</div>
                </div>

                <div>
                  <label className="text-sm font-medium">圖片資料夾</label>
                  <div className="flex gap-1 mt-1">
                    <button onClick={() => imgInputRef.current?.click()}
                      className="flex-1 border rounded px-2 py-1 text-sm hover:bg-slate-100 text-left truncate">
                      📤 {files.length > 0 ? `已上傳 ${files.length} 張` : "上傳圖片資料夾…"}
                    </button>
                    <input ref={imgInputRef} type="file" multiple
                      webkitdirectory="" directory=""
                      className="hidden"
                      onChange={(e) => uploadImages(e.target.files)} />
                  </div>
                </div>

                {mode === "slides" && (
                  <div className="border-t pt-3">
                    <div className="text-sm font-semibold mb-2">每頁網格</div>
                    <div className="grid grid-cols-2 gap-2">
                      <NumberInput label="欄 cols" step={1} value={cfg.grid.cols}
                        onChange={(v) => setGrid("cols", Math.max(1, parseInt(v) || 1))} />
                      <NumberInput label="列 rows" step={1} value={cfg.grid.rows}
                        onChange={(v) => setGrid("rows", Math.max(1, parseInt(v) || 1))} />
                    </div>
                  </div>
                )}

                {mode === "excel" && (
                  <div className="border-t pt-3">
                    <div className="text-sm font-semibold mb-2">Excel 配置</div>
                    <div className="space-y-2">
                      <label className="flex flex-col text-xs text-slate-600">
                        起始 cell
                        <input value={cfg.excel.startCell}
                          onChange={(e) => setCfg((c) => ({ ...c, excel: { ...c.excel, startCell: e.target.value } }))}
                          className="border rounded px-2 py-1 text-sm mt-1 font-mono" placeholder="B5" />
                      </label>
                      <div className="grid grid-cols-2 gap-2">
                        <NumberInput label="每列圖數" step={1} value={cfg.excel.imgsPerRow}
                          onChange={(v) => setCfg((c) => ({ ...c, excel: { ...c.excel, imgsPerRow: Math.max(1, parseInt(v) || 1) } }))} />
                        <NumberInput label="列間距 (空 row)" step={1} value={cfg.excel.gapRows}
                          onChange={(v) => setCfg((c) => ({ ...c, excel: { ...c.excel, gapRows: Math.max(0, parseInt(v) || 0) } }))} />
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        <NumberInput label="每張圖跨欄" step={1} value={cfg.excel.cellCols}
                          onChange={(v) => setCfg((c) => ({ ...c, excel: { ...c.excel, cellCols: Math.max(1, parseInt(v) || 1) } }))} />
                        <NumberInput label="每張圖跨列" step={1} value={cfg.excel.cellRows}
                          onChange={(v) => setCfg((c) => ({ ...c, excel: { ...c.excel, cellRows: Math.max(1, parseInt(v) || 1) } }))} />
                      </div>
                      <label className="flex flex-col text-xs text-slate-600">
                        SN 寫入欄（留空=不寫）
                        <input value={cfg.excel.snCol}
                          onChange={(e) => setCfg((c) => ({ ...c, excel: { ...c.excel, snCol: e.target.value } }))}
                          className="border rounded px-2 py-1 text-sm mt-1 font-mono" placeholder="A" />
                      </label>
                      <div className="text-[10px] text-slate-400">
                        SN 字串從檔名 pattern「{cfg.label.pattern}」抽取
                      </div>

                      <div className="mt-2 pt-2 border-t">
                        <div className="text-xs text-slate-600 mb-1">圖片填法</div>
                        <div className="flex text-xs border rounded overflow-hidden">
                          {[
                            { v: "cover", label: "裁切填滿" },
                            { v: "contain", label: "完整留白" },
                            { v: "fill", label: "拉伸" },
                          ].map((opt) => (
                            <button key={opt.v}
                              onClick={() => setCfg((c) => ({ ...c, excel: { ...c.excel, imgFit: opt.v } }))}
                              className={`flex-1 px-2 py-1 ${cfg.excel.imgFit === opt.v ? "bg-slate-700 text-white" : "hover:bg-slate-100"}`}>
                              {opt.label}
                            </button>
                          ))}
                        </div>
                      </div>
                      <label className="flex items-center gap-2 text-xs text-slate-700 mt-2 pt-2 border-t">
                        <input type="checkbox" checked={cfg.excel.embedInCell}
                          onChange={(e) => setCfg((c) => ({ ...c, excel: { ...c.excel, embedInCell: e.target.checked } }))} />
                        <span>嵌入儲存格 (DISPIMG)</span>
                      </label>
                      <div className="text-[10px] text-slate-400">
                        勾選後圖片變成儲存格內容（點 cell 即選取，不能拖拉）。需 Excel 365 / WPS Office 才顯示得了
                      </div>
                    </div>
                  </div>
                )}

                <div className="border-t pt-3">
                  <label className="flex items-center gap-2 text-sm font-semibold">
                    <input type="checkbox" checked={cfg.label.enabled}
                      onChange={(e) => setCfg((c) => ({ ...c, label: { ...c.label, enabled: e.target.checked } }))} />
                    列標籤（從檔名抽出 SN）
                  </label>
                  {cfg.label.enabled && (
                    <div className="mt-2 space-y-2">
                      <div>
                        <label className="text-xs text-slate-600">檔名 pattern</label>
                        <input value={cfg.label.pattern}
                          onChange={(e) => setCfg((c) => ({ ...c, label: { ...c.label, pattern: e.target.value } }))}
                          className="mt-1 w-full border rounded px-2 py-1 text-sm font-mono" />
                        <div className="text-[10px] text-slate-400 mt-1">
                          例：<code>{"{group}-{idx}"}</code> 套用 <code>2EG-A.jpg</code> → <b>2EG</b>
                        </div>
                      </div>
                      <NumberInput label="字體" suffix="pt" step={1} value={cfg.label.font_pt}
                        onChange={(v) => setCfg((c) => ({ ...c, label: { ...c.label, font_pt: v } }))} />
                      <div className="text-[10px] text-slate-400">
                        X 位置請用預覽下方的「SN X」stepper；標籤寬度自動 = SN X → 第一張圖左緣
                      </div>
                    </div>
                  )}
                </div>

                <div className="border-t pt-3">
                  <div className="flex items-center justify-between mb-1">
                    <label className="text-sm font-medium">輸出檔名</label>
                    <div className="flex text-xs border rounded overflow-hidden">
                      {(mode === "excel" ? [".xlsx"] : [".pptx", ".key"]).map((ext) => {
                        const active = cfg.output.path.toLowerCase().endsWith(ext);
                        return (
                          <button key={ext}
                            onClick={() => setCfg((c) => {
                              const cur = c.output.path || "out.pptx";
                              const base = cur.replace(/\.(pptx|key|xlsx)$/i, "").split("/").pop() || "out";
                              return { ...c, output: { ...c.output, path: base + ext } };
                            })}
                            className={`px-2 py-0.5 ${active ? "bg-slate-700 text-white" : "hover:bg-slate-100"}`}>
                            {ext}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                  <input value={cfg.output.path}
                    onChange={(e) => setCfg({ ...cfg, output: { ...cfg.output, path: e.target.value } })}
                    placeholder="out.pptx"
                    className="w-full border rounded px-2 py-1 text-sm" />
                  <div className="text-[11px] text-slate-400 mt-1">匯出後會自動下載到你電腦</div>
                </div>
              </div>
              <div className="border-t bg-slate-50 p-3 rounded-b-lg space-y-2">
                <button disabled={busy} onClick={doExport}
                  className="w-full bg-emerald-600 disabled:bg-slate-300 text-white rounded px-3 py-2 text-sm">
                  匯出 {cfg.output.path.toLowerCase().endsWith(".key") ? ".key"
                       : cfg.output.path.toLowerCase().endsWith(".xlsx") ? ".xlsx" : ".pptx"}
                </button>
                {status && <div className="text-xs text-slate-600 break-all">{status}</div>}
              </div>
            </div>

            {/* 中欄：檔案清單 */}
            <div className="col-span-3 bg-white rounded-lg shadow flex flex-col min-h-0">
              <div className="p-3 border-b flex items-center justify-between">
                <div className="text-sm font-semibold">
                  檔案 <span className="text-slate-400 font-normal">({orderedFiles.length})</span>
                </div>
                <button onClick={resetSort} disabled={files.length === 0}
                  title="依檔名 A→Z 排序"
                  className="text-xs border rounded px-2 py-0.5 disabled:opacity-40 hover:bg-slate-100">
                  A→Z
                </button>
              </div>
              <div className="flex-1 overflow-y-auto p-2 space-y-1">
                {orderedFiles.length === 0 && (
                  <div className="text-xs text-slate-400 text-center py-8">
                    指定資料夾後按「掃描」
                  </div>
                )}
                {orderedFiles.map((f, idx) => (
                  <div key={f.path}
                    onClick={() => {
                      setSelected(f.path);
                      setCurrentPage(Math.floor(idx / Math.max(1, cfg.grid.cols * cfg.grid.rows)));
                    }}
                    className={`flex items-center gap-2 rounded p-1 cursor-pointer ${
                      selected === f.path ? "bg-emerald-50 ring-1 ring-emerald-300" : "hover:bg-slate-50"
                    }`}>
                    <div className="text-xs text-slate-400 w-6 text-right tabular-nums">{idx + 1}</div>
                    <img src={`/api/thumb?path=${encodeURIComponent(f.path)}&size=80`}
                      className="w-10 h-10 object-cover border rounded" />
                    <div className="flex-1 min-w-0 text-xs truncate" title={f.name}>{f.name}</div>
                    <div className="flex flex-col">
                      <button onClick={(e) => { e.stopPropagation(); moveBy(f.path, -1); }}
                        disabled={idx === 0}
                        className="text-[10px] leading-none px-1 disabled:opacity-30 hover:bg-slate-200 rounded">▲</button>
                      <button onClick={(e) => { e.stopPropagation(); moveBy(f.path, +1); }}
                        disabled={idx === orderedFiles.length - 1}
                        className="text-[10px] leading-none px-1 disabled:opacity-30 hover:bg-slate-200 rounded">▼</button>
                    </div>
                  </div>
                ))}
              </div>
              {selected && (
                <div className="border-t p-2 flex gap-1 text-xs">
                  <button onClick={() => moveTop(selected)}
                    className="flex-1 border rounded py-1 hover:bg-slate-100">置頂</button>
                  <button onClick={() => moveBottom(selected)}
                    className="flex-1 border rounded py-1 hover:bg-slate-100">置底</button>
                </div>
              )}
            </div>

            {/* 右欄：預覽 */}
            <div className="col-span-6 min-h-0">
              <div className="bg-white rounded-lg shadow p-4 h-full overflow-auto">
                {(() => {
                  const total = Math.max(1, pages.length);
                  const pi = Math.min(currentPage, total - 1);
                  const pagePls = pages[pi] || [];
                  const zoomFit = () => {
                    const el = stageWrapRef.current;
                    if (!el) return;
                    // 取得容器可用寬度
                    const containerW = el.clientWidth - 16;
                    let contentW = STAGE_W;
                    if (mode === "excel" && xlGrid) {
                      const cumX = xlGrid.cols.reduce((a, c) => a + c.w_px, 0);
                      contentW = cumX + 32;
                    }
                    userZoomedRef.current = false;  // ⤢ 鈕重新開啟 auto-fit
                    setZoom(Math.min(2, Math.max(0.1, containerW / contentW)));
                  };
                  return (
                    <>
                      <div className="flex items-center justify-between mb-2 gap-2 flex-wrap">
                        <div className="text-sm text-slate-500">
                          預覽
                          <span className="ml-3 text-[10px] text-slate-400">Shift＝粗調 · Alt＝微調</span>
                        </div>
                        <div className="flex items-center gap-2 text-sm">
                          {/* zoom 控制 */}
                          <div className="flex items-center gap-0 border rounded overflow-hidden">
                            <button onClick={() => { userZoomedRef.current = true; setZoom((z) => Math.max(0.1, Math.round((z - 0.1) * 100) / 100)); }}
                              className="px-2 py-0.5 hover:bg-slate-100" title="縮小">−</button>
                            <button onClick={() => { userZoomedRef.current = true; setZoom(1); }}
                              className="px-2 py-0.5 hover:bg-slate-100 tabular-nums text-xs" title="100%">{Math.round(zoom * 100)}%</button>
                            <button onClick={() => { userZoomedRef.current = true; setZoom((z) => Math.min(3, Math.round((z + 0.1) * 100) / 100)); }}
                              className="px-2 py-0.5 hover:bg-slate-100" title="放大">+</button>
                            <button onClick={zoomFit}
                              className="px-2 py-0.5 hover:bg-slate-100 text-xs border-l" title="符合寬度">⤢</button>
                          </div>
                          {/* 頁面導覽 */}
                          {mode === "slides" && (
                            <>
                              <button onClick={() => setCurrentPage((p) => Math.max(0, p - 1))}
                                disabled={pi === 0}
                                className="border rounded px-2 py-0.5 disabled:opacity-30 hover:bg-slate-100">◀</button>
                              <span className="tabular-nums">第 <b>{pi + 1}</b> / {pages.length || 1} 頁</span>
                              <button onClick={() => setCurrentPage((p) => Math.min(total - 1, p + 1))}
                                disabled={pi >= total - 1}
                                className="border rounded px-2 py-0.5 disabled:opacity-30 hover:bg-slate-100">▶</button>
                            </>
                          )}
                        </div>
                      </div>
                      <div ref={stageWrapRef} style={{ overflow: "auto" }}>
                       <div style={{ zoom: zoom, MozTransform: `scale(${zoom})`, MozTransformOrigin: "top left" }}>

                      {mode === "excel" && (
                        <ExcelPreview grid={xlGrid} cfg={cfg} orderedFiles={orderedFiles} selected={selected} />
                      )}
                      {mode === "slides" && (
                      <div className="flex gap-3 items-start justify-center">
                        {/* 垂直軸 stepper：Y 起點、垂直 gap */}
                        <div className="flex flex-col gap-5 pt-1">
                          <Stepper label="Y 起" orient="v" value={cfg.grid.origin.y}
                            onChange={(v) => setGrid("origin.y", v)} />
                          <Stepper label="間距Y" orient="v" value={cfg.grid.gap.y}
                            onChange={(v) => setGrid("gap.y", v)} />
                        </div>

                        {/* 舞台 + 下方水平 stepper */}
                        <div>
                          <div className={`${tpl && tpl.preview_url ? "" : "stage"} border relative overflow-hidden`}
                            style={{
                              width: STAGE_W, height: stageH,
                              backgroundImage: tpl && tpl.preview_url ? `url(${tpl.preview_url})` : undefined,
                              backgroundSize: "100% 100%", backgroundRepeat: "no-repeat",
                            }}>
                            {busy && (
                              <div className="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-10">
                                <div className="spinner mb-3"></div>
                                <div className="text-sm text-slate-700 font-medium px-4 text-center max-w-[80%]">
                                  {status || "處理中…"}
                                </div>
                              </div>
                            )}
                        {pagePls.map((pl, i) => {
                          const style = {
                            position: "absolute",
                            left: pl.x_cm * scale,
                            top: pl.y_cm * scale,
                            width: pl.w_cm * scale,
                            height: pl.h_cm * scale,
                          };
                          if (pl.text !== undefined && pl.text !== null) {
                            return (
                              <div key={i} style={{
                                ...style,
                                display: "flex", alignItems: "center", justifyContent: "center",
                                fontSize: (pl.font_pt || 18) * scale / 28.35,
                                fontWeight: pl.bold ? 700 : 400,
                                color: "#111",
                              }}>
                                {pl.text}
                              </div>
                            );
                          }
                          return (
                            <img key={i}
                              src={`/api/thumb?path=${encodeURIComponent(pl.path)}&size=400`}
                              style={style}
                              className={selected === pl.path ? "ring-2 ring-emerald-500" : "border border-slate-300"} />
                          );
                        })}
                          </div>

                          {/* 舞台下方：水平軸 stepper (max-width 鎖住，不讓 SN X 把父欄撐寬) */}
                          <div className="flex gap-x-5 gap-y-10 mt-3 justify-center flex-wrap"
                               style={{ maxWidth: STAGE_W }}>
                            <Stepper label="X 起" orient="h" value={cfg.grid.origin.x}
                              onChange={(v) => setGrid("origin.x", v)} />
                            <div className="relative">
                              <Stepper label="尺寸" orient="h" value={cfg.grid.width}
                                onChange={(v) => setGrid("width", v)} />
                              <div className="absolute left-0 right-0 top-full text-[10px] text-slate-400 text-center mt-1 pointer-events-none">
                                按比例縮放
                              </div>
                            </div>
                            <Stepper label="間距X" orient="h" value={cfg.grid.gap.x}
                              onChange={(v) => setGrid("gap.x", v)} />
                            {cfg.label.enabled && (
                              <Stepper label="SN X" orient="h" value={cfg.label.x}
                                onChange={(v) => setCfg((c) => ({ ...c, label: { ...c.label, x: v } }))} />
                            )}
                          </div>
                        </div>
                      </div>
                      )}
                       </div>
                      </div>
                    </>
                  );
                })()}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
