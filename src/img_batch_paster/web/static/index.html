            <div className="text-[12px] text-slate-400">зҜ„жң¬ж”ҜжҸҙ .pptx / .key / .xlsx В· з”ұе·ҰеҒҙйқўжқҝжӢ–е…ҘжҲ–й»һж“ҠдёҠеӮі</div>
          </div>
        </div>
      );
    }

    function App() {
      const [cfg, setCfg] = useState(DEFAULTS);
      const [files, setFiles] = useState([]);          // еҺҹе§ӢжӘ”жЎҲжё…е–®пјҲз”ұеҫҢз«ҜжҺғжҸҸпјү
      const [order, setOrder] = useState([]);          // дҪҝз”ЁиҖ…иӘҝж•ҙеҫҢзҡ„й ҶеәҸ (paths array)
      const [selected, setSelected] = useState(null);  // й җиҰҪ highlight (жңҖеҫҢй»һзҡ„)
      const [selectedPaths, setSelectedPaths] = useState([]);  // еӨҡйҒё
      const anchorRef = useRef(0);                     // shift зҜ„еңҚйҢЁй»һ
      const dragFromRef = useRef(null);                // жӢ–жӣідҫҶжәҗ path
      const [dragOverIdx, setDragOverIdx] = useState(null);  // жӢ–жӣіжҸ’е…ҘдҪҚзҪ®жҢҮзӨә
      const listRef = useRef(null);                    // жӘ”жЎҲжё…е–®жҚІеӢ•е®№еҷЁ
      const scrollDirRef = useRef(0);
      const scrollRafRef = useRef(null);
      const [currentPage, setCurrentPage] = useState(0);
      const [status, setStatus] = useState("");
      const [busy, setBusy] = useState(false);
      const [tplPath, setTplPath] = useState("");
      const [tplName, setTplName] = useState("");
      const [tpl, setTpl] = useState(null);
      const [mode, setMode] = useState("slides");
      const [xlGrid, setXlGrid] = useState(null);
      const [tableInfo, setTableInfo] = useState(null);   // pptx/key зҜ„жң¬иЎЁж јиіҮиЁҠ
      const [tableInfoLoading, setTableInfoLoading] = useState(false);
      const [tblSkipCols, setTblSkipCols] = useState(1);  // еҘ—з”ЁиЎЁж јжҷӮз•ҘйҒҺе·ҰеҒҙе№ҫж¬„пјҲжЁҷзұӨж¬„пјү
      const [tblSkipRows, setTblSkipRows] = useState(1);  // еҘ—з”ЁиЎЁж јжҷӮз•ҘйҒҺй ӮйғЁе№ҫеҲ—пјҲиЎЁй ӯпјү
      const [dragTpl, setDragTpl] = useState(false);
      const [dragImg, setDragImg] = useState(false);
      const [cropOpen, setCropOpen] = useState(false);
      const [cropSourceId, setCropSourceId] = useState(null);  // null = дёҚз·ЁијҜ source crop; еҗҰеүҮзӮә source.id (snMatch жЁЎејҸ)
      const [cropIdxKey, setCropIdxKey] = useState(null);      // null = дёҚз·ЁијҜ per-idx crop; еҗҰеүҮзӮә idx еӯ—дёІ (дҫқжӘ”еҗҚ idx жЁЎејҸ)
      const [selectedCell, setSelectedCell] = useState(null); // {r, c} | nullпјҡ2D жЁЎејҸдёӢгҖҢж јеӯҗдҪҚзҪ®гҖҚйҒёеҸ–пјҲе…ҒиЁұз©әж јпјү

      // --- Undo / Redo ---
      const [historyPast, setHistoryPast] = useState([]);
      const [historyFuture, setHistoryFuture] = useState([]);
      const HISTORY_MAX = 50;

      // з•¶еүҚијүе…Ҙзҡ„й…ҚзҪ®еҗҚзЁұпјҲз”Ёж–ј header йЎҜзӨәпјү
      const [currentConfigName, setCurrentConfigName] = useState("");
      const [configMenuOpen, setConfigMenuOpen] = useState(false);
      const [helpOpen, setHelpOpen] = useState(false);
      const [shortcutsOpen, setShortcutsOpen] = useState(false);
      const [toast, setToast] = useState(null);              // {kind,title,sub}
      const [idxConfirm, setIdxConfirm] = useState(null);    // дҫқжӘ”еҗҚжЁЎејҸпјҡдёҠеӮіеҫҢ idx зўәиӘҚе°Қи©ұжЎҶиіҮж–ҷ | null
      const toastTimerRef = useRef(null);
      const magicRef = useRef(false);
      const showToast = (t) => {
        setToast(t);
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        toastTimerRef.current = setTimeout(() => setToast(null), t.hold || 4200);
      };
      const [snList, setSnList] = useState([]);  // [{ sn, row }] from /api/template/sn-list
      const [ws, setWs] = useState("");
      const [zoom, setZoom] = useState(1);
      const stageWrapRef = useRef(null);
      const userZoomedRef = useRef(false);  // дёҖж—ҰжүӢеӢ•иӘҝж•ҙ zoomпјҢauto-fit еҒңжӯў
      const [versionInfo, setVersionInfo] = useState(null);

      useEffect(() => {
        fetch("/api/version").then((r) => r.json()).then(setVersionInfo).catch(() => {});
      }, []);

      // иҮӘеӢ• fitгҖӮдҪҝз”ЁиҖ…жүӢеӢ•иӘҝ zoom еҫҢ (userZoomedRef=true) auto-fit еҒңжӯўпјҢ
      // зӣҙеҲ°еҲҮжҸӣ mode/template жҲ–жҢүгҖҢвӨўгҖҚйҚөжүҚеҶҚж¬Ўи§ёзҷјгҖӮ
      useEffect(() => {
        userZoomedRef.current = false;  // еҲҮ mode/template йҮҚиЁӯзӮәиҮӘеӢ•
        const el = stageWrapRef.current;
        if (!el) return;
        const recompute = () => {
          if (userZoomedRef.current) return;
          const containerW = el.clientWidth - 16;
          if (containerW <= 0) return;
          let contentW = 0;
          if (mode === "excel" && xlGrid) {
            contentW = xlGrid.cols.reduce((a, c) => a + c.w_px, 0) + 40;
          } else if (mode === "slides") {
            contentW = 656;   // иҲһеҸ°еҜ¬(640)+е°ҸйӮҠи·қпјӣY stepper е·Із§»йҖІиҲһеҸ°гҖҒдёҚеҶҚйЎҚеӨ–дҪ”еҜ¬
          }
          if (contentW > 0) {
            setZoom(Math.min(2.2, Math.max(0.3, containerW / contentW)));   // е…ҒиЁұж”ҫеӨ§еЎ«ж»ҝеҜ¬ж¬„
          }
        };
        recompute();
        let ro;
        if (typeof ResizeObserver !== "undefined") {
          ro = new ResizeObserver(recompute);
          ro.observe(el);
        }
        window.addEventListener("resize", recompute);
        return () => {
          if (ro) ro.disconnect();
          window.removeEventListener("resize", recompute);
        };
      }, [mode, xlGrid, tplPath]);
      const tplInputRef = useRef(null);
      const imgInputRef = useRef(null);

      // еҸ–еҫ— workspaceпјҲserver дёҖеҖӢ session дёҖд»Ҫжҡ«еӯҳиіҮж–ҷеӨҫпјү
      useEffect(() => {
        fetch("/api/workspace", { method: "POST" })
          .then((r) => r.json()).then((j) => setWs(j.workspace || ""))
          .catch(() => {});
      }, []);

      // зё®ең– URLпјҡз¬¬ 3 еҸғж•ёиӘһж„Ҹ
      //   undefined  вҶ’ еҘ—з”Ёе…Ёеҹҹ cfg.crop
      //   null       вҶ’ жҳҺзўәдёҚиЈҒеүӘ (еҗ„ж¬„жЁЎејҸдҪҶжӯӨж¬„з„ЎиЁӯе®ҡ)
      //   crop obj   вҶ’ еҘ—з”Ёи©І crop
      const thumbUrl = (path, size, cropOverride) => {
        const base = `/api/thumb?path=${encodeURIComponent(path)}&size=${size}`;
        const c = cropOverride === undefined ? cfg.crop : cropOverride;
        if (c && c.enabled) {
          return `${base}&crop=${c.left.toFixed(4)},${c.top.toFixed(4)},${c.right.toFixed(4)},${c.bottom.toFixed(4)}`;
        }
        return base;
      };

      const orderedFiles = useMemo(() => {
        const map = new Map(files.map((f) => [f.path, f]));
        return order.map((p) => map.get(p)).filter(Boolean);
      }, [files, order]);

      // вңЁ йӯ”жі•жҷӮеҲ»пјҲAпјү+ еғ№еҖјйҮҸеҢ–пјҲBпјүпјҡзҜ„жң¬+ең–зүҮе°ұз·’гҖҒиҮӘеӢ•е°ҚйҪҠеҘҪ вҶ’ ж…¶зҘқпјҲжҜҸжү№дёҖж¬Ўпјү
      useEffect(() => {
        const n = orderedFiles.length;
        if (n > 0 && tplPath && !magicRef.current) {
          magicRef.current = true;
          const mins = Math.max(1, Math.round(n * 20 / 60));
          showToast({ kind: "magic", title: `вңЁ ${n} ејөе·ІиҮӘеӢ•е°ҚйҪҠзҜ„жң¬пјҒ`, sub: `й җдј°зңҒдёӢ ~${mins} еҲҶйҗҳжүӢеӢ•жӢ–ж”ҫ` });
        } else if (n === 0) {
          magicRef.current = false;
        }
      }, [orderedFiles.length, tplPath]);

      // йҸЎеғҸзӣ®еүҚжүҖжңүеҸҜ undo зҡ„ stateпјҢзөҰ pushHistory / undo / redo з”Ё
      const stateRef = useRef({});
      stateRef.current = {
        cfg, order, files, snList,
        selected, selectedCell, selectedPaths,
        xlGrid, tpl, tplPath, tplName, mode,
      };
      const SNAPSHOT_SETTERS = {
        cfg: setCfg, order: setOrder, files: setFiles, snList: setSnList,
        selected: setSelected, selectedCell: setSelectedCell, selectedPaths: setSelectedPaths,
        xlGrid: setXlGrid, tpl: setTpl, tplPath: setTplPath, tplName: setTplName, mode: setMode,
      };
      const captureSnapshot = (desc) => ({ ...stateRef.current, desc });
      const restoreSnapshot = (snap) => {
        for (const k of Object.keys(SNAPSHOT_SETTERS)) {
          if (k in snap) SNAPSHOT_SETTERS[k](snap[k]);
        }
      };
      const pushHistory = (desc) => {
        const snap = captureSnapshot(desc || "");
        setHistoryPast((past) => [...past.slice(-(HISTORY_MAX - 1)), snap]);
        setHistoryFuture([]);
      };
      const clearHistory = () => {
        setHistoryPast([]);
        setHistoryFuture([]);
      };
      // йҖҡз”ЁгҖҢйҮҚж–°й–Ӣе§ӢгҖҚеүҚзўәиӘҚ + йҮҚзҪ® (зөҰеҲҮжҸӣжЁЎејҸгҖҒијүе…Ҙй…ҚзҪ®зӯүз”Ё)
      // reason: йЎҜзӨәеңЁ confirm й–Ӣй ӯпјҢe.g. "еҲҮжҸӣжЁЎејҸ"гҖҒ"ијүе…Ҙй…ҚзҪ®"
      // apply: еҸ–еҫ— confirm йҖҡйҒҺеҫҢеҹ·иЎҢзҡ„еӢ•дҪң (callback)
      // еӣһеӮіжҳҜеҗҰзңҹзҡ„еҹ·иЎҢдәҶ
      const confirmAndReset = (reason, apply) => {
        const hasUserState =
          historyPast.length > 0 || historyFuture.length > 0 ||
          files.length > 0 || snList.length > 0 ||
          (cfg.sources || []).some((s) => (s.files?.length || 0) > 0 || s.crop?.enabled) ||
          cfg.crop?.enabled ||
          Object.keys(cfg.label?.idxCrops || {}).length > 0;
        if (hasUserState) {
          if (!confirm(`${reason}жңғжё…жҺү undo жӯ·еҸІиҲҮжүҖжңүиӘҝж•ҙ (е·ІдёҠеӮізҡ„ең–зүҮгҖҒиЈҒеүӘгҖҒдҫҶжәҗ зӯү)гҖӮзҜ„жң¬жңғдҝқз•ҷгҖӮзўәе®ҡпјҹ`)) return false;
        }
        clearHistory();
        setOrder([]);
        setFiles([]);
        setSnList([]);
        setSelected(null);
        setSelectedCell(null);
        setSelectedPaths([]);
        apply();
        return true;
      };

      // жЁЎејҸеҲҮжҸӣ = fresh start
      const switchMode = (toSnMatch) => {
        if (!!toSnMatch === !!cfg.snMatchMode) return;
        confirmAndReset("еҲҮжҸӣжЁЎејҸ", () => {
          setCfg((c) => {
            const fresh = JSON.parse(JSON.stringify(DEFAULTS));
            fresh.output = { ...fresh.output, path: c.output?.path || fresh.output.path, template: c.output?.template };
            fresh.snMatchMode = !!toSnMatch;
            fresh.autoAlign = false;
            if (toSnMatch) {
              fresh.sources = [
                { id: 1, name: "A", folder: "", files: [], targetCol: "F", crop: { enabled: false, left: 0, top: 0, right: 1, bottom: 1 } },
                { id: 2, name: "B", folder: "", files: [], targetCol: "G", crop: { enabled: false, left: 0, top: 0, right: 1, bottom: 1 } },
              ];
            }
            return fresh;
          });
        });
      };
      const undo = () => {
        if (historyPast.length === 0) return;
        const last = historyPast[historyPast.length - 1];
        const current = captureSnapshot(last.desc || "redo");
        setHistoryPast((past) => past.slice(0, -1));
        setHistoryFuture((fut) => [...fut, current]);
        restoreSnapshot(last);
        setStatus(`вҶ¶ undo${last.desc ? `гҖҢ${last.desc}гҖҚ` : ""}`);
      };
      const redo = () => {
        if (historyFuture.length === 0) return;
        const next = historyFuture[historyFuture.length - 1];
        const current = captureSnapshot(next.desc || "undo");
        setHistoryFuture((fut) => fut.slice(0, -1));
        setHistoryPast((past) => [...past, current]);
        restoreSnapshot(next);
        setStatus(`вҶ· redo${next.desc ? `гҖҢ${next.desc}гҖҚ` : ""}`);
      };

      // йҚөзӣӨпјҡвҢҳZ / Ctrl+Z = undoпјӣвҮ§вҢҳZ / Ctrl+Y = redo
      useEffect(() => {
        const onKey = (e) => {
          const t = e.target;
          const tag = t && t.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || (t && t.isContentEditable)) return;
          const mod = e.metaKey || e.ctrlKey;
          if (!mod) return;
          if (e.key === "z" || e.key === "Z") {
            e.preventDefault();
            if (e.shiftKey) redo(); else undo();
          } else if (e.key === "y" || e.key === "Y") {
            e.preventDefault();
            redo();
          }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [historyPast, historyFuture]);

      // е°ҚдҪҚжЁЎејҸдёӢпјҢж¬„ж•ёз”ұжӘ”еҗҚ idx иҮӘеӢ•жұәе®ҡпјҲзөҰијёе…ҘжЎҶйЎҜзӨәжҸҗзӨәз”Ёпјү
      const autoIdxList = useMemo(
        () => cfg.autoAlign
          ? detectIdxList(orderedFiles, cfg.label.pattern, cfg.label.idxSort || "auto", cfg.label.idxOrder || [])
          : [],
        [cfg.autoAlign, orderedFiles, cfg.label.pattern, cfg.label.idxSort, cfg.label.idxOrder]
      );

      // иҰ–иҰәеҢ– 2D гҖҢе°ҺиҲӘ gridгҖҚпјҡ1D жЁЎејҸиҰ–зӮә NГ—1пјӣ2D жЁЎејҸзӣҙжҺҘз”Ё cells/sources matrix
      const navGrid = useMemo(() => {
        if (cfg.snMatchMode) {
          return (snList || []).map((s) => {
            const stem = s.sn.toLowerCase();
            return (cfg.sources || []).map((src) =>
              (src.files || []).find((f) => (f.name || "").replace(/\.[^./]+$/, "").toLowerCase() === stem) || null
            );
          });
        }
        if (cfg.autoAlign && orderedFiles.length > 0) {
          const idxList = autoIdxList;
          if (!idxList.length) return orderedFiles.map((f) => [f]);
          const rows = buildRows(orderedFiles, cfg.label.pattern, idxList, true, new Set(cfg.label.idxIgnore || []));
          return rows.map((r) => r.cells);
        }
        return orderedFiles.map((f) => [f]);
      }, [cfg.snMatchMode, cfg.autoAlign, snList, cfg.sources, orderedFiles, autoIdxList, cfg.label.pattern]);

      // йҚөзӣӨж–№еҗ‘йҚөеҲҮжҸӣйҒёеҸ–
      // 2D жЁЎејҸ (snMatch / дҫқжӘ”еҗҚ idx)пјҡз”Ё selectedCell з§»еӢ•дҪҚзҪ®пјҢе…ҒиЁұеҒңеңЁз©әж ј
      // 1D жЁЎејҸ (й ҶеәҸеЎ«е…Ҙ)пјҡз”Ё path з§»еӢ•
      const is2DMode = cfg.snMatchMode || cfg.autoAlign;
      useEffect(() => {
        const onKey = (e) => {
          const ARROWS = { ArrowDown: [1,0], ArrowUp: [-1,0], ArrowRight: [0,1], ArrowLeft: [0,-1] };
          if (!ARROWS[e.key]) return;
          const t = e.target;
          const tag = t && t.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || (t && t.isContentEditable)) return;
          if (!navGrid.length) return;
          const R = navGrid.length;
          const [dr, dc] = ARROWS[e.key];

          // жүҫиө·е§ӢдҪҚзҪ®пјҡе„Әе…Ҳ selectedCellпјӣ2D жЁЎејҸ fallback еҫһ selected path жүҫ
          let cr = -1, cc = -1;
          if (selectedCell && selectedCell.r >= 0 && selectedCell.r < R && selectedCell.c >= 0 && selectedCell.c < (navGrid[selectedCell.r]?.length || 0)) {
            cr = selectedCell.r; cc = selectedCell.c;
          } else if (selected) {
            for (let r = 0; r < R && cr < 0; r++) {
              for (let c = 0; c < navGrid[r].length; c++) {
                if (navGrid[r][c]?.path === selected) { cr = r; cc = c; break; }
              }
            }
          }
          if (cr < 0) {
            // жІ’йҒё вҶ’ (0,0)
            cr = 0; cc = 0;
            e.preventDefault();
            const cell0 = navGrid[0][0];
            setSelectedCell({ r: 0, c: 0 });
            if (cell0) { setSelected(cell0.path); setSelectedPaths([cell0.path]); }
            else { setSelected(null); setSelectedPaths([]); }
            return;
          }

          let nr = cr + dr, nc = cc + dc;

          if (is2DMode) {
            // 2Dпјҡзҙ”зІ№з§»еӢ•дҪҚзҪ®гҖҒе…ҒиЁұеҒңеңЁз©әж ј
            if (nr < 0 || nr >= R) return;
            const row = navGrid[nr] || [];
            if (nc < 0 || nc >= row.length) return;
            e.preventDefault();
            setSelectedCell({ r: nr, c: nc });
            anchorRef.current = nr;
            const cell = row[nc];
            if (cell) { setSelected(cell.path); setSelectedPaths([cell.path]); }
            else { setSelected(null); setSelectedPaths([]); }
            requestAnimationFrame(() => {
              const el = listRef.current;
              if (el) {
                const selEl = el.querySelector(`[data-r="${nr}"][data-c="${nc}"]`);
                if (selEl && selEl.scrollIntoView) selEl.scrollIntoView({ block: "nearest", inline: "nearest" });
              }
              if (cell?.path) {
                const previewImg = document.querySelector(`[data-preview-path="${CSS.escape(cell.path)}"]`);
                if (previewImg && previewImg.scrollIntoView) previewImg.scrollIntoView({ block: "nearest", inline: "nearest" });
              }
            });
          } else {
            // 1Dпјҡи·ійҒҺз©әж ј
            while (nr >= 0 && nr < R) {
              const row = navGrid[nr] || [];
              if (nc < 0 || nc >= row.length) break;
              if (row[nc]) break;
              nr += dr; nc += dc;
            }
            if (nr < 0 || nr >= R) return;
            const row = navGrid[nr] || [];
            if (nc < 0 || nc >= row.length || !row[nc]) return;
            e.preventDefault();
            const target = row[nc];
            setSelected(target.path);
            setSelectedPaths([target.path]);
            setSelectedCell({ r: nr, c: nc });
            anchorRef.current = nr;
            setCurrentPage(Math.floor(nr / Math.max(1, cfg.grid.cols * cfg.grid.rows)));
            requestAnimationFrame(() => {
              const el = listRef.current;
              if (el) {
                const selEl =
                  el.querySelector(`[data-r="${nr}"][data-c="${nc}"]`) ||
                  el.querySelector(`[data-idx="${nr}"]`);
                if (selEl && selEl.scrollIntoView) selEl.scrollIntoView({ block: "nearest", inline: "nearest" });
              }
              const previewImg = document.querySelector(`[data-preview-path="${CSS.escape(target.path)}"]`);
              if (previewImg && previewImg.scrollIntoView) previewImg.scrollIntoView({ block: "nearest", inline: "nearest" });
            });
          }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [navGrid, selected, selectedCell, is2DMode, cfg.grid.cols, cfg.grid.rows]);

      // Delete/Backspace йҚөеҲӘйҷӨйҒёеҸ–зҡ„жӘ”жЎҲ (snMatch жЁЎејҸдёҚйҒ©з”Ё вҖ” йӮЈйӮҠжӘ”жЎҲдҫҶиҮӘ sources)
      useEffect(() => {
        if (cfg.snMatchMode) return;
        const onKey = (e) => {
          if (e.key !== "Delete" && e.key !== "Backspace") return;
          const t = e.target;
          const tag = t && t.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || (t && t.isContentEditable)) return;
          const paths = selectedPaths.length ? selectedPaths : (selected ? [selected] : []);
          if (!paths.length) return;
          e.preventDefault();
          const sel = new Set(paths);
          pushHistory(`еҲӘйҷӨ ${sel.size} ејө`);
          setOrder((o) => o.filter((p) => !sel.has(p)));
          setFiles((fs) => fs.filter((f) => !sel.has(f.path)));
          setSelectedPaths([]);
          setSelected(null);
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [selectedPaths, selected, cfg.snMatchMode]);

      const setGrid = (path, value) => {
        setCfg((c) => {
          const next = structuredClone(c);
          let cur = next.grid;
          const parts = path.split(".");
          for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
          cur[parts[parts.length - 1]] = value;
          return next;
        });
      };

      // idx е°ҚдҪҚжЁЎејҸпјҡжҠҠ grid.cols еҗҢжӯҘжҲҗеҒөжё¬еҲ°зҡ„ж¬„ж•ёпјҢи®“гҖҢйқўжқҝйЎҜзӨәпјқеҜҰйҡӣеҖјпјқзүҲйқўз”Ёзҡ„гҖҚдёҖиҮҙ
      useEffect(() => {
        if (cfg.autoAlign && autoIdxList.length > 0 && cfg.grid.cols !== autoIdxList.length) {
          setGrid("cols", autoIdxList.length);
        }
      }, [cfg.autoAlign, autoIdxList.length, cfg.grid.cols]);

      const pick = async (kind, prompt, extensions, defaultPath) => {
        const r = await fetch("/api/pick", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ kind, prompt, extensions, default: defaultPath || "" }),
        });
        const j = await r.json();
        if (j.cancelled || !j.path) return null;
        return j.path;
      };

      // е·Іжңү server-side зҜ„жң¬ path вҶ’ дҫқеүҜжӘ”еҗҚи§ёзҷј slides / excel е°ҚжҮүзҡ„еҫҢиҷ•зҗҶ
      const loadTemplateByPath = async (path, name) => {
        if (!path) return;
        setTplPath(path);
        if (name) setTplName(name);
        const ext = (path.split(".").pop() || "").toLowerCase();
        const newMode = ext === "xlsx" ? "excel" : "slides";
        setMode(newMode);
        // ијёеҮәж јејҸй җиЁӯи·ҹи‘—гҖҢеҺҹе§ӢзҜ„жң¬еүҜжӘ”еҗҚгҖҚиө°пјҡеҢҜе…Ҙ .key вҶ’ ијёеҮә .keyгҖҒ.pptx вҶ’ .pptxгҖҒ.xlsx вҶ’ .xlsx
        // (.key дёҠеӮіжңғиў«иҪүжҲҗ .pptxпјҢжүҖд»Ҙ path еүҜжӘ”еҗҚдёҚеҸҜйқ  вҶ’ з”ЁеҺҹе§ӢжӘ”еҗҚ name еҲӨж–·)
        const nameExt = (name || "").split(".").pop().toLowerCase();
        const outExt = ["pptx", "key", "xlsx"].includes(nameExt)
          ? nameExt : (newMode === "excel" ? "xlsx" : "pptx");
        setCfg((c) => ({
          ...c,
          output: {
            ...c.output,
            path: (c.output.path || "out").replace(/\.(pptx|key|xlsx)$/i, "") + "." + outExt,
            template: path,
          },
        }));
        if (newMode === "slides") {
          setXlGrid(null);
          await doLoadTemplate(path);
        } else {
          setTpl(null);
          const gr = await fetch("/api/template/excel-grid", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path }),
          });
          const gj = await gr.json();
          if (gr.ok) {
            setXlGrid(gj);
            setStatus(`е·Іијүе…Ҙ Excel зҜ„жң¬ (${gj.cols.length} ж¬„ Г— ${gj.rows.length} еҲ—)`);
          } else {
            setStatus("йҢҜиӘӨ: " + (gj.error || "и®ҖеҸ– Excel зҜ„жң¬еӨұж•—"));
          }
        }
      };

      const uploadTemplate = async (file) => {
        if (!ws || !file) return;
        setBusy(true); setStatus("дёҠеӮізҜ„жң¬дёӯвҖҰ");
        try {
          const fd = new FormData();
          fd.append("workspace", ws);
          fd.append("file", file);
          const r = await fetch("/api/upload/template", { method: "POST", body: fd });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "дёҠеӮіеӨұж•—");
          await loadTemplateByPath(j.path, file.name);
        } catch (e) { setStatus("йҢҜиӘӨ: " + e.message); }
        finally { setBusy(false); }
      };

      // зңҹжӯЈдёҠеӮі + жҺғжҸҸпјҲдёҚеҗ«зўәиӘҚпјү
      const doUploadImages = async (files) => {
        if (!ws || !files || files.length === 0) return;
        setBusy(true); setStatus(`дёҠеӮі ${files.length} ејөең–зүҮдёӯвҖҰ`);
        try {
          const fd = new FormData();
          fd.append("workspace", ws);
          for (const f of files) fd.append("files", f);
          const r = await fetch("/api/upload/images", { method: "POST", body: fd });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "дёҠеӮіеӨұж•—");
          setCfg((c) => ({ ...c, folder: j.folder }));
          await doScanFolder(j.folder);   // иҮӘеӢ•жҺғжҸҸ
        } catch (e) { setStatus("йҢҜиӘӨ: " + e.message); }
        finally { setBusy(false); }
      };

      // дёҠеӮіе…ҘеҸЈпјҡдҫқжӘ”еҗҚжЁЎејҸдёӢгҖҢе…ҲзўәиӘҚ idxгҖҒеҶҚдёҠеӮігҖҚгҖӮжӘ”еҗҚеңЁзҖҸиҰҪеҷЁз«Ҝ(File.name)еҚіеҸҜеҸ–еҫ—пјҢ
      //   дёҚеҝ…е…ҲдёҠеӮіе°ұиғҪжҠҪ idx вҶ’ зўәиӘҚе°Қи©ұжЎҶеҮәзҸҫеңЁдёҠеӮід№ӢеүҚпјӣжҢүгҖҢзўәиӘҚгҖҚжүҚзңҹзҡ„дёҠеӮіпјҢгҖҢеҸ–ж¶ҲгҖҚеүҮд»ҖйәјйғҪдёҚеҒҡгҖӮ
      const uploadImages = (files) => {
        const list = [...(files || [])];
        if (!list.length) return;
        if (cfg.autoAlign) {
          const imgs = list.filter((f) => /\.(png|jpe?g|gif|bmp|webp|tiff?)$/i.test(f.name || ""));
          if (!imgs.length) { setStatus("жІ’жңүең–зүҮжӘ” (png/jpgвҖҰ)"); return; }
          setIdxConfirm({ ...analyzeFilenameIdx(imgs, cfg.label.pattern), _files: imgs });
          return;
        }
        doUploadImages(list);
      };

      // и®ҖеҸ– pptx/key зҜ„жң¬дёӯзҡ„иЎЁж је№ҫдҪ•пјҲеҲ—/ж¬„/дҪҚзҪ®/еҗ„ж¬„еҜ¬еҲ—й«ҳпјү
      const loadTableInfo = async () => {
        if (!tplPath) { setStatus("и«Ӣе…ҲдёҠеӮізҜ„жң¬"); return; }
        setTableInfoLoading(true);
        try {
          const r = await fetch("/api/template/table-info", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path: tplPath }),
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "и®ҖеҸ–еӨұж•—");
          setTableInfo(j);
          setStatus(j.tables?.length ? `еҒөжё¬еҲ° ${j.tables.length} еҖӢиЎЁж ј` : "жӯӨзҜ„жң¬жІ’жңүиЎЁж ј");
        } catch (e) {
          setTableInfo({ tables: [], error: e.message });
          setStatus("и®ҖеҸ–иЎЁж јеӨұж•—: " + e.message);
        } finally { setTableInfoLoading(false); }
      };

      // жҸӣзҜ„жң¬жҷӮпјҡжё…жҺүиҲҠиіҮиЁҠгҖҒйҮҚиЁӯ auto-apply ж——жЁҷгҖҒиҮӘеӢ•и®Җж–°зҜ„жң¬зҡ„иЎЁж ј (slides + pptx)
      const autoAppliedRef = useRef(false);
      const excelAutoRef = useRef(false);   // xlsx иЎЁж јеҒөжё¬пјҡжҜҸеҖӢзҜ„жң¬еҸӘиҮӘеӢ•еҘ—дёҖж¬Ў
      useEffect(() => {
        autoAppliedRef.current = false;
        excelAutoRef.current = false;
        setTableInfo(null);
        if (tplPath && mode === "slides" && /\.pptx$/i.test(tplPath)) {
          loadTableInfo();
        }
      }, [tplPath, mode]);

      // xlsxпјҡgrid ијүе…ҘеҫҢиҮӘеӢ•еҒөжё¬иЎЁж јдҪҚзҪ® вҶ’ й җиЁӯгҖҢиө·е§Ӣ cell + SN еҜ«е…Ҙж¬„гҖҚ(жҜҸзҜ„жң¬дёҖж¬ЎпјҢжҜ”з…§ ppt/key)
      useEffect(() => {
        if (!xlGrid) { excelAutoRef.current = false; return; }
        if (excelAutoRef.current || cfg.snMatchMode) return;
        const d = detectExcelTable(xlGrid);
        if (!d) return;
        excelAutoRef.current = true;
        const headerOrder = (d.headerCols || []).slice();
        setCfg((c) => {
          const next = { ...c, excel: { ...c.excel, startCell: d.startCell, snCol: d.snCol, imgsPerRow: d.imgsPerRow } };
          // иЎЁй ӯжңүж–Үеӯ— вҶ’ иҮӘеӢ•жҠҠ idx ж¬„дҪҚжҺ’жҲҗи·ҹиЎЁй ӯдёҖиҮҙпјҲдҫқжӘ”еҗҚеӯ—жҜҚеҫҢз¶ҙиҮӘеӢ•е°ҚдҪҚпјҢе…ҚжүӢеӢ•жҺ’еәҸпјү
          if (headerOrder.some((h) => h)) {
            next.label = { ...c.label, idxSort: "custom", idxOrder: headerOrder };
          }
          return next;
        });
        const L = (ci) => ((xlGrid.cols || [])[ci - 1] || {}).letter || "";
        const ord = headerOrder.filter((h) => h);
        setStatus(`еҒөжё¬еҲ°иЎЁж ј ${L(d.region.minC)}${d.region.minR}:${L(d.region.maxC)}${d.region.maxR} вҶ’ иө·е§Ӣ ${d.startCell}гҖҒSN ж¬„ ${d.snCol}`
          + (ord.length ? `гҖҒж¬„дҪҚдҫқиЎЁй ӯе°ҚдҪҚпјҲ${ord.join(" / ")}пјү` : ""));
      }, [xlGrid]);

      // гҖҢдҫқй ҶеәҸгҖҚе·Із§»йҷӨпјҡдҫқжӘ”еҗҚ(йқһ snMatch)еӣәе®ҡз”Ё idx е°ҚдҪҚгҖӮиҮӘжҲ‘дҝ®еҫ©вҖ”вҖ”иӢҘиҲҠ session / иҲҠ
      // recipe и®“ autoAlign=falseпјҢеј·еҲ¶еӣһ trueпјҢеҗҰеүҮгҖҢе°ҚдҪҚз”Ёе“ӘдёҖж®ө?гҖҚж¬„дҪҚе®ҡзҫ© UI жңғж¶ҲеӨұдё”з„Ў toggle еҸҜж•‘гҖӮ
      useEffect(() => {
        if (!cfg.snMatchMode && !cfg.autoAlign) setCfg((c) => ({ ...c, autoAlign: true }));
      }, [cfg.snMatchMode, cfg.autoAlign]);

      // зҜ„жң¬иЎЁй ӯж¬„дҪҚй ҶеәҸпјҲзөҰгҖҢдҫқзҜ„жң¬иЎЁй ӯгҖҚйӮ„еҺҹжҢүйҲ•з”Ёпјӣйқһ xlsx иЎЁж јеүҮзӮәз©әпјү
      const tblHeaderOrder = useMemo(() => {
        if (!xlGrid) return [];
        const d = detectExcelTable(xlGrid);
        return d && Array.isArray(d.headerCols) ? d.headerCols : [];
      }, [xlGrid]);

      // ppt/key зҜ„жң¬иЎЁж јпјҲзөҰ SN еҜ«е…Ҙе„Іеӯҳж јзҡ„ max / зҜ„еңҚжҸҗзӨәз”Ёпјү
      const slidesTbl = (mode === "slides" && tableInfo && !tableInfo.error) ? (tableInfo.tables || [])[0] : null;

      // еҘ—з”ЁиЎЁж јпјҡз”ЁиЎЁж јеә§жЁҷеЎ«гҖҢдҪҚзҪ® + ең–зүҮеҚҖзёҪеҜ¬гҖҚпјҢең–зүҮж¬„ж•ё/еҲ—ж•ёгҖҢи·ҹйҡЁдҪҝз”ЁиҖ…е·ҰеҒҙиЁӯе®ҡгҖҚ
      // пјҲиЎЁж јеёёжҠҠеӨҡејөең–ж”ҫеңЁдёҖеҖӢеҜ¬зҡ„еҗҲдҪөж¬„пјҢж¬„ж•ёзңӢдёҚеҮәдҫҶпјҢжүҖд»Ҙз”ЁдҪҝз”ЁиҖ…зҡ„ cols е№іеҲҶпјү
      const applyTable = (t, scOverride, srOverride, preserveWidth) => {
        if (!tableInfo) return;
        const W = tableInfo.slide.width_cm, H = tableInfo.slide.height_cm;
        const cw = t.col_widths_cm || [], rh = t.row_heights_cm || [];
        const sc = Math.max(0, Math.min(t.cols - 1, scOverride != null ? scOverride : tblSkipCols));
        const sr = Math.max(0, Math.min(t.rows - 1, srOverride != null ? srOverride : tblSkipRows));
        // вҡ  еҜҰжё¬пјҡLibreOffice / PowerPoint жёІжҹ“иЎЁж јд»ҘгҖҢеҲ—й«ҳеҠ зёҪгҖҚзӮәжә–пјҢеҝҪз•Ҙ graphicFrame й«ҳеәҰгҖӮ
        //   жүҖд»Ҙз”Ё sumRH(еҲ—й«ҳеҠ зёҪ) з•¶жңүж•ҲиЎЁж јй«ҳгҖҒеҗ„еҲ—з”ЁеҺҹе§ӢеҲ—й«ҳ(дёҚзё®ж”ҫ)гҖӮж¬„еҜ¬еҗҢзҗҶз”ЁеҠ зёҪгҖӮ
        const sumRH = rh.reduce((a, b) => a + b, 0) || t.height_cm;
        const labelW = cw.slice(0, sc).reduce((a, b) => a + b, 0);
        const imgAreaW = Math.max(0.1, cw.slice(sc).reduce((a, b) => a + b, 0));
        const headerH = rh.slice(0, sr).reduce((a, b) => a + b, 0);   // дёҚзё®ж”ҫ
        const imgLeft = t.left_cm + labelW;
        const imgTop = t.top_cm + headerH;
        // ең–зүҮеҲ—й«ҳпјҡз”ЁгҖҢ(еҲ—й«ҳеҠ зёҪ вҲ’ иЎЁй ӯ) Г· ең–зүҮеҲ—ж•ёгҖҚе№іеҲҶпјҲдёҚзё®ж”ҫпјҢе°ҚйҪҠеҜҰйҡӣжёІжҹ“пјү
        const imageRows = Math.max(1, t.rows - sr);
        const imgRowH = (sumRH - headerH) / imageRows;
        const pct = (v) => Math.round(v * 100) / 100;
        pushHistory("еҘ—з”ЁиЎЁж ј");
        setCfg((c) => {
          const cols = Math.max(1, c.grid.cols);          // и·ҹйҡЁдҪҝз”ЁиҖ…гҖҢж¬„гҖҚиЁӯе®ҡ
          // й җиЁӯпјҡең–й«ҳеЎ« ~88% еҲ—й«ҳ вҶ’ еҸҚжҺЁең–еҜ¬(дҝқжҜ”дҫӢ)пјӣеү©йӨҳз©әй–“еқҮеҲҶжҲҗзӯүи·қ(еҗ«еӨ–з·Ј)
          const firstFile = orderedFiles && orderedFiles[0];
          const aspect0 = firstFile && firstFile.h && firstFile.w ? firstFile.h / firstFile.w : 0.62;
          let dImgW = (imgRowH * 0.88) / aspect0;
          const slotW0 = imgAreaW / cols;
          if (dImgW > slotW0 * 0.96) dImgW = slotW0 * 0.96;
          const dGap = Math.max(0, (imgAreaW - cols * dImgW) / (cols + 1));
          return {
            ...c,
            slide: { width_cm: W, height_cm: H },
            grid: {
              ...c.grid,
              origin: { x: pct(imgLeft / W * 100), y: pct(imgTop / H * 100) },
              // з”ұ toggle йҮҚж–°й–Ӣе•ҹжҷәиғҪжҺ’еҲ—жҷӮдҝқз•ҷзҸҫжңүең–еҜ¬(еЎ«ж»ҝж јй«ҳ%дёҚиў«жү“еӣһй җиЁӯ)пјӣеҲқж¬Ў/ж”№з•ҘйҒҺж¬„еҲ—жүҚз”Ё 88% й җиЁӯ
              width: preserveWidth && c.grid.width > 0 ? c.grid.width : pct(dImgW / W * 100),
              areaW: pct(imgAreaW / W * 100),    // ең–зүҮеҚҖзёҪеҜ¬ вҶ’ ж•ҙзө„зҪ®дёӯ
              gap: { x: pct(dGap / W * 100), y: 0 },  // й җиЁӯзӯүи·қ(й–“и·қX)пјҢеҸҜиӘҝ
              rowH: pct(imgRowH / H * 100),   // йҺ–жӯ»еҲ—й«ҳ вҶ’ ең–зүҮдҝқжҜ”дҫӢгҖҒеһӮзӣҙзҪ®дёӯгҖҒиІјйҪҠиЎЁж јеҲ—
              // cols / rows йғҪдёҚеӢ• вҶ’ е®Ңе…Ёи·ҹйҡЁе·ҰеҒҙйқўжқҝгҖҢжҜҸй Ғз¶Іж јгҖҚиЁӯе®ҡ
            },
            label: {
              ...c.label,
              enabled: sc > 0,
              x: pct(t.left_cm / W * 100),
              width: pct(labelW / W * 100),
            },
          };
        });
        setStatus(`жҷәиғҪжҺ’еҲ—е·Ій–Ӣе•ҹгҖӮж¬„гҖҒеҲ—ж•ёи«Ӣз”Ёе·ҰеҒҙгҖҢжҜҸй Ғз¶Іж јгҖҚиЁӯе®ҡпјҲжӯӨиЎЁж јжңү ${Math.max(1, t.rows - sr)} еҖӢең–зүҮеҲ—пјү`);
      };

      // й—ңй–үжҷәиғҪжҺ’еҲ—пјҡжҠҠжҷәиғҪжҺ’еҲ—гҖҢз•¶дёӢгҖҚзҡ„е№ҫдҪ•зғҳз„ҷйҖІгҖҢиҲҠзҡ„зӯүжҜ”жүӢеӢ•жЁЎеһӢгҖҚ(rowH=0)пјҢ
      //   иҖҢйқһдҝқз•ҷйҺ–жӯ»еҲ—й«ҳгҖӮйҖҷжЁЈ ONвҶ’OFF йҖҗж¬„е°ҚйҪҠдёҚи·іпјҢдё”д№ӢеҫҢиӘҝе°әеҜёеӣһеҲ°гҖҢж•ҙй«”зӯүжҜ”зё®ж”ҫгҖҚиҲҠжүӢж„ҹ
      //   (еҲ—й«ҳ=ең–й«ҳйҡЁе°әеҜёдёҖиө·й•·гҖҒеһӮзӣҙй–“и·қеӣәе®ҡ)пјҢдёҚжңғеҮәзҸҫгҖҢе…ҲеҗғеһӮзӣҙз•ҷзҷҪгҖҒеҶҚж’җж°ҙе№ігҖҚзҡ„жҖӘиЎҢзӮәгҖӮ
      // жҸӣз®—(д»Ҙз¬¬дёҖејөзҡ„жңүж•ҲжҜ”дҫӢ asp зӮәжә–пјҢзөұдёҖиЈҒеҲҮжҷӮзІҫзўәпјӣеҗ„ж¬„дёҚеҗҢиЈҒеҲҮжҷӮзӮәиҝ‘дјј)пјҡ
      //   ж°ҙе№іпјҡеҜҰйҡӣең–еҜ¬ colWгҖҒеҚіжҷӮзӯүи·қ d(еЎ«ж»ҝ areaW)вҶ’ width=colWгҖҒgap.x=dгҖҒorigin.x+=d(иЈңе·ҰеӨ–з·Ј)
      //   еһӮзӣҙпјҡжҷәиғҪжҺ’еҲ—ең–й«ҳ imgH еңЁж јй«ҳ cellH е…§зҪ®дёӯ вҶ’ жҠҠдёҠдёӢз•ҷзҷҪиҪүжҲҗеӣәе®ҡзҡ„ gap.y иҲҮ origin.y еҒҸз§»
      //         gap.y = (cellH-imgH)+еҺҹgap.yгҖҒorigin.y += (cellH-imgH)/2 вҶ’ йҖҗеҲ— y иҲҮ ON е®Ңе…Ёеҗ»еҗҲ
      const clearTable = () => {
        pushHistory("й—ңй–үжҷәиғҪжҺ’еҲ—");
        setCfg((c) => {
          const W = c.slide.width_cm, H = c.slide.height_cm, g = c.grid;
          const cellH = H * g.rowH / 100;
          const wCm = W * g.width / 100;
          const asp = effAspect((orderedFiles || [])[0]) || 0.62;
          const imgH = Math.min(wCm * asp, cellH);            // жҷәиғҪжҺ’еҲ—з•¶дёӢзҡ„ең–й«ҳ
          const colW = asp > 0 ? imgH / asp : wCm;            // жҷәиғҪжҺ’еҲ—з•¶дёӢзҡ„еҜҰйҡӣең–еҜ¬
          const cols = c.autoAlign ? Math.max(1, autoIdxList.length) : Math.max(1, g.cols);
          const areaWcm = W * g.areaW / 100;
          const d = Math.max(0, (areaWcm - cols * colW) / (cols + 1));   // еҚіжҷӮзӯүи·қ(еҗ«еӨ–з·Ј)
          const gyCm = H * g.gap.y / 100;
          const pctW = (v) => Math.round(v / W * 100 * 100) / 100;
          const pctH = (v) => Math.round(v / H * 100 * 100) / 100;
          return {
            ...c,
            grid: {
              ...g,
              origin: {
                x: Math.round((g.origin.x + pctW(d)) * 100) / 100,
                y: Math.round((g.origin.y + pctH((cellH - imgH) / 2)) * 100) / 100,
              },
              gap: { x: pctW(d), y: pctH(cellH - imgH + gyCm) },
              width: pctW(colW),
              rowH: 0,      // и§ЈйҷӨйҺ–жӯ»еҲ—й«ҳ вҶ’ е°әеҜёиӘҝж•ҙеӣһеҲ°гҖҢж•ҙй«”зӯүжҜ”зё®ж”ҫгҖҚиҲҠиЎҢзӮә
              areaW: 0,
            },
          };
        });
        setStatus("жҷәиғҪжҺ’еҲ—е·Ій—ңй–үпјҲзүҲйқўдҝқз•ҷпјҢеҸҜжүӢеӢ•еҫ®иӘҝпјү");
      };
      const smartOn = cfg.grid.areaW > 0;

      // жңүж•ҲжҜ”дҫӢпјҡиҖғж…®иЈҒеҲҮеҫҢзҡ„й•·еҜ¬жҜ” (е…Ёеҹҹ cfg.crop жҲ– еҗ„ж¬„ idxCrops)пјҢйҒҝе…Қең–иў«жӢүдјё
      const cropOfFile = (f) => {
        if (!f) return null;
        if (cfg.autoAlign && cfg.cropMode === "per-col") {
          const { idx } = extractGroupIdx(f.name || "", cfg.label.pattern);
          const c = (cfg.label.idxCrops || {})[String(idx)];
          return c && c.enabled ? c : null;
        }
        return cfg.crop && cfg.crop.enabled ? cfg.crop : null;
      };
      const effAspect = (f) => {
        if (!f || !f.w || !f.h) return 0.75;
        let asp = f.h / f.w;
        const c = cropOfFile(f);
        if (c) {
          const cw = (c.right - c.left), ch = (c.bottom - c.top);
          if (cw > 0 && ch > 0) asp = (f.h * ch) / (f.w * cw);
        }
        return asp;
      };

      // й җиЁӯ ONпјҡиЎЁж ји®ҖеҲ°еҫҢгҖҒиӢҘйӮ„жІ’еҘ—йҒҺдё”зӣ®еүҚйқһжҷәиғҪжЁЎејҸпјҢиҮӘеӢ•еҘ—з”ЁжҷәиғҪжҺ’еҲ— (дёҖж¬Ў)
      useEffect(() => {
        if (!autoAppliedRef.current && !smartOn && tableInfo && (tableInfo.tables || []).length > 0) {
          autoAppliedRef.current = true;
          const t0 = tableInfo.tables[0];
          const d = detectSlidesTable(t0);   // иҮӘеӢ•еҒөжё¬иЎЁй ӯеҲ— / жЁҷзұӨж¬„ вҶ’ й җиЁӯ з•ҘйҒҺ + SN еҜ«е…ҘдҪҚзҪ®
          if (d) {
            setTblSkipCols(d.skipCols);
            setTblSkipRows(d.skipRows);
            setCfg((c) => ({ ...c, slidesSn: { ...c.slidesSn, col: d.snCol, rowStart: d.snRowStart } }));
            applyTable(t0, d.skipCols, d.skipRows);
          } else {
            applyTable(t0);
          }
        }
      }, [tableInfo]);
      // жҷәиғҪжЁЎејҸжҸӣз®—пјҡ
      //   smartHeightFillW = grid.width%пјҢдҪҝең–й«ҳ=ж јй«ҳ (= еЎ«ж»ҝж јй«ҳ 100%)
      //   smartMaxWidthPct = grid.width дёҠйҷҗ = min(еЎ«ж»ҝж јй«ҳ, Nж¬„еЎ«ж»ҝең–зүҮеҚҖ)пјӣи¶…йҒҺжІ’ж„Ҹзҫ©
      //   smartFillRatio   = зӣ®еүҚ grid.width е°ҚжҮүзҡ„гҖҢеЎ«ж»ҝж јй«ҳ %гҖҚ(йЎҜзӨәз”Ё)
      const _smartAspect = effAspect((orderedFiles || [])[0]) || 0.62;   // еҗ«иЈҒеҲҮзҡ„жңүж•ҲжҜ”дҫӢ
      const smartHeightFillW = smartOn
        ? Math.round((cfg.slide.height_cm * cfg.grid.rowH / 100 / _smartAspect) / cfg.slide.width_cm * 100 * 100) / 100
        : 100;
      const smartMaxWidthPct = (() => {
        if (!smartOn) return Infinity;
        const areaW = cfg.slide.width_cm * cfg.grid.areaW / 100;
        const cols = cfg.autoAlign ? Math.max(1, autoIdxList.length) : Math.max(1, cfg.grid.cols);
        const widthFillW = areaW / cols / cfg.slide.width_cm * 100;   // Nж¬„еЎ«ж»ҝжҷӮзҡ„ grid.width%
        return Math.round(Math.min(smartHeightFillW, widthFillW) * 100) / 100;
      })();
      const smartFillRatio = smartOn && smartHeightFillW > 0
        ? Math.round(cfg.grid.width / smartHeightFillW * 100)
        : 100;
      // жҷәиғҪжЁЎејҸпјҡgrid.width иӢҘи¶…йҒҺдёҠйҷҗ (иЈҒеҲҮ/жҜ”дҫӢи®ҠеӢ•еҫҢеҸҜиғҪзҷјз”ҹ) вҶ’ иҮӘеӢ•еӨҫеӣһпјҢйҒҝе…ҚгҖҢеЎ«ж»ҝж јй«ҳгҖҚ>100% иҲҮжәўеҮә
      useEffect(() => {
        if (smartOn && isFinite(smartMaxWidthPct) && cfg.grid.width > smartMaxWidthPct + 0.01) {
          setGrid("width", smartMaxWidthPct);
        }
      }, [smartOn, smartMaxWidthPct, cfg.grid.width]);

      // drag-drop handlers
      const onDropTemplate = async (e) => {
        e.preventDefault(); setDragTpl(false);
        const fs = await filesFromDrop(e.dataTransfer);
        const tpl = fs.find((f) => /\.(pptx|key|xlsx)$/i.test(f.name)) || fs[0];
        if (tpl) uploadTemplate(tpl);
      };
      const onDropImages = async (e) => {
        e.preventDefault(); setDragImg(false);
        const fs = await filesFromDrop(e.dataTransfer);
        const imgs = fs.filter((f) => /\.(png|jpe?g)$/i.test(f.name));
        if (imgs.length) uploadImages(imgs);
        else setStatus("жӢ–е…Ҙзҡ„е…§е®№жІ’жңүең–зүҮжӘ” (png/jpg)");
      };

      const doScanFolder = async (folder) => {
        const r = await fetch("/api/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ folder, extensions: cfg.extensions }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || "scan failed");
        setFiles(j.files);
        setOrder(j.files.map((f) => f.path));
        setStatus(`еҒөжё¬еҲ° ${j.files.length} ејөең–`);
        return j.files;
      };

      const doLoadTemplate = async (overridePath) => {
        const path = overridePath || tplPath;
        if (!path) return;
        setBusy(true); setStatus("ијүе…ҘзҜ„жң¬дёӯвҖҰ");
        try {
          const r = await fetch("/api/template/load", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path }),
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "ијүе…ҘеӨұж•—");
          setTpl(j);
          setCfg((c) => ({
            ...c,
            slide: { width_cm: j.width_cm, height_cm: j.height_cm },
            output: { ...c.output, template: j.path },
          }));
          setStatus(`е·Іијүе…ҘзҜ„жң¬ (${j.width_cm.toFixed(2)} Г— ${j.height_cm.toFixed(2)} cm)`);
        } catch (e) { setStatus("йҢҜиӘӨ: " + e.message); }
        finally { setBusy(false); }
      };

      const scanOnly = async () => {
        const r = await fetch("/api/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ folder: cfg.folder, extensions: cfg.extensions }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || "scan failed");
        return j;
      };

      const doScan = async () => {
        if (!cfg.folder) { setStatus("йҢҜиӘӨ: и«Ӣе…ҲжҢҮе®ҡең–зүҮиіҮж–ҷеӨҫ"); return; }
        setBusy(true); setStatus("жҺғжҸҸдёӯвҖҰ");
        try {
          const j = await scanOnly();
          setFiles(j.files);
          setOrder(j.files.map((f) => f.path));  // й җиЁӯеӯ—жҜҚеәҸ
          setStatus(`еҒөжё¬еҲ° ${j.files.length} ејөең–`);
        } catch (e) { setStatus("йҢҜиӘӨ: " + e.message); setFiles([]); setOrder([]); }
        finally { setBusy(false); }
      };

      const doExport = async () => {
        // SN е°Қз…§жЁЎејҸ вҖ” иҮӘжҲҗдёҖжўқи·Ҝеҫ‘
        if (cfg.snMatchMode) {
          if (!tplPath) { setStatus("йҢҜиӘӨ: и«Ӣе…ҲдёҠеӮі Excel зҜ„жң¬"); return; }
          if (!snList.length) { setStatus("йҢҜиӘӨ: и«Ӣе…Ҳијүе…Ҙ SN list"); return; }
          if (!cfg.sources.length) { setStatus("йҢҜиӘӨ: иҮіе°‘йңҖдёҖеҖӢдҫҶжәҗ"); return; }
          setBusy(true); setStatus("зө„иЈқ SN е°Қз…§ cellsвҖҰ");
          try {
            const perCol = cfg.cropMode === "per-col";
            const cells = [];
            for (const { sn, row } of snList) {
              const stem = sn.toLowerCase();
              for (const s of cfg.sources) {
                const f = (s.files || []).find((x) => (x.name || "").replace(/\.[^./]+$/, "").toLowerCase() === stem);
                if (!f) continue;
                const col = colLetterToIdx(s.targetCol);
                if (!col) continue;
                cells.push({
                  path: f.path, row, col,
                  span_cols: 1, span_rows: 1,
                  crop: perCol && s.crop?.enabled ? s.crop : null,
                });
              }
            }
            if (!cells.length) throw new Error("жІ’жңүеҸҜеҢҜеҮәзҡ„ең–зүҮ (жӘўжҹҘ SN иҲҮдҫҶжәҗжӘ”еҗҚжҳҜеҗҰе°ҚжҮү)");
            const body = JSON.stringify({
              cells, output: cfg.output, workspace: ws,
              embedInCell: !!cfg.excel.embedInCell,
              imgFit: cfg.excel.imgFit || "cover",
              containInset: Math.max(0, Math.min(45, cfg.excel.containInset ?? 5)) / 100,
              crop: !perCol ? cfg.crop : null,  // зөұдёҖжЁЎејҸпјҡйҖҒ global crop
            });
            setStatus(`еҢҜеҮә Excel дёӯвҖҰ (${cells.length} ж ј)`);
            const r = await fetch("/api/export", {
              method: "POST", headers: { "Content-Type": "application/json" }, body,
            });
            const j = await r.json();
            if (!r.ok) throw new Error(j.error || "export failed");
            if (j.download_url) {
              window.open(j.download_url, "_blank");
              setStatus(`вң“ е·ІеҢҜеҮә ${cells.length} ж ј (SN е°Қз…§)`);
            } else {
              setStatus(`вң“ ${j.output}`);
            }
          } catch (e) { setStatus("йҢҜиӘӨ: " + e.message); }
          finally { setBusy(false); }
          return;
        }

        if (!cfg.folder) { setStatus("йҢҜиӘӨ: и«Ӣе…ҲжҢҮе®ҡең–зүҮиіҮж–ҷеӨҫ"); return; }
        setBusy(true); setStatus("еҢҜеҮәдёӯвҖҰ");
        try {
          let arr = orderedFiles;
          if (arr.length === 0) {
            setStatus("жҺғжҸҸдёӯвҖҰ");
            const j = await scanOnly();
            setFiles(j.files);
            setOrder(j.files.map((f) => f.path));
            arr = j.files;
          }
          // дҫқжӘ”еҗҚ idx + еҗ„ж¬„зҚЁз«Ӣпјҡд»ҘжӘ”еҗҚжҠҪ idx вҶ’ жҹҘ idxCrops жіЁе…Ҙ per-placement crop
          const perColIdxCrop = cfg.autoAlign && cfg.cropMode === "per-col";
          const idxCrops = cfg.label.idxCrops || {};
          const attachIdxCrop = (pl) => {
            if (!perColIdxCrop || !pl.path) return pl;
            // еҫһ placement жүҫе°ҚжҮүзҡ„ file еҸ–жӘ”еҗҚжҠҪ idx
            const f = arr.find((x) => x.path === pl.path);
            if (!f) return pl;
            const { idx } = extractGroupIdx(f.name || "", cfg.label.pattern);
            if (idx == null) return pl;
            const c = idxCrops[String(idx)];
            return c?.enabled ? { ...pl, crop: c } : pl;
          };
          let body;
          if (mode === "excel") {
            const cells = computeExcelCells(cfg.excel, cfg.label, arr, cfg.autoAlign).map(attachIdxCrop);
            if (cells.length === 0) throw new Error("жІ’жңүеҸҜеҢҜеҮәзҡ„ең–зүҮ");
            setStatus(`еҢҜеҮә Excel дёӯвҖҰ (${cells.length} ж ј)`);
            body = JSON.stringify({
              cells, output: cfg.output, workspace: ws,
              embedInCell: !!cfg.excel.embedInCell,
              imgFit: cfg.excel.imgFit || "cover",
              containInset: Math.max(0, Math.min(45, cfg.excel.containInset ?? 5)) / 100,
              crop: perColIdxCrop ? null : cfg.crop,
            });
          } else {
            const pages = computePages(cfg.slide, cfg.grid, arr, cfg.label, cfg.autoAlign, effAspect)
              .map((page) => page.map(attachIdxCrop));
            if (pages.length === 0) throw new Error("жІ’жңүеҸҜеҢҜеҮәзҡ„ең–зүҮ");
            setStatus(`еҢҜеҮәдёӯвҖҰ (${pages.length} й Ғ)`);
            body = JSON.stringify({
              slide: cfg.slide, pages, output: cfg.output, workspace: ws,
              snInCell: cfg.label.enabled && cfg.slidesSn.inCell,
              snCol: Math.max(0, (cfg.slidesSn.col || 1) - 1),
              snRowStart: Math.max(0, (cfg.slidesSn.rowStart || 2) - 1),
              crop: perColIdxCrop ? null : cfg.crop,
            });
          }
          const r = await fetch("/api/export", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body,
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "export failed");
          if (j.download_url) {
            // и§ёзҷјзҖҸиҰҪеҷЁдёӢијү
            const a = document.createElement("a");
            a.href = j.download_url;
            a.download = "";
            document.body.appendChild(a); a.click(); a.remove();
            setStatus(`вң“ е·Із”ўеҮә ${j.pages} й ҒпјҢе·Ій–Ӣе§ӢдёӢијү`);
            showToast({ kind: "success", title: "вң“ е·ІдёӢијүпјҒ", sub: `${j.pages} й Ғе®ҢжҲҗ В· жҸӣдёҖжү№ең–гҖҒз”ЁеҗҢиЁӯе®ҡеҸҜеҶҚеҢҜеҮә` });
          } else {
            setStatus(`вң“ е·ІијёеҮә ${j.pages} й Ғ: ${j.output}`);
          }
        } catch (e) { setStatus("йҢҜиӘӨ: " + e.message); console.error(e); }
        finally { setBusy(false); }
      };

      // --- йҒёеҸ– ---
      const selPathsOrFallback = () =>
        selectedPaths.length ? selectedPaths : (selected ? [selected] : []);

      const onItemClick = (e, path, idx) => {
        if (e.shiftKey && anchorRef.current != null) {
          const a = anchorRef.current, b = idx;
          const [lo, hi] = a < b ? [a, b] : [b, a];
          setSelectedPaths(orderedFiles.slice(lo, hi + 1).map((f) => f.path));
        } else if (e.metaKey || e.ctrlKey) {
          setSelectedPaths((prev) =>
            prev.includes(path) ? prev.filter((p) => p !== path) : [...prev, path]);
          anchorRef.current = idx;
        } else {
          setSelectedPaths([path]);
          anchorRef.current = idx;
          setCurrentPage(Math.floor(idx / Math.max(1, cfg.grid.cols * cfg.grid.rows)));
        }
        setSelected(path);
      };

      // --- жҺ’еәҸ / еҲӘйҷӨ ---
      const moveSelected = (delta) => {
        const sel = new Set(selPathsOrFallback());
        if (!sel.size) return;
        pushHistory(delta < 0 ? "дёҠз§»" : "дёӢз§»");
        setOrder((o) => {
          const next = [...o];
          const idxs = next.map((p, i) => (sel.has(p) ? i : -1)).filter((i) => i >= 0);
          const seq = delta < 0 ? idxs : [...idxs].reverse();
          for (const i of seq) {
            const t = i + delta;
            if (t < 0 || t >= next.length || sel.has(next[t])) continue;
            [next[i], next[t]] = [next[t], next[i]];
          }
          return next;
        });
      };
      const moveTop = () => {
        const sel = new Set(selPathsOrFallback());
        if (!sel.size) return;
        pushHistory("зҪ®й Ӯ");
        setOrder((o) => [...o.filter((p) => sel.has(p)), ...o.filter((p) => !sel.has(p))]);
      };
      const moveBottom = () => {
        const sel = new Set(selPathsOrFallback());
        if (!sel.size) return;
        pushHistory("зҪ®еә•");
        setOrder((o) => [...o.filter((p) => !sel.has(p)), ...o.filter((p) => sel.has(p))]);
      };
      const deleteSelected = () => {
        const sel = new Set(selPathsOrFallback());
        if (!sel.size) return;
        pushHistory(`еҲӘйҷӨ ${sel.size} ејө`);
        setOrder((o) => o.filter((p) => !sel.has(p)));
        setFiles((fs) => fs.filter((f) => !sel.has(f.path)));
        setSelectedPaths([]);
        setSelected(null);
      };
      const resetSort = () => {
        pushHistory("AвҶ’Z жҺ’еәҸ");
        // иҮӘз„¶жҺ’еәҸпјҡж•ёеӯ—ж®өз•¶ж•ёеӯ—жҜ”пјҢQN2 еңЁ QN10 еүҚйқўпјҲйқһзҙ”еӯ—е…ёеәҸпјү
        setOrder([...files]
          .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: "base" }))
          .map((f) => f.path));
        setSelectedPaths([]);
      };

      // --- жӢ–жӣійҮҚжҺ’ ---
      // жӢ–жӣіеҲ°жё…е–®дёҠ/дёӢз·ЈиҮӘеӢ•жҚІеӢ•
      const startAutoScroll = () => {
        if (scrollRafRef.current) return;
        const step = () => {
          const el = listRef.current;
          if (el && scrollDirRef.current !== 0) el.scrollTop += scrollDirRef.current * 10;
          scrollRafRef.current = requestAnimationFrame(step);
        };
        scrollRafRef.current = requestAnimationFrame(step);
      };
      const stopAutoScroll = () => {
        if (scrollRafRef.current) { cancelAnimationFrame(scrollRafRef.current); scrollRafRef.current = null; }
        scrollDirRef.current = 0;
      };
      const onListDragOver = (e) => {
        const el = listRef.current;
        if (!el) return;
        const rect = el.getBoundingClientRect();
        const EDGE = 48;
        if (e.clientY < rect.top + EDGE) scrollDirRef.current = -1;
        else if (e.clientY > rect.bottom - EDGE) scrollDirRef.current = 1;
        else scrollDirRef.current = 0;
        if (scrollDirRef.current !== 0) startAutoScroll();
        else stopAutoScroll();
      };

      const onItemDragStart = (e, path) => {
        const inSel = selectedPaths.includes(path);
        if (!inSel) { setSelectedPaths([path]); setSelected(path); }
        dragFromRef.current = path;
        e.dataTransfer.effectAllowed = "move";
        // еӨҡйҒёжҷӮйЎҜзӨәгҖҢз§»еӢ• N еҖӢжӘ”жЎҲгҖҚзҡ„жӢ–жӣіж®ҳеҪұ
        const count = inSel ? selectedPaths.length : 1;
        if (count > 1) {
          const ghost = document.createElement("div");
          ghost.textContent = `з§»еӢ• ${count} еҖӢжӘ”жЎҲ`;
          ghost.style.cssText =
            "position:absolute;top:-1000px;left:-1000px;padding:6px 12px;" +
            "background:#059669;color:#fff;border-radius:8px;font-size:13px;" +
            "font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.25);white-space:nowrap;";
          document.body.appendChild(ghost);
          e.dataTransfer.setDragImage(ghost, 12, 12);
          setTimeout(() => { try { document.body.removeChild(ghost); } catch (_) {} }, 0);
        }
      };
      const onItemDrop = (e, targetPath) => {
        e.preventDefault();
        const from = dragFromRef.current;
        setDragOverIdx(null);
        if (!from) return;
        pushHistory("жӢ–жӣійҮҚжҺ’");
        const movingSet = new Set(selectedPaths.includes(from) ? selectedPaths : [from]);
        setOrder((o) => {
          const movingOrdered = o.filter((p) => movingSet.has(p));
          const without = o.filter((p) => !movingSet.has(p));
          let at = without.indexOf(targetPath);
          if (at < 0) at = without.length;
          return [...without.slice(0, at), ...movingOrdered, ...without.slice(at)];
        });
        dragFromRef.current = null;
        stopAutoScroll();
      };

      // --- е°ҚдҪҚжЁЎејҸпјҡд»Ҙ SN зҫӨзө„зӮәе–®дҪҚжӢ–жӣійҮҚжҺ’ ---
      const onCardDragStart = (e, group) => {
        dragFromRef.current = `__group:${group}`;
        e.dataTransfer.effectAllowed = "move";
        const ghost = document.createElement("div");
        ghost.textContent = `з§»еӢ• SNгҖҢ${group}гҖҚ`;
        ghost.style.cssText =
          "position:absolute;top:-1000px;left:-1000px;padding:6px 12px;" +
          "background:#0284c7;color:#fff;border-radius:8px;font-size:13px;" +
          "font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.25);white-space:nowrap;";
        document.body.appendChild(ghost);
        e.dataTransfer.setDragImage(ghost, 12, 12);
        setTimeout(() => { try { document.body.removeChild(ghost); } catch (_) {} }, 0);
      };
      const onCardDrop = (e, targetGroup) => {
        e.preventDefault();
        const from = dragFromRef.current;
        setDragOverIdx(null);
        dragFromRef.current = null;
        stopAutoScroll();
        if (!from || !from.startsWith("__group:")) return;
        const fromGroup = from.slice(8);
        if (fromGroup === targetGroup) return;
        pushHistory(`з§»еӢ• SN еҲ—гҖҢ${fromGroup}гҖҚ`);
        const pattern = cfg.label.pattern;
        const fileMap = new Map(files.map((f) => [f.path, f]));
        setOrder((o) => {
          const map = new Map();
          const groupOrder = [];
          for (const p of o) {
            const f = fileMap.get(p);
            if (!f) continue;
            const g = extractGroupIdx(f.name, pattern).group;
            if (!map.has(g)) { map.set(g, []); groupOrder.push(g); }
            map.get(g).push(p);
          }
          const fi = groupOrder.indexOf(fromGroup);
          if (fi < 0) return o;
          groupOrder.splice(fi, 1);
          const ti = targetGroup == null ? groupOrder.length : groupOrder.indexOf(targetGroup);
          groupOrder.splice(ti < 0 ? groupOrder.length : ti, 0, fromGroup);
          return groupOrder.flatMap((g) => map.get(g));
        });
      };

      // --- й җиҰҪ ---
      const STAGE_W = 640;
      const scale = STAGE_W / cfg.slide.width_cm;
      const stageH = cfg.slide.height_cm * scale;
      const _pagesRaw = computePages(cfg.slide, cfg.grid, orderedFiles, cfg.label, cfg.autoAlign, effAspect);
      // SN еҜ«е…ҘиЎЁж је„Іеӯҳж јпјҡй җиҰҪд№ҹиҰҒеҸҚжҳ  вҶ’ жҠҠ SN ж–Үеӯ—з§»еҲ°гҖҢзҜ„жң¬иЎЁж јзҡ„зӣ®жЁҷе„Іеӯҳж јгҖҚзҹ©еҪў(иҲҮең–зүҮдҪҚзҪ®и„«йүӨ)пјҢ
      //   ж¬„ = slidesSn.col-1гҖҒеҲ— = (rowStart-1) + и©ІеҲ— row_idxпјҢе№ҫдҪ•еҸ–иҮӘ tableInfo(left/top/еҗ„ж¬„еҜ¬/еҗ„еҲ—й«ҳ)гҖӮ
      const snInCellPreview = cfg.label.enabled && cfg.slidesSn.inCell && slidesTbl;
      const snCellRect = (rowIdx) => {
        const cw = slidesTbl.col_widths_cm || [], rh = slidesTbl.row_heights_cm || [];
        const col0 = Math.max(0, (cfg.slidesSn.col || 1) - 1);
        const row0 = Math.max(0, (cfg.slidesSn.rowStart || 2) - 1) + (rowIdx || 0);
        if (col0 >= cw.length || row0 >= rh.length) return null;
        return {
          x_cm: slidesTbl.left_cm + cw.slice(0, col0).reduce((a, b) => a + b, 0),
          y_cm: slidesTbl.top_cm + rh.slice(0, row0).reduce((a, b) => a + b, 0),
          w_cm: cw[col0], h_cm: rh[row0],
        };
      };
      // жҜҸеҖӢ placement жіЁе…ҘгҖҢи§ЈжһҗеҫҢзҡ„иЈҒеҲҮгҖҚ(е…Ёеҹҹ cfg.crop жҲ– еҗ„ж¬„ idxCrops) вҶ’ й җиҰҪзё®ең–жүҚжңғиЈҒеҲҮгҖҒдё”дёҚиў«жӢүдјё
      const pages = _pagesRaw.map((page) => page.map((pl) => {
        if (pl.text !== undefined && pl.text !== null) {
          if (snInCellPreview) {
            const r = snCellRect(pl.row_idx);
            if (r) return { ...pl, ...r, _snCell: true };
          }
          return pl;
        }
        if (!pl.path) return pl;
        const f = orderedFiles.find((x) => x.path === pl.path);
        return { ...pl, _crop: cropOfFile(f) };
      }));
      const imgW_cm = cfg.slide.width_cm * cfg.grid.width / 100;
      const firstAnchor = orderedFiles[0];
      const previewH_cm = firstAnchor && firstAnchor.w ? imgW_cm * (firstAnchor.h / firstAnchor.w) : null;
      const perPage = Math.max(1, cfg.grid.cols) * Math.max(1, cfg.grid.rows);

      // жұәе®ҡ crop modal з·ЁијҜзҡ„е°ҚиұЎпјҡcropSourceId вҶ’ дҫҶжәҗ cropпјӣcropIdxKey вҶ’ per-idx cropпјӣеҗҰеүҮе…Ёеҹҹ crop
      const editingSource = cropSourceId != null ? cfg.sources.find((s) => s.id === cropSourceId) : null;
      const editingIdxKey = cropIdxKey;
      // е°Қж–ј per-idxпјҡжүҫдёҖејөи©І idx зҡ„д»ЈиЎЁең–
      const idxRepFile = editingIdxKey
        ? orderedFiles.find((f) => {
            const ex = extractGroupIdx(f.name || "", cfg.label.pattern);
            return String(ex.idx) === String(editingIdxKey);
          })
        : null;
      // е…Ёеҹҹ cropпјҡе…Ҳжүҫ orderedFilesпјӣsnMatch жЁЎејҸ fallback еҫһ sources жүҫ
      const allSrcFiles = cfg.sources?.flatMap((s) => s.files || []) || [];
      const cropTargetFile = editingSource
        ? (editingSource.files?.find((f) => f.path === selected) || editingSource.files?.[0])
        : editingIdxKey
        ? (idxRepFile || orderedFiles[0])
        : (selected && (orderedFiles.find((f) => f.path === selected) || allSrcFiles.find((f) => f.path === selected)))
          || orderedFiles[0] || allSrcFiles[0];
      const cropInitial = editingSource
        ? editingSource.crop
        : editingIdxKey
        ? (cfg.label.idxCrops?.[editingIdxKey] || { enabled: false, left: 0, top: 0, right: 1, bottom: 1 })
        : cfg.crop;

      const closeCropEdit = () => {
        setCropOpen(false);
        setCropSourceId(null);
        setCropIdxKey(null);
      };

      return (
        <div className="max-w-[1600px] mx-auto p-4 h-screen flex flex-col">
          {helpOpen && <HelpModal onClose={() => setHelpOpen(false)} />}
          {shortcutsOpen && <ShortcutsModal onClose={() => setShortcutsOpen(false)} />}
          {idxConfirm && (
            <IdxConfirmModal

                                ...style,
                                display: "flex", alignItems: "center", justifyContent: "center",
                                fontSize: (pl.font_pt || 18) * scale / 28.35,
                                fontWeight: pl.bold ? 700 : 400,
                                color: "#111",
                                ...(pl._snCell ? {
                                  background: "rgba(16,185,129,0.12)",
                                  outline: "1px dashed rgba(16,185,129,0.7)",
                                  outlineOffset: -1,
                                } : {}),
                              }}
                              title={pl._snCell ? "SN е°ҮеҜ«е…ҘжӯӨе„Іеӯҳж јпјҲеҢҜеҮәзөҗжһңпјү" : undefined}>
                                {pl.text}
                              </div>
                            );
                          }
                          return (
                            <img key={i}
                              src={thumbUrl(pl.path, 400, pl._crop)}
                              data-preview-path={pl.path}
                              style={{ ...style, scrollMargin: 30 }}
                              className={selected === pl.path ? "ring-4 ring-emerald-500 shadow-[0_0_18px_4px_rgba(16,185,129,0.7)] z-10 relative" : "border border-slate-300"} />
                          );
                        })}
                          </div>

                          {/* иҲһеҸ°дёӢж–№пјҡеҸӘз•ҷгҖҢе°әеҜёпјҸеЎ«ж»ҝж јй«ҳгҖҚдё»жҺ§еҲ¶вҖ”вҖ”OFF/ON еҗҢдҪҚзҪ®еҗҢеӨ§е°ҸгҖӮ
                              X иө· / й–“и·қX / SN X е·Іжө®е…Ҙй җиҰҪеә•з·ЈгҖӮ */}
                          <div className="flex justify-center mt-3">
                            <div className="relative">
                              {smartOn ? (
                                <Stepper label="еЎ«ж»ҝж јй«ҳ" orient="h" step={2} value={smartFillRatio}
                                  onChange={(r) => {
                                    const rr = Math.max(5, Math.min(100, r));
                                    setGrid("width", Math.min(Math.round(rr / 100 * smartHeightFillW * 100) / 100, smartMaxWidthPct));
                                  }} />
                              ) : (
                                <Stepper label="е°әеҜё" orient="h" value={cfg.grid.width}
                                  onChange={(v) => setGrid("width", v)} />
                              )}
                              <div className="absolute left-0 right-0 top-full text-[10px] text-slate-400 text-center mt-1 pointer-events-none">
                                {smartOn ? "100% = ең–й«ҳеЎ«ж»ҝж јй«ҳ" : "жҢүжҜ”дҫӢзё®ж”ҫ"}
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                      )}
                       </div>
                      </div>

                      {/* жҷәиғҪжҺ’еҲ—пјҡиҮӘеӢ•и®ҖзҜ„жң¬иЎЁж јгҖҒй җиЁӯе°ҚйҪҠгҖӮдёҖеҖӢ toggle жҗһе®ҡ */}
                      {tplPath && mode === "slides" && (() => {
                        const tbl = tableInfo && !tableInfo.error && (tableInfo.tables || [])[0];
                        const imageRows = tbl ? Math.max(1, tbl.rows - Math.min(tbl.rows - 1, tblSkipRows)) : 0;
                        return (
                          <div className="mt-3 pt-3 border-t border-slate-100 shrink-0 flex items-center gap-3 flex-wrap">
                            <button onClick={() => smartOn ? clearTable() : (tbl && applyTable(tbl, undefined, undefined, autoAppliedRef.current))}
                              disabled={!tbl}
                              className={`text-xs px-3 py-1 rounded-full border font-medium ${smartOn
                                ? "bg-emerald-600 text-white border-emerald-700 hover:bg-emerald-700"
                                : "bg-white text-slate-600 border-slate-300 hover:bg-slate-50"} disabled:opacity-40 disabled:cursor-not-allowed`}
                              title="ең–зүҮиҮӘеӢ•е°ҚйҪҠзҜ„жң¬иЎЁж јж јеӯҗгҖӮеҶҚжҢүдёҖж¬ЎеҲҮеӣһжүӢеӢ•з¶Іж ј">
                              вңЁ жҷәиғҪжҺ’еҲ—пјҡ{smartOn ? "й–Ӣ" : "й—ң"}
                            </button>
                            <span className="text-[11px] text-slate-500 flex-1 min-w-[10rem]">
                              {tableInfoLoading ? "и®ҖеҸ–зҜ„жң¬иЎЁж јдёӯвҖҰ"
                                : !tbl ? "жӯӨзҜ„жң¬жІ’жңүиЎЁж ј вҖ” жҷәиғҪжҺ’еҲ—дёҚйҒ©з”ЁпјҢж”№з”Ёе·ҰеҒҙгҖҢжҜҸй Ғз¶Іж јгҖҚпјӢдёӢж–№ steppers жүӢеӢ•жҺ’"
                                : smartOn ? `ең–зүҮе·Іе°ҚйҪҠзҜ„жң¬иЎЁж јпјҲ${imageRows} еҖӢең–зүҮеҲ—пјүВ· з”ЁдёҠж–№гҖҢеЎ«ж»ҝж јй«ҳгҖҚиӘҝеӨ§е°Ҹ`
                                : "е·Ій—ңй–ү вҖ” ж”№з”ЁжүӢеӢ•з¶Іж ј"}
                            </span>
                            {tbl && smartOn && (
                              <div className="flex items-center gap-2 text-[10px] text-slate-400">
                                <label className="flex items-center gap-1">з•ҘйҒҺе·ҰеҒҙ
                                  <input type="number" min="0" max={Math.max(0, tbl.cols - 1)} value={tblSkipCols}
                                    onChange={(e) => { const v = Math.max(0, Math.min(tbl.cols - 1, parseInt(e.target.value) || 0)); setTblSkipCols(v); applyTable(tbl, v, tblSkipRows); }}
                                    className="w-9 border rounded px-1 py-0.5" />ж¬„</label>
                                <label className="flex items-center gap-1">й ӮйғЁ
                                  <input type="number" min="0" max={Math.max(0, tbl.rows - 1)} value={tblSkipRows}
                                    onChange={(e) => { const v = Math.max(0, Math.min(tbl.rows - 1, parseInt(e.target.value) || 0)); setTblSkipRows(v); applyTable(tbl, tblSkipCols, v); }}
                                    className="w-9 border rounded px-1 py-0.5" />еҲ—</label>
                              </div>
                            )}
                          </div>
                        );
                      })()}
                    </>
                  );
                })()}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
