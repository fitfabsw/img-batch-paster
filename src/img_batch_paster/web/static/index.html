<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>img-batch-paster</title>
  <script src="/static/vendor/react.development.js"></script>
  <script src="/static/vendor/react-dom.development.js"></script>
  <script src="/static/vendor/babel.min.js"></script>
  <script src="/static/vendor/tailwindcss.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
    .stage { background: repeating-conic-gradient(#f3f4f6 0 25%, #ffffff 0 50%) 50% / 20px 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 36px; height: 36px; border: 4px solid #cbd5e1; border-top-color: #059669;
               border-radius: 50%; animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect, useLayoutEffect, useRef } = React;

    const DEFAULTS = {
      folder: "",
      extensions: [".png", ".jpg", ".jpeg", ".jfif", ".webp", ".gif", ".bmp", ".tif", ".tiff"],
      slide: { width_cm: 25.4, height_cm: 14.29 },
      grid: {
        origin: { x: 8, y: 15 },
        width: 25,
        gap:   { x: 2, y: 3 },
        cols: 3,
        rows: 3,
        rowH: 0,    // 固定列高 (% of slide height)；0=依圖片比例自動 (舊行為)。套用表格時設此值
        areaW: 0,   // 圖片區總寬 (% of slide width)；>0 時水平等距分佈(含外緣)。套用表格時設此值
      },
      label: {
        enabled: true,
        pattern: "{group}-{idx}",
        splitMode: "delim",        // 分群方式：delim=依分隔符 / pos=依固定位置
        splitPos: null,            // pos 模式：SN 取前幾個字（null=用字母/數字邊界自動偵測）
        delim: "-",                // 分段點選用的分隔符
        roles: ["sn", "idx"],      // 各段角色：sn | idx | skip
        rawMode: false,            // true=直接編輯 pattern, false=分段點選
        idxSort: "auto",           // 對位模式欄位排序：auto | alpha | num | custom
        idxOrder: [],              // custom 時使用者自訂順序
        idxIgnore: [],             // 忽略的 idx：當作資料夾無此 idx 圖（欄位保留→留空佔位）
        idxCrops: {},              // 各欄獨立模式 (依檔名 idx)：idx字串 → crop obj
        x: 2,
        width: 12,        // SN box 固定寬度 (% of slide width)，與圖片 X 解耦
        font_pt: 18,
      },
      autoAlign: true,    // 依檔名 group+idx 對位 (固定；「依順序」模式已移除)
      snMatchMode: false, // SN 對照模式：手動提供 SN list、每個 SN 從多來源資料夾找對應圖
      snSource: { col: "A", rowStart: 2 },  // SN 列號起算（產生 SN 清單時 row 從這裡算）
      // SN 清單來源：keyin=直接輸入 / range=範圍展開。xlsx 範本 SN 欄有值時會自動讀入 keyin 框。
      snInput: { mode: "keyin", text: "", prefix: "10B-#", from: 1, to: 8, pad: 1 },  // pad=位數(1=不補零)
      snColPick: 1,   // 依範本 SN：哪一欄是 SN 欄（1-based，相對表格最左欄；1=最左欄＝預設）
      // 依範本 SN（PPT）圖片在儲存格內的調整：fit=填法(contain完整貼邊/cover裁切填滿/fill拉伸)
      //   fill=佔格高百分比(contain 用) / dx,dy=整體位移 / manual 微調
      snAdjust: { fit: "contain", fill: 90, dx: 0, dy: 0, manual: false },
      sources: [          // SN 對照模式專用：多個來源資料夾 (每元素: {id, name, folder, files, targetCol, crop})
      ],
      crop: { enabled: false, left: 0, top: 0, right: 1, bottom: 1 },  // 0..1 相對裁剪 (全域)
      cropMode: "global",   // "global" 全部統一一套 crop | "per-col" 每欄獨立 (僅 依檔名 idx / 範本 SN 模式)
      slidesSn: { inCell: false, col: 1, rowStart: 2 },  // PPT/Keynote SN 寫入表格 cell (1-based)
      excel: {
        startCell: "B5",
        imgsPerRow: 4,
        cellCols: 1,
        cellRows: 1,
        gapRows: 0,
        snCol: "A",
        embedInCell: false,
        imgFit: "contain", // cover (裁切填滿) | contain (完整貼邊) | fill (拉伸)
        containInset: 5,   // contain 模式四邊留白百分比 (%)
      },
      output: { path: "./out.pptx", template: null },
    };

    // 從 drop 事件取出所有檔案（支援拖資料夾，遞迴讀目錄）
    async function filesFromDrop(dataTransfer) {
      const items = dataTransfer.items;
      if (!items || !items.length) {
        return Array.from(dataTransfer.files || []);
      }
      const entries = [];
      for (const item of items) {
        const entry = item.webkitGetAsEntry && item.webkitGetAsEntry();
        if (entry) entries.push(entry);
      }
      if (!entries.length) return Array.from(dataTransfer.files || []);
      const files = [];
      const readEntry = (entry) => new Promise((resolve) => {
        if (entry.isFile) {
          entry.file((f) => { files.push(f); resolve(); }, () => resolve());
        } else if (entry.isDirectory) {
          const reader = entry.createReader();
          const readBatch = () => {
            reader.readEntries(async (batch) => {
              if (!batch.length) { resolve(); return; }
              for (const e of batch) await readEntry(e);
              readBatch();
            }, () => resolve());
          };
          readBatch();
        } else {
          resolve();
        }
      });
      for (const entry of entries) await readEntry(entry);
      return files;
    }

    // cfg → 「配方」recipe：剝掉 session 專屬欄位、只留可重用設定
    function cfgToRecipe(cfg, tplName) {
      return {
        _meta: {
          version: 1,
          created: new Date().toISOString(),
          templateHint: tplName || "",
        },
        mode: { autoAlign: !!cfg.autoAlign, snMatchMode: !!cfg.snMatchMode },
        cropMode: cfg.cropMode || "global",
        label: cfg.label,
        snSource: cfg.snSource,
        sources: (cfg.sources || []).map((s) => ({
          id: s.id, name: s.name, targetCol: s.targetCol, crop: s.crop,
        })),
        grid: cfg.grid,
        slide: cfg.slide,
        slidesSn: cfg.slidesSn,
        excel: cfg.excel,
        crop: cfg.crop,
        output: { path: cfg.output?.path || "./out.xlsx" },
      };
    }

    // recipe → 套用到目前 cfg：保留 session state (ws, files, folder, template path)
    function applyRecipe(recipe, currentCfg) {
      if (!recipe || typeof recipe !== "object") return currentCfg;
      return {
        ...currentCfg,
        autoAlign: true,   // 「依順序」已移除：固定用 idx 對位（忽略舊 recipe 的 autoAlign:false）
        snMatchMode: !!recipe.mode?.snMatchMode,
        cropMode: recipe.cropMode || "global",
        label: { ...currentCfg.label, ...(recipe.label || {}) },
        snSource: { ...currentCfg.snSource, ...(recipe.snSource || {}) },
        sources: (recipe.sources || []).map((s) => ({
          id: s.id, name: s.name || "A", targetCol: s.targetCol || "F",
          folder: "", files: [],
          crop: s.crop || { enabled: false, left: 0, top: 0, right: 1, bottom: 1 },
        })),
        grid: { ...currentCfg.grid, ...(recipe.grid || {}) },
        slide: { ...currentCfg.slide, ...(recipe.slide || {}) },
        slidesSn: { ...currentCfg.slidesSn, ...(recipe.slidesSn || {}) },
        excel: { ...currentCfg.excel, ...(recipe.excel || {}) },
        crop: recipe.crop || currentCfg.crop,
        output: { ...currentCfg.output, path: recipe.output?.path || currentCfg.output?.path || "./out.xlsx" },
      };
    }

    // 欄字母 → 1-based 數字 (A=1, AA=27)；無效回傳 0
    function colLetterToIdx(letter) {
      const s = String(letter || "").toUpperCase().trim();
      if (!/^[A-Z]+$/.test(s)) return 0;
      let n = 0;
      for (let i = 0; i < s.length; i++) n = n * 26 + (s.charCodeAt(i) - 64);
      return n;
    }

    function parseCell(ref) {
      const m = (ref || "").trim().match(/^([A-Za-z]+)(\d+)$/);
      if (!m) return { col: 1, row: 1 };
      const letters = m[1].toUpperCase();
      let col = 0;
      for (const ch of letters) col = col * 26 + (ch.charCodeAt(0) - 64);
      return { col, row: parseInt(m[2], 10) };
    }

    // 從 xlsx grid 偵測表格位置 → 推得「起始 cell + SN 寫入欄」(比照 ppt/key 的 applyTable)
    //   範圍：框線 borders 的包圍盒（無框線則用有文字 cell 的包圍盒）
    //   表頭列：從頂端起、含文字的連續列；第一欄當 SN/標籤欄(skipCols=1)
    function detectExcelTable(grid) {
      if (!grid) return null;
      const borders = grid.borders || [];
      const cells = grid.cells || [];
      const bbox = (arr) => {
        if (!arr.length) return null;
        let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
        for (const b of arr) {
          if (b.r < minR) minR = b.r; if (b.r > maxR) maxR = b.r;
          if (b.c < minC) minC = b.c; if (b.c > maxC) maxC = b.c;
        }
        return { minR, maxR, minC, maxC };
      };
      const box = bbox(borders) || bbox(cells);
      if (!box) return null;
      const { minR, maxR, minC, maxC } = box;
      // 表頭列偵測只看「影像欄」(SN/標籤欄之後，即 c > minC) 有沒有文字。
      //   SN 欄(第一欄)在資料列也會有文字(如 2EG/2JG)，若一併算入，表頭會被誤判到資料列
      //   → headerCols 變空 → 「依範本表頭」按鈕消失。排除 SN 欄即可正確抓到表頭列。
      const textRows = new Set(
        cells.filter((c) => c.c > minC && c.text != null && String(c.text).trim() !== "").map((c) => c.r)
      );
      let skipRows = 0;
      while (minR + skipRows <= maxR && textRows.has(minR + skipRows)) skipRows++;
      if (minR + skipRows > maxR) skipRows = Math.max(0, maxR - minR); // 至少留 1 列放圖
      const skipCols = 1; // 第一欄當 SN/標籤欄
      const startColIdx = Math.min(maxC, minC + skipCols);
      const startRowIdx = minR + skipRows;
      const letterOf = (ci) => ((grid.cols || [])[ci - 1] || {}).letter || null;
      const snCol = letterOf(minC);
      const startColL = letterOf(startColIdx);
      if (!snCol || !startColL) return null;
      // 表頭那列（最靠近資料的 header 列）各影像欄的文字 → 作為 idx 欄位順序（對位用）
      // 讓圖片依檔名字母後綴對到「表頭文字相同」的欄，不必手動排序。
      const headerRow = minR + Math.max(0, skipRows - 1);
      const headerCols = [];
      for (let col = startColIdx; col <= maxC; col++) {
        const cell = cells.find((c) => c.r === headerRow && c.c === col);
        headerCols.push(cell && cell.text != null ? String(cell.text).trim() : "");
      }
      while (headerCols.length && !headerCols[headerCols.length - 1]) headerCols.pop(); // 去尾端空白欄
      return {
        snCol, startCell: `${startColL}${startRowIdx}`,
        imgsPerRow: Math.max(1, maxC - startColIdx + 1),
        headerCols, region: box,
      };
    }

    // 從 ppt/key 表格資訊偵測「表頭列數 + 標籤欄 + SN 寫入位置」（比照 detectExcelTable）
    function detectSlidesTable(t, snCol1) {
      if (!t || !t.rows || !t.cols) return null;
      const rows = t.rows, cols = t.cols;
      const snC = Math.max(1, Math.min(cols, snCol1 || 1));   // 1-based SN 欄（預設第 1 欄）
      // 表頭列偵測（與 SN 欄無關）：表頭列在「多個」欄都有文字；資料列通常只有 SN 欄有值。
      //   以「該列有文字的欄數 ≥ 2」判定表頭 → 不受 SN 欄位置或預填值影響，欄位顯示永遠對得上範本。
      const cnt = {};
      (t.cells || []).forEach((c) => { if (String(c.text || "").trim()) cnt[c.r] = (cnt[c.r] || 0) + 1; });
      const headerRows = new Set(Object.keys(cnt).filter((r) => cnt[r] >= 2).map(Number));
      let skipRows = 0;
      while (skipRows < rows - 1 && headerRows.has(skipRows + 1)) skipRows++;
      if (skipRows === 0) skipRows = 1;     // 無多欄文字列也假設 1 表頭列
      const skipCols = 1;
      return { skipRows, skipCols, snCol: snC, snRowStart: skipRows + 1 };
    }

    // slidesSnInfo 的總列數（給 UI 顯示用）：資料起始列上一列＝表頭 → rows = dataRows + 表頭數
    function slidesTblRows(info) {
      return (info?.dataRows || 0) + Math.max(1, (info?.snRowStart || 2) - 1);
    }

    // 計算 Excel 的儲存格 placements
    function computeExcelCells(excel, label, orderedFiles, autoAlign) {
      if (!orderedFiles || orderedFiles.length === 0) return [];
      const start = parseCell(excel.startCell);
      const snCol = excel.snCol ? parseCell(excel.snCol + "1").col : 0;
      const stepCol = Math.max(1, excel.cellCols);
      const stepRow = Math.max(1, excel.cellRows) + Math.max(0, excel.gapRows);
      const perRow = Math.max(1, excel.imgsPerRow);
      const colsArg = autoAlign
        ? detectIdxList(orderedFiles, label.pattern, label.idxSort || "auto", label.idxOrder || [])
        : perRow;
      const rows = buildRows(orderedFiles, label.pattern, colsArg, autoAlign, new Set(label.idxIgnore || []));
      const cells = [];
      rows.forEach(({ group, cells: rowCells }, rIdx) => {
        const targetRow = start.row + rIdx * stepRow;
        if (label && label.enabled && snCol > 0) {
          cells.push({
            row: targetRow, col: snCol, span_cols: 1, span_rows: excel.cellRows,
            text: group, font_pt: label.font_pt,
          });
        }
        rowCells.forEach((f, ci) => {
          if (!f) return;  // 缺的照片留空
          cells.push({
            path: f.path,
            row: targetRow,
            col: start.col + ci * stepCol,
            span_cols: excel.cellCols,
            span_rows: excel.cellRows,
          });
        });
      });
      return cells;
    }

    // pattern → regex 字串：先轉義字面字元，再展開 placeholder ({group}/{idx}/{skip})
    function patternToRegex(pattern, groupCapture = "(.+?)", idxCapture = "(.+?)") {
      // 用佔位符暫存避免被字面 escape 影響
      const G = "G", I = "I", S = "S";
      // {group:N} = 固定取前 N 個字當 SN（依位置模式）
      let fixedLen = null;
      let p = pattern.replace(/\{group:(\d+)\}/g, (_, n) => { fixedLen = +n; return G; });
      p = p.replace(/\{group\}/g, G).replace(/\{idx\}/g, I).replace(/\{skip\}/g, S);
      p = p.replace(/[.+?^$()|\[\]\\]/g, "\\$&");
      const gCap = fixedLen != null ? `(.{${fixedLen}})` : groupCapture;
      p = p.replace(new RegExp(G, "g"), gCap)
           .replace(new RegExp(I, "g"), idxCapture)
           .replace(new RegExp(S, "g"), ".+?");
      return p;
    }

    // 從檔名抽 group：pattern 用 {group} / {idx} / {skip} 佔位符
    function extractGroup(filename, pattern) {
      const stem = filename.replace(/\.[^./]+$/, "");
      try {
        const m = stem.match(new RegExp("^" + patternToRegex(pattern, "(.+?)", ".+?") + "$"));
        if (m && m[1]) return m[1];
      } catch (e) {}
      return stem;
    }

    // 嚴格版：match 不到回傳 null（給 UI 統計用）
    function tryExtract(filename, pattern) {
      if (!pattern || !pattern.includes("{group")) return null;
      const stem = filename.replace(/\.[^./]+$/, "");
      try {
        const m = stem.match(new RegExp("^" + patternToRegex(pattern) + "$"));
        if (!m) return null;
        return { group: m[1] || "", idx: m[2] || null };
      } catch (e) { return null; }
    }

    // 同時抽 group + idx
    function extractGroupIdx(filename, pattern) {
      const stem = filename.replace(/\.[^./]+$/, "");
      try {
        const m = stem.match(new RegExp("^" + patternToRegex(pattern) + "$"));
        if (m) return { group: m[1] || stem, idx: m[2] || null };
      } catch (e) {}
      return { group: stem, idx: null };
    }

    // 從所有檔名抽 idx → 去重 → 依 sort 規則排序
    function detectIdxList(orderedFiles, pattern, sort, customOrder) {
      const seenOrder = [];
      const seen = new Set();
      for (const f of orderedFiles || []) {
        const { idx } = extractGroupIdx(f.name || f.path.split("/").pop(), pattern);
        if (idx == null) continue;
        const s = String(idx);
        if (!seen.has(s)) { seen.add(s); seenOrder.push(s); }
      }
      if (sort === "custom") {
        // custom：完全由使用者定義（可含檔名沒出現的 idx → 該欄全部留空）
        return Array.isArray(customOrder) ? [...customOrder] : [];
      }
      if (sort === "alpha") return [...seenOrder].sort((a, b) => a.localeCompare(b));
      if (sort === "num") {
        return [...seenOrder].sort((a, b) => {
          const na = parseFloat(a), nb = parseFloat(b);
          if (isNaN(na) || isNaN(nb)) return a.localeCompare(b);
          return na - nb;
        });
      }
      // auto: 全字母 → alpha；全數字 → num；混合 → 首見順序
      const allNum = seenOrder.every((x) => !isNaN(parseFloat(x)));
      const allAlpha = seenOrder.every((x) => /^[A-Za-z]+$/.test(x));
      if (allNum) return [...seenOrder].sort((a, b) => parseFloat(a) - parseFloat(b));
      if (allAlpha) return [...seenOrder].sort((a, b) => a.localeCompare(b));
      return seenOrder;
    }

    // 上傳後的 idx 體檢：抽出檔名的 idx 欄、SN(group) 數、無 idx 的圖、只差大小寫的可疑欄
    function analyzeFilenameIdx(files, pattern) {
      const idxOrder = [], idxSeen = new Set(), groups = new Set();
      const counts = {}, noIdx = [];
      for (const f of files || []) {
        const name = f.name || (f.path || "").split("/").pop();
        const { group, idx } = extractGroupIdx(name, pattern);
        if (group) groups.add(group);
        if (idx == null) { noIdx.push(name); continue; }
        const s = String(idx);
        if (!idxSeen.has(s)) { idxSeen.add(s); idxOrder.push(s); }
        counts[s] = (counts[s] || 0) + 1;
      }
      const byLower = {};
      for (const s of idxOrder) { const k = s.toLowerCase(); (byLower[k] = byLower[k] || []).push(s); }
      const caseDupes = Object.values(byLower).filter((a) => a.length > 1);
      return { total: (files || []).length, idxList: idxOrder, counts, groups: [...groups], noIdx, caseDupes };
    }

    // 依檔名 group+idx 把檔案排成 rows[group] = [col0, col1, ...]，缺的留 null
    // idxList: 欄位定義（字串陣列），cols = idxList.length
    function groupBySnIdx(orderedFiles, pattern, idxList, ignoreSet) {
      const cols = idxList.length;
      const idxToColMap = new Map(idxList.map((s, i) => [s, i]));
      const groups = [];
      const map = {};
      for (const f of orderedFiles) {
        const { group, idx } = extractGroupIdx(f.name || f.path.split("/").pop(), pattern);
        if (!(group in map)) { map[group] = new Array(cols).fill(null); groups.push(group); }
        // 被忽略的 idx：當作此檔不存在（欄位仍保留 → 留 null = 空白佔位）
        if (idx != null && ignoreSet && ignoreSet.has(String(idx))) continue;
        const col = idx != null ? idxToColMap.get(String(idx)) : undefined;
        // idx 不在欄位清單（或無 idx）→ 不貼入。
        // 舊作法塞到第一個空位，會被後面對映到位的圖蓋掉、且順序一變就誤放別欄。
        if (col == null) continue;
        map[group][col] = f;
      }
      return groups.map((g) => ({ group: g, cells: map[g] }));
    }

    // 建立 rows：每個 = { group, cells: [file|null × cols] }
    // autoAlign=true 用 idxList 對位；false 用 cols 順序填滿
    function buildRows(orderedFiles, pattern, colsOrIdxList, autoAlign, ignoreSet) {
      if (autoAlign) {
        const idxList = Array.isArray(colsOrIdxList) ? colsOrIdxList : [];
        return groupBySnIdx(orderedFiles, pattern, idxList, ignoreSet);
      }
      const cols = typeof colsOrIdxList === "number" ? colsOrIdxList : (colsOrIdxList?.length || 1);
      const rows = [];
      for (let i = 0; i < orderedFiles.length; i += cols) {
        const slice = orderedFiles.slice(i, i + cols);
        const cells = new Array(cols).fill(null);
        slice.forEach((f, ci) => { cells[ci] = f; });
        const a = slice.find((f) => f);
        const group = a ? extractGroup(a.name || a.path.split("/").pop(), pattern) : "";
        rows.push({ group, cells });
      }
      return rows;
    }

    // 把 rows 依「每頁 rows」切成多頁；每頁從 origin 重新計算
    function computePages(slide, grid, orderedFiles, label, autoAlign,
                          effAspect = (f) => (f && f.h && f.w ? f.h / f.w : 0.75)) {
      if (!orderedFiles || orderedFiles.length === 0) return [];
      const W = slide.width_cm, H = slide.height_cm;
      const ox = W * grid.origin.x / 100;
      const oy = H * grid.origin.y / 100;
      const w  = W * grid.width / 100;
      const gx = W * grid.gap.x / 100;
      const gy = H * grid.gap.y / 100;
      const cols = Math.max(1, grid.cols);
      const rowsPerPage = Math.max(1, grid.rows);
      const colsArg = autoAlign
        ? detectIdxList(orderedFiles, label.pattern, label.idxSort || "auto", label.idxOrder || [])
        : cols;
      // 版面實際欄數：對位模式用偵測到的 idx 欄數，否則用 grid.cols
      const layoutCols = Array.isArray(colsArg) ? Math.max(1, colsArg.length) : cols;

      // 表格模式 (套用表格後)：列高鎖死 (cellH) + 圖片區總寬 (areaW)
      // → 每列 N 張圖：同尺寸保比例、水平等距(含外緣 d)、垂直置中(上下 h 相等)
      const cellH = grid.rowH > 0 ? H * grid.rowH / 100 : null;
      const areaW = grid.areaW > 0 ? W * grid.areaW / 100 : null;

      const allRows = buildRows(orderedFiles, label.pattern, colsArg, autoAlign, new Set(label.idxIgnore || []));
      const pages = [];
      for (let p = 0; p < allRows.length; p += rowsPerPage) {
        const pageRows = allRows.slice(p, p + rowsPerPage);
        const placements = [];
        let cur_y = oy;
        let rowIdxInPage = 0;
        for (const { group, cells } of pageRows) {
          const anchor = cells.find((c) => c);
          const anchorAspect = effAspect(anchor);   // 有效比例(含裁切) → 不被拉伸
          const row_h = cellH != null ? cellH : w * anchorAspect;   // 固定列高 or 依比例
          if (label && label.enabled) {
            const lx_cm = W * label.x / 100;
            const lw_cm = W * (label.width || 12) / 100;
            placements.push({
              text: group, x_cm: lx_cm, y_cm: cur_y, w_cm: lw_cm, h_cm: row_h,
              font_pt: label.font_pt, align: "center", bold: true,
              row_idx: rowIdxInPage,
            });
          }
          rowIdxInPage++;

          if (cellH != null && areaW != null) {
            // 智能排列：統一高度 H (所有圖同高，capped 格高)；各欄寬度依「各自的有效比例(含裁切)」
            // → 同欄裁切一致 → 欄寬一致跨列對齊；各欄不同裁切時高度仍統一、不拉伸。
            let H = w * anchorAspect;
            if (H > cellH) H = cellH;
            // 各欄寬度：有圖用其有效比例；缺圖用 anchor 比例佔位 (維持欄對齊)
            const widths = cells.map((f) => H / (f ? effAspect(f) : anchorAspect));
            const sumW = widths.reduce((a, b) => a + b, 0);
            const d = Math.max(0, (areaW - sumW) / (layoutCols + 1));   // 等距(含外緣)
            let xacc = ox + d;
            cells.forEach((f, ci) => {
              if (f) {
                placements.push({
                  path: f.path,
                  x_cm: xacc, y_cm: cur_y + (cellH - H) / 2,   // 垂直置中、統一高度
                  w_cm: widths[ci], h_cm: H,
                });
              }
              xacc += widths[ci] + d;   // 缺圖也佔位 → 跨列欄對齊
            });
          } else {
            // 非智能：邊到邊、列高依 anchor 比例。每張圖在 (w × row_h) 內 contain 保「自己的有效比例」
            // → 各欄獨立裁切時也不被拉伸 (均勻圖 = 填滿，行為不變)
            cells.forEach((f, ci) => {
              if (!f) return;  // 缺的照片留空，不遞補
              const asp = effAspect(f);
              let iw = w, ih = w * asp;
              if (ih > row_h) { ih = row_h; iw = row_h / asp; }   // contain 保比例
              const cellX = ox + ci * (w + gx);
              placements.push({
                path: f.path,
                x_cm: cellX + (w - iw) / 2, y_cm: cur_y + (row_h - ih) / 2,   // 格內置中
                w_cm: iw, h_cm: ih,
              });
            });
          }
          cur_y += row_h + gy;
        }
        pages.push(placements);
      }
      return pages;
    }

    // 依範本 SN（PPT/Keynote）：多來源各對一表格欄、用 SN(檔名 stem) 配對 → 貼進對應儲存格。
    //   影像放進 cell＝把 cell 矩形當絕對座標（沿用 SN-in-cell 的幾何）；SN 文字寫進第 snCol1 欄。
    //   來源 → 欄：依「資料夾名 vs 表頭文字」自動對應（不分大小寫、互相 contains）。
    //   回傳單頁 placements；列數上限＝範本表格資料列數（超過截斷）。回傳 { pages, mapped, total, capped, unmatchedSources }。
    function computeSnMatchSlides(slidesTbl, snList, sources, opts) {
      const cw = slidesTbl.col_widths_cm || [], rh = slidesTbl.row_heights_cm || [];
      const nCols = slidesTbl.cols || cw.length, nRows = slidesTbl.rows || rh.length;
      const snCol0 = Math.max(0, (opts.snCol1 || 1) - 1);
      const dataStart0 = Math.max(0, (opts.dataStartRow1 || 2) - 1);
      const headerRow1 = opts.dataStartRow1 - 1;     // 表頭列（1-based）＝資料起始列上一列
      const dataRows = Math.max(0, nRows - dataStart0);
      const fill = Math.max(5, Math.min(100, opts.fill ?? 90)) / 100;   // 圖高佔格高比例
      const dxFrac = (opts.dx || 0) / 100, dyFrac = (opts.dy || 0) / 100; // 位移（佔格寬/高比例）
      // 資料列定位：優先用後端從渲染 PNG 量到的「實際起點 + 實際列間距」，每列 = 起點 + k×間距，
      //   與渲染完全吻合（修正表頭撐高 + 各版本列高壓縮造成的逐列累積偏移）。量不到才回退規格。
      const specDataTop = slidesTbl.top_cm + rh.slice(0, dataStart0).reduce((a, b) => a + b, 0);
      const dataTopCm = (opts.dataStartCm != null) ? opts.dataStartCm : specDataTop;
      const pitch = (opts.rowPitchCm != null && opts.rowPitchCm > 0) ? opts.rowPitchCm : null;
      const cellRect = (r0, c0) => {
        if (c0 < 0 || c0 >= cw.length || r0 < 0 || r0 >= rh.length) return null;
        let y, h;
        if (r0 >= dataStart0) {
          const di = r0 - dataStart0;               // 第幾個資料列(0 起)
          y = pitch ? dataTopCm + di * pitch : dataTopCm + rh.slice(dataStart0, r0).reduce((a, b) => a + b, 0);
          h = pitch || rh[r0];
        } else {
          y = slidesTbl.top_cm + rh.slice(0, r0).reduce((a, b) => a + b, 0);
          h = rh[r0];
        }
        return { x: slidesTbl.left_cm + cw.slice(0, c0).reduce((a, b) => a + b, 0), y, w: cw[c0], h };
      };
      const headerText = (c1) => {
        const cell = (slidesTbl.cells || []).find((x) => x.r === headerRow1 && x.c === c1);
        return cell ? String(cell.text || "").trim() : "";
      };
      const findHeaderCol = (label) => {             // 找表頭文字相符的欄 → 0-based
        const q = String(label || "").trim().toLowerCase();
        if (!q) return null;
        for (let c1 = 1; c1 <= nCols; c1++) {
          if (c1 - 1 === snCol0) continue;           // 跳過 SN 欄
          const h = headerText(c1).toLowerCase();
          if (h && h === q) return c1 - 1;   // 完全相符（不分大小寫、去空白）才算對到
        }
        return null;
      };
      // 來源 → 0-based 欄索引：優先用使用者選的表格欄 (slidesCol＝表頭文字)，否則依資料夾名自動對應
      const sourceCol0 = (s) => {
        if (s.slidesCol) { const c = findHeaderCol(s.slidesCol); if (c != null) return c; }
        return findHeaderCol(s.name);
      };
      const aspectOf = (f, crop) => {
        if (!f || !f.w || !f.h) return 0.75;
        if (crop && crop.enabled) {
          const ww = Math.max(0.01, (crop.right - crop.left)) * f.w;
          const hh = Math.max(0.01, (crop.bottom - crop.top)) * f.h;
          return ww ? hh / ww : 0.75;
        }
        return f.h / f.w;
      };
      // 在 cell 矩形內置中：圖高＝fill×格高，超過格寬則改以格寬為準；再套整體位移 dx/dy。
      const containIn = (rect, asp) => {
        let ih = rect.h * fill, iw = ih / asp;
        const maxW = rect.w * fill;
        if (iw > maxW) { iw = maxW; ih = maxW * asp; }
        const x0 = rect.x + (rect.w - iw) / 2 + dxFrac * rect.w;
        const y0 = rect.y + (rect.h - ih) / 2 + dyFrac * rect.h;
        return { x_cm: x0, y_cm: y0, w_cm: iw, h_cm: ih };
      };

      const colOfSource = sources.map(sourceCol0);
      const unmatchedSources = sources.filter((s, i) => colOfSource[i] == null).map((s) => s.name);
      const total = (snList || []).length;
      const perPage = Math.max(1, dataRows);          // 每頁列數＝範本資料列數；超過 → 換頁(複製範本)
      const pages = [];
      let mapped = 0;
      for (let p = 0; p * perPage < total; p++) {
        const placements = [];
        for (let k = 0; k < perPage; k++) {
          const idx = p * perPage + k;
          if (idx >= total) break;
          const sn = (snList[idx] || {}).sn;
          const r0 = dataStart0 + k;                  // 該頁內第 k 列
          const snRect = cellRect(r0, snCol0);
          if (snRect) placements.push({
            text: sn, row_idx: k, x_cm: snRect.x, y_cm: snRect.y, w_cm: snRect.w, h_cm: snRect.h,
            font_pt: opts.fontPt || 18, bold: true, align: "center", _snCell: true,
          });
          const stem = String(sn).toLowerCase();
          sources.forEach((s, si) => {
            const c0 = colOfSource[si];
            if (c0 == null) return;
            const f = (s.files || []).find((x) => (x.name || "").replace(/\.[^./]+$/, "").toLowerCase() === stem);
            if (!f) return;
            const rect = cellRect(r0, c0);
            if (!rect) return;
            const crop = opts.perColCrop ? (s.crop?.enabled ? s.crop : null) : opts.globalCrop;
            placements.push({ path: f.path, ...containIn(rect, aspectOf(f, crop)), _crop: crop, crop });
            mapped++;
          });
        }
        pages.push(placements);
      }
      return { pages, mapped, total, pageCount: pages.length, perPage, unmatchedSources };
    }

    // 對位模式的欄位編輯器：單一可編輯欄位清單（預設自動偵測，可拖曳排序 / ✕移除 / ＋新增 / 🚫忽略；
    //   依範本表頭 / 依檔名 為重置來源）。已無「自動/自訂」模式切換 —— 編輯時自動轉 idxSort=custom。
    function IdxColumnsEditor({ label, allFiles, updateLabel, perColCrop, onOpenIdxCrop, headerOrder, pushHistory }) {
      const sort = label.idxSort || "auto";
      const idxList = useMemo(
        () => detectIdxList(allFiles || [], label.pattern, sort, label.idxOrder || []),
        [allFiles, label.pattern, sort, label.idxOrder]
      );
      // 從檔名偵測到的實際 idx 集合（給自訂模式檢查 unmapped/empty 用）
      const fromFiles = useMemo(
        () => detectIdxList(allFiles || [], label.pattern, "auto", []),
        [allFiles, label.pattern]
      );
      const dragRef = useRef(null);
      const [hoverIdx, setHoverIdx] = useState(-1);
      const [newChip, setNewChip] = useState("");

      // 欄位編輯前先存 undo 快照（之前缺這個 → 對調/刪欄/新增/重載都無法 undo）
      const editCols = (patch, desc) => { if (pushHistory) pushHistory(desc); updateLabel(patch); };

      const onChipDragStart = (i) => { dragRef.current = i; };
      const onChipDrop = (toIdx) => {
        const from = dragRef.current;
        dragRef.current = null;
        setHoverIdx(-1);
        if (from == null || from === toIdx) return;
        const next = [...idxList];
        const [moved] = next.splice(from, 1);
        next.splice(toIdx, 0, moved);
        editCols({ idxSort: "custom", idxOrder: next }, "對位欄位重排");
      };

      const removeChip = (i) => {
        const next = idxList.filter((_, j) => j !== i);
        editCols({ idxSort: "custom", idxOrder: next }, "刪除對位欄位");
      };

      const addChip = () => {
        const v = newChip.trim();
        if (!v) return;
        if (idxList.includes(v)) { setNewChip(""); return; }
        editCols({ idxSort: "custom", idxOrder: [...idxList, v] }, "新增對位欄位");
        setNewChip("");
      };

      const loadFromFiles = () => {
        editCols({ idxSort: "custom", idxOrder: [...fromFiles] }, "欄位依檔名");
      };

      const hasHeader = (headerOrder || []).some((h) => h);
      const loadFromHeader = () => {
        editCols({ idxSort: "custom", idxOrder: [...(headerOrder || [])] }, "欄位依範本表頭");
      };

      // 忽略 idx：當作資料夾無此 idx 圖 → 該欄保留位置但不貼圖（自動/自訂、依表頭/依檔名 皆通用）
      const ignoreSet = new Set(label.idxIgnore || []);
      const toggleIgnore = (s) => {
        const cur = new Set(label.idxIgnore || []);
        const was = cur.has(s);
        if (was) cur.delete(s); else cur.add(s);
        editCols({ idxIgnore: [...cur] }, was ? `取消忽略「${s}」` : `忽略「${s}」`);
      };

      // 檔名中有 idx 但不在欄位清單 → 那些圖不貼入（提示使用者）
      const unmapped = fromFiles.filter((x) => !idxList.includes(x));
      // 只差大小寫的 idx（如 B / b）：各自成欄、命名不一致，常造成「欄數多一」的困惑 → 只警告、不自動併
      const caseDupes = (() => {
        const byLower = {};
        for (const s of fromFiles) { const k = s.toLowerCase(); (byLower[k] = byLower[k] || []).push(s); }
        return Object.values(byLower).filter((a) => a.length > 1);
      })();

      return (
        <div>
          <div className="text-xs text-sky-800 font-semibold mb-1">
            對位欄位 · {idxList.length} 欄
          </div>
          {idxList.length === 0 && fromFiles.length === 0 ? (
            <div className="text-[10px] text-amber-700 p-2 bg-amber-50 rounded">
              ⚠ 從現有檔名中找不到 idx 段內容 — 請確認上方分段選取
            </div>
          ) : (
            <>
              <div className="flex flex-wrap gap-1 items-center">
                {idxList.map((s, i) => {
                  const isEmpty = !fromFiles.includes(s);
                  const ignored = ignoreSet.has(s);
                  return (
                    <div key={s + i}
                      draggable
                      onDragStart={() => onChipDragStart(i)}
                      onDragOver={(e) => { e.preventDefault(); if (hoverIdx !== i) setHoverIdx(i); }}
                      onDrop={() => onChipDrop(i)}
                      onDragEnd={() => setHoverIdx(-1)}
                      title={ignored ? "已忽略：此欄留空、不貼圖" : isEmpty ? "此欄沒有對應檔名（將全部留空）" : "可拖曳改變順序"}
                      className={`flex items-center gap-1 px-2 py-0.5 rounded border text-xs font-mono cursor-grab active:cursor-grabbing ${
                        ignored ? "bg-amber-50 border-amber-300 text-amber-700"
                        : isEmpty ? "bg-slate-50 border-dashed border-slate-400 text-slate-500"
                                : "bg-white border-sky-300 text-sky-800"
                      } ${hoverIdx === i ? "ring-2 ring-sky-400" : ""}`}>
                      <span className={ignored ? "line-through" : ""}>{s}</span>
                      <button onClick={(e) => { e.stopPropagation(); toggleIgnore(s); }}
                        title={ignored ? "取消忽略（恢復貼此欄圖）" : "忽略此 idx（欄位留空、不貼圖）"}
                        className={`text-[10px] leading-none ${ignored ? "" : "opacity-40 hover:opacity-100"}`}>🚫</button>
                      <button onClick={() => removeChip(i)}
                        className="text-slate-400 hover:text-red-600 text-[10px] leading-none"
                        title="移除此欄">✕</button>
                    </div>
                  );
                })}
                <div className="flex items-center gap-1">
                  <input
                    value={newChip}
                    onChange={(e) => setNewChip(e.target.value)}
                    onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addChip(); } }}
                    placeholder="新增欄位名…"
                    className="border rounded px-1.5 py-0.5 text-xs font-mono w-24" />
                  <button onClick={addChip}
                    disabled={!newChip.trim()}
                    className="text-[10px] px-1.5 py-0.5 rounded border bg-sky-100 hover:bg-sky-200 text-sky-800 disabled:opacity-40">
                    + 新增
                  </button>
                </div>
              </div>
              <div className="space-y-0.5 mt-1">
                {caseDupes.length > 0 && (
                  <div className="text-[10px] text-amber-800 bg-amber-50 border border-amber-200 rounded px-1.5 py-0.5">
                    ⚠ 只差大小寫、被當成不同欄(可能是檔名打錯)：
                    <span className="font-mono font-semibold">{caseDupes.map((a) => a.join(" / ")).join("、")}</span>
                  </div>
                )}
                {unmapped.length > 0 && (
                  <div className="text-[10px] text-amber-700">
                    ⚠ 無對應欄位、不貼入：
                    <span className="font-mono font-semibold">{unmapped.join(", ")}</span>
                    <span className="text-slate-400 ml-1">（按「依檔名」納入）</span>
                  </div>
                )}
                <div className="flex gap-2 text-[10px] flex-wrap">
                  {hasHeader && (
                    <button onClick={loadFromHeader}
                      className="text-sky-700 hover:underline font-medium">⊞ 依範本表頭</button>
                  )}
                  <button onClick={loadFromFiles}
                    className="text-sky-700 hover:underline">↻ 依檔名</button>
                  <span className="text-slate-500">拖曳排序 · 🚫 忽略(留空) · 點 ✕ 移除 · Enter 新增</span>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    // SN 對照模式：中欄 — SN × source 對照表
    function SnMatchMatrix({ cfg, snList, mode, slidesSnInfo, selected, setSelected, thumbUrl, onOpenCrop, perColCrop, selectedCell, setSelectedCell, setSelectedPaths }) {
      const isSlides = mode === "slides" && !!slidesSnInfo;
      const slidesHeaders = slidesSnInfo?.headers || [];
      const resolveCol = (s) => {                      // 來源 → 顯示用目標欄
        if (!isSlides) return s.targetCol;
        const q = (s.slidesCol || s.name || "").toLowerCase();
        return slidesHeaders.find((h) => h.toLowerCase() === q) || "(對不到欄)";
      };
      // 把 source.files 建成 stem → file 的 map（不分大小寫，去副檔名）
      const fileMaps = useMemo(() => cfg.sources.map((s) => {
        const m = new Map();
        for (const f of s.files || []) {
          const stem = (f.name || "").replace(/\.[^./]+$/, "").toLowerCase();
          m.set(stem, f);
        }
        return m;
      }), [cfg.sources]);

      if (!snList.length) {
        return (
          <div className="text-xs text-slate-400 text-center py-8">
            請先提供 SN 清單（直接輸入／範圍／依範本 SN）
          </div>
        );
      }
      if (!cfg.sources.length) {
        return (
          <div className="text-xs text-slate-400 text-center py-8">
            請先新增至少一個資料來源
          </div>
        );
      }

      const missingPerSource = cfg.sources.map((s, i) => {
        let miss = 0;
        for (const sn of snList) {
          if (!fileMaps[i].get(sn.sn.toLowerCase())) miss++;
        }
        return miss;
      });
      const totalMissing = missingPerSource.reduce((a, b) => a + b, 0);

      return (
        <div className="space-y-1">
          <div className={`text-[10px] px-2 py-1 rounded ${totalMissing === 0 ? "bg-emerald-50 text-emerald-800" : "bg-amber-50 text-amber-800"}`}>
            {totalMissing === 0
              ? `✓ ${snList.length} 個 SN × ${cfg.sources.length} 來源 全部對到`
              : `⚠ ${snList.length} 個 SN：${cfg.sources.map((s, i) => `${s.name} 缺 ${missingPerSource[i]}`).join(" · ")}`}
          </div>
          <div className="overflow-x-auto">
            <table className="text-xs w-full">
              <thead>
                <tr className="text-[10px] text-slate-500">
                  <th className="text-left px-1 py-0.5">SN</th>
                  {cfg.sources.map((s) => {
                    const displayName = s.files?.length ? s.name : "(未上傳)";
                    return (
                      <th key={s.id} className="text-center px-1 py-1">
                        <div className="flex items-center justify-center gap-1">
                          <span className="bg-purple-100 text-purple-800 px-1 rounded font-mono text-[10px] max-w-[100px] truncate" title={s.name}>{displayName}</span>
                          <span className="text-slate-400">→</span>
                          <span className="font-mono">{resolveCol(s)}</span>
                          {perColCrop && (
                            <button
                              onClick={() => onOpenCrop && onOpenCrop(s.id)}
                              disabled={!s.files?.length}
                              title={s.files?.length ? `設定來源「${s.name}」的裁剪區域` : "請先上傳此來源的圖片"}
                              className={`ml-1 text-xs border rounded px-1 py-0.5 hover:bg-slate-100 disabled:opacity-40 ${s.crop?.enabled ? "bg-emerald-100 border-emerald-400 text-emerald-800" : ""}`}>
                              ✂️
                            </button>
                          )}
                        </div>
                      </th>
                    );
                  })}
                </tr>
              </thead>
              <tbody>
                {snList.map(({ sn, row }, rIdx) => (
                  <tr key={row} className="border-b border-slate-100 hover:bg-purple-50/30">
                    <td className="font-mono text-[10px] px-1 py-1 text-slate-600">
                      <span className="text-slate-300">{row}</span> {sn}
                    </td>
                    {cfg.sources.map((s, i) => {
                      const f = fileMaps[i].get(sn.toLowerCase());
                      const isCellSel = selectedCell?.r === rIdx && selectedCell?.c === i;
                      const isSel = (f && selected === f.path) || isCellSel;
                      return (
                        <td key={s.id} data-r={rIdx} data-c={i} className="px-1 py-0.5 text-center">
                          {f ? (
                            <img src={thumbUrl(f.path, 60, perColCrop ? (s.crop || null) : cfg.crop)}
                              onClick={() => { setSelected(f.path); setSelectedCell?.({ r: rIdx, c: i }); }}
                              title={f.name}
                              className={`inline-block w-10 h-10 object-cover border rounded cursor-pointer ${isSel ? "ring-2 ring-emerald-500" : "border-slate-300 hover:border-slate-500"}`} />
                          ) : (
                            <div onClick={() => { setSelectedCell?.({ r: rIdx, c: i }); setSelected(null); setSelectedPaths?.([]); }}
                              className={`inline-flex w-10 h-10 items-center justify-center border-2 rounded text-[10px] cursor-pointer ${isCellSel ? "border-emerald-500 ring-2 ring-emerald-300 text-emerald-700" : "border-dashed border-slate-300 text-slate-400"}`}>缺</div>
                          )}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // SN 對照模式：左欄 — SN 來源設定 + 多來源資料夾管理
    function SnMatchPanel({ cfg, setCfg, ws, tplPath, tplLoadSeq, mode, slidesSnInfo, xlsxSn, snColOptions, snList, setSnList, setStatus, setSelected, setCropOpen, setCropSourceId, pushHistory }) {
      const isSlides = mode === "slides" && !!slidesSnInfo;
      const isExcel = mode === "excel";
      const headers = slidesSnInfo?.headers || [];
      // 來源 → 自動對應的表頭欄（依資料夾名，不分大小寫互相 contains）
      const autoHeader = (name) => {
        const q = String(name || "").trim().toLowerCase();
        if (!q) return "";
        return headers.find((h) => h.toLowerCase() === q) || "";
      };
      const inputRefs = useRef({});
      // 範本內已定義的 SN（xlsx: SN 欄值 / pptx: 表格 SN 欄值）→ 有值時鎖定「讀範本欄」、停用手動輸入
      const templateSns = isExcel ? (xlsxSn?.sns || [])
        : isSlides ? (slidesSnInfo?.snCells || []).map((sn, i) => ({ sn, row: (slidesSnInfo.snRowStart || 2) + i }))
        : [];
      const templateHasSn = templateSns.length > 0;
      const tmplSnColLabel = isExcel ? (xlsxSn?.col ? `${xlsxSn.col} 欄` : "") : (slidesSnInfo?.snCol ? `第 ${slidesSnInfo.snCol} 欄` : "");
      // 依範本決定來源：有 SN 值 → 自動切「讀範本欄」並讀入；沒有 → 若停在 templateCol 則退回直接輸入
      const snAutoRef = useRef("");
      useEffect(() => {
        const key = `${tplLoadSeq}|${tplPath}|${cfg.snColPick || 1}|${templateHasSn}`;   // 換範本/換 SN 欄都要重讀
        if (snAutoRef.current === key) return;
        snAutoRef.current = key;
        if (templateHasSn) {
          setCfg((c) => ({ ...c, snInput: { ...c.snInput, mode: "templateCol" } }));
          setSnList(templateSns);
          setStatus(`已讀取範本 SN 欄（${tmplSnColLabel}）${templateSns.length} 個`);
        } else if (cfg.snInput.mode === "templateCol") {
          // 新選的欄沒有 SN 值 → 退回手動，並清掉上一欄自動讀進來的 SN（否則殘留會畫到新欄）
          setCfg((c) => ({ ...c, snInput: { ...c.snInput, mode: "keyin" } }));
          setSnList([]);
        }
      }, [tplLoadSeq, tplPath, cfg.snColPick, templateHasSn]);

      const dedupe = (list) => {
        const seen = new Set();
        return list.map((s) => String(s).trim()).filter((s) => {
          if (!s) return false;
          const k = s.toLowerCase();
          if (seen.has(k)) return false;
          seen.add(k); return true;
        });
      };
      // 直接輸入 / 範圍：編輯即時生效（不需按鈕）。templateCol（依範本 SN）由 SN 自動讀取 effect 負責。
      useEffect(() => {
        if (cfg.snInput.mode !== "keyin" && cfg.snInput.mode !== "range") return;
        let list = [];
        if (cfg.snInput.mode === "keyin") {
          list = (cfg.snInput.text || "").split(/[\s,，、\n]+/);   // 逗號 / 空白 / 換行分隔
        } else {
          // 範圍展開：prefix 含 # → 用 from..to 的整數代入（可補零）
          const { prefix, from, to, pad } = cfg.snInput;
          const a = parseInt(from), b = parseInt(to);
          if (String(prefix).includes("#") && !isNaN(a) && !isNaN(b) && b >= a) {
            const width = Math.max(1, parseInt(pad) || 1);   // 位數：1=不補零(10B-1)、2=10B-01…
            for (let n = a; n <= b && list.length < 2000; n++) {
              list.push(String(prefix).replace(/#/g, String(n).padStart(width, "0")));
            }
          }
        }
        const clean = dedupe(list);
        const rowStart = cfg.snSource.rowStart || 2;
        setSnList(clean.map((sn, i) => ({ sn, row: rowStart + i })));
      }, [cfg.snInput.mode, cfg.snInput.text, cfg.snInput.prefix, cfg.snInput.from, cfg.snInput.to, cfg.snInput.pad]);

      const uploadSource = async (sid, files) => {
        if (!ws || !files || !files.length) return;
        const src = cfg.sources.find((s) => s.id === sid);
        if (!src) return;

        // 從 webkitRelativePath 取資料夾名稱 (e.g. "TA 106PCS L/img.jpg" → "TA 106PCS L")
        const detectedFolderName = (() => {
          for (const f of files) {
            const rel = f.webkitRelativePath || "";
            const seg = rel.split("/")[0];
            if (seg) return seg;
          }
          return "";
        })();

        setStatus(`上傳來源 ${src.name} (${files.length} 張)…`);
        const fd = new FormData();
        fd.append("workspace", ws);
        fd.append("sourceId", String(sid));
        for (const f of files) {
          if (/\.(png|jpe?g|jfif|gif|bmp|webp|tiff?)$/i.test(f.name)) fd.append("files", f);
        }
        try {
          const r = await fetch("/api/upload/source", { method: "POST", body: fd });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error || "上傳失敗");
          setCfg((c) => ({
            ...c,
            sources: c.sources.map((s) => {
              if (s.id !== sid) return s;
              const next = { ...s, folder: j.folder, files: j.files };
              // 每次上傳都把名稱更新成「實際上傳的資料夾名」（否則換上傳別的資料夾時名稱會殘留舊的）
              if (detectedFolderName) next.name = detectedFolderName;
              return next;
            }),
          }));
          setStatus(`來源 ${detectedFolderName || src.name}: ${j.count} 張`);
        } catch (e) { setStatus("錯誤: " + e.message); }
      };

      const updateSource = (sid, patch) => {
        setCfg((c) => ({ ...c, sources: c.sources.map((s) => s.id === sid ? { ...s, ...patch } : s) }));
      };

      const addSource = () => {
        setCfg((c) => {
          const nextId = (c.sources.reduce((m, s) => Math.max(m, s.id), 0)) + 1;
          const usedNames = new Set(c.sources.map((s) => s.name));
          let name = String.fromCharCode(65 + c.sources.length);
          while (usedNames.has(name)) name = String.fromCharCode(name.charCodeAt(0) + 1);
          // 給個跟前一來源錯開的預設欄
          const usedCols = new Set(c.sources.map((s) => s.targetCol));
          let col = "F";
          while (usedCols.has(col)) col = String.fromCharCode(col.charCodeAt(0) + 1);
          return {
            ...c, sources: [...c.sources, {
              id: nextId, name, folder: "", files: [], targetCol: col,
              crop: { enabled: false, left: 0, top: 0, right: 1, bottom: 1 },
            }],
          };
        });
      };

      const removeSource = (sid) => {
        pushHistory?.("移除來源");
        setCfg((c) => ({ ...c, sources: c.sources.filter((s) => s.id !== sid) }));
      };

      return (
        <div className="space-y-3">
          {/* SN 欄選擇：範本 SN 欄不一定在第一欄 → 讓使用者指定 */}
          {(snColOptions || []).length > 1 && (
            <div className="border rounded-lg p-2 bg-purple-50/50 flex items-center gap-2">
              <span className="text-xs font-medium text-purple-900 shrink-0">SN 欄</span>
              <select value={Math.min(cfg.snColPick || 1, snColOptions.length)}
                onChange={(e) => setCfg((c) => ({ ...c, snColPick: parseInt(e.target.value) || 1 }))}
                className="flex-1 border rounded px-2 py-1 text-xs bg-white">
                {snColOptions.map((o) => <option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            </div>
          )}
          {/* SN 來源（手動提供） */}
          <div className="border rounded-lg p-2 bg-purple-50/50">
            <div className="text-sm font-medium text-purple-900 mb-2">SN 清單來源</div>
            {/* 模式選擇：範本有 SN 值 → 鎖「讀範本欄」、停用手動；沒有 → 反之 */}
            <div className="grid grid-cols-3 gap-1 mb-2 text-[11px]">
              {[["keyin", "直接輸入"], ["range", "範圍"], ["templateCol", "依範本 SN"]].map(([m, label]) => {
                const disabled = m === "templateCol" ? !templateHasSn : templateHasSn;
                return (
                  <button key={m} disabled={disabled}
                    onClick={() => !disabled && setCfg((c) => ({ ...c, snInput: { ...c.snInput, mode: m } }))}
                    title={disabled ? (m === "templateCol" ? "範本未定義 SN（資料區留空）" : "範本已定義 SN → 用「依範本 SN」") : ""}
                    className={`rounded py-1 border ${cfg.snInput.mode === m ? "bg-purple-600 text-white border-purple-700" : "bg-white text-slate-600 hover:bg-purple-100"} ${disabled ? "opacity-40 cursor-not-allowed" : ""}`}>
                    {label}
                  </button>
                );
              })}
            </div>

            {cfg.snInput.mode === "templateCol" && (
              <div className="text-[11px] text-slate-600 space-y-1">
                <div>已讀取範本 SN 欄{tmplSnColLabel ? `（${tmplSnColLabel}）` : ""}：共 <b>{templateSns.length}</b> 個。</div>
                <div className="font-mono text-[10px] bg-white border rounded px-2 py-1 max-h-24 overflow-auto">
                  {templateSns.map((s) => s.sn).join(", ")}
                </div>
                <div className="text-[10px] text-slate-400">由範本 SN 欄自動帶入；要手動指定 SN 請改用「資料區留空」的範本。</div>
              </div>
            )}

            {cfg.snInput.mode === "keyin" && (
              <div className="space-y-1">
                <textarea value={cfg.snInput.text} rows={3}
                  onChange={(e) => setCfg((c) => ({ ...c, snInput: { ...c.snInput, text: e.target.value } }))}
                  placeholder="10B-1, 10B-2, 10B-3 …（逗號 / 空白 / 換行分隔）"
                  className="w-full border rounded px-2 py-1 text-xs font-mono" />
              </div>
            )}

            {cfg.snInput.mode === "range" && (
              <div className="space-y-1">
                <label className="flex flex-col text-[11px] text-slate-600">
                  <span className="mb-0.5">樣板（# 代表編號）</span>
                  <input value={cfg.snInput.prefix}
                    onChange={(e) => setCfg((c) => ({ ...c, snInput: { ...c.snInput, prefix: e.target.value } }))}
                    placeholder="10B-#" className="border rounded px-2 py-1 text-sm font-mono" />
                </label>
                <div className="grid grid-cols-3 gap-1">
                  <label className="flex flex-col text-[11px] text-slate-600"><span className="mb-0.5">起</span>
                    <input type="number" value={cfg.snInput.from}
                      onChange={(e) => setCfg((c) => ({ ...c, snInput: { ...c.snInput, from: parseInt(e.target.value) || 1 } }))}
                      className="border rounded px-2 py-1 text-sm" /></label>
                  <label className="flex flex-col text-[11px] text-slate-600"><span className="mb-0.5">迄</span>
                    <input type="number" value={cfg.snInput.to}
                      onChange={(e) => setCfg((c) => ({ ...c, snInput: { ...c.snInput, to: parseInt(e.target.value) || 1 } }))}
                      className="border rounded px-2 py-1 text-sm" /></label>
                  <label className="flex flex-col text-[11px] text-slate-600" title="編號總位數：1=不補零(10B-1)、2=10B-01、3=10B-001"><span className="mb-0.5">位數</span>
                    <input type="number" min="1" value={cfg.snInput.pad}
                      onChange={(e) => setCfg((c) => ({ ...c, snInput: { ...c.snInput, pad: Math.max(1, parseInt(e.target.value) || 1) } }))}
                      className="border rounded px-2 py-1 text-sm" /></label>
                </div>
                {String(cfg.snInput.prefix).includes("#") && (
                  <div className="text-[10px] text-slate-400 font-mono">
                    例：{String(cfg.snInput.prefix).replace(/#/g, String(cfg.snInput.from).padStart(Math.max(1, parseInt(cfg.snInput.pad) || 1), "0"))}
                    {" … "}
                    {String(cfg.snInput.prefix).replace(/#/g, String(cfg.snInput.to).padStart(Math.max(1, parseInt(cfg.snInput.pad) || 1), "0"))}
                  </div>
                )}
              </div>
            )}


            {snList.length > 0 && (
              <div className="text-[10px] text-slate-600 mt-2">
                目前 <b>{snList.length}</b> 個 SN：
                <span className="font-mono">{snList.slice(0, 4).map((s) => s.sn).join(", ")}{snList.length > 4 ? ` … (+${snList.length - 4})` : ""}</span>
              </div>
            )}
          </div>

          {/* 來源列表 */}
          <div className="border rounded-lg p-2">
            <div className="text-sm font-medium text-slate-700 mb-2">資料來源 ({cfg.sources.length})</div>
            {isSlides && (
              <div className="text-[10px] text-slate-500 bg-slate-50 border rounded px-2 py-1 mb-2">
                已辨識範本表格：<b>{slidesSnInfo.ncols || slidesSnInfo.headers.length + 1} 欄 × {slidesTblRows(slidesSnInfo)} 列</b>
                · SN 在第 <b>{slidesSnInfo.snCol}</b> 欄、資料從第 <b>{slidesSnInfo.snRowStart}</b> 列起
                {headers.length > 0 && <> · 可對應欄：<span className="font-mono">{headers.join(" / ")}</span></>}
              </div>
            )}
            <div className="space-y-2">
              {cfg.sources.map((s) => (
                <div key={s.id} className="border rounded p-2 bg-white">
                  <div className="flex items-center gap-1 mb-1">
                    {isSlides ? (
                      <>
                        <span className="text-[10px] text-slate-500">對應欄</span>
                        <select value={s.slidesCol || ""}
                          onChange={(e) => updateSource(s.id, { slidesCol: e.target.value })}
                          className="border rounded px-1 py-0.5 text-xs flex-1 min-w-0">
                          <option value="">（自動：依資料夾名）</option>
                          {headers.map((h) => <option key={h} value={h}>{h}</option>)}
                        </select>
                        {(() => {
                          // 手選 → 藍色徽章（固定，不受資料夾名影響）
                          if (s.slidesCol) return (
                            <span className="text-[11px] font-semibold px-1.5 py-0.5 rounded bg-sky-100 text-sky-700 border border-sky-300 whitespace-nowrap"
                              title="手動指定的欄位（固定，不依資料夾名）">→ {s.slidesCol} 欄</span>
                          );
                          // 未上傳資料夾 → 還不判斷（避免拿預設名亂分配）
                          if (!s.files?.length) return (
                            <span className="text-[10px] text-slate-400 whitespace-nowrap">（上傳後依資料夾名判斷）</span>
                          );
                          const auto = autoHeader(s.name);
                          return auto ? (
                            <span className="text-[11px] font-semibold px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700 border border-emerald-300 whitespace-nowrap"
                              title={`資料夾「${s.name}」自動對到表頭「${auto}」欄（需完全相符；要固定請改下拉手選）`}>
                              → {auto} 欄
                            </span>
                          ) : (
                            <span className="text-[11px] font-semibold px-1.5 py-0.5 rounded bg-amber-100 text-amber-700 border border-amber-300 whitespace-nowrap"
                              title={`資料夾「${s.name}」對不到任何表頭欄（需與 Before/After… 完全相符）→ 不會貼圖、匯出會被擋下；請改下拉手選欄位`}>
                              ⚠ 對不到欄
                            </span>
                          );
                        })()}
                      </>
                    ) : (
                      <>
                        <span className="text-[10px] text-slate-500">寫入欄</span>
                        <input value={s.targetCol}
                          onChange={(e) => updateSource(s.id, { targetCol: e.target.value.toUpperCase() })}
                          className="border rounded px-1.5 py-0.5 text-xs font-mono w-12" />
                      </>
                    )}
                    <button onClick={() => removeSource(s.id)}
                      className="ml-auto text-slate-400 hover:text-red-600 text-xs">✕</button>
                  </div>
                  <button
                    onClick={() => inputRefs.current[s.id]?.click()}
                    title={s.files?.length ? s.name : "點擊選擇資料夾"}
                    className="w-full border rounded px-2 py-1 text-xs text-left truncate hover:bg-slate-50">
                    📤 {s.files?.length ? `${s.name} (${s.files.length} 張)` : "上傳資料夾…"}
                  </button>
                  <input ref={(el) => { inputRefs.current[s.id] = el; }}
                    type="file" multiple webkitdirectory="" directory="" className="hidden"
                    onChange={(e) => uploadSource(s.id, Array.from(e.target.files || []))} />
                </div>
              ))}
              <button onClick={addSource}
                className="w-full border border-dashed border-purple-300 text-purple-700 rounded py-1 text-xs hover:bg-purple-50">
                + 新增來源
              </button>
            </div>
          </div>
        </div>
      );
    }

    // 分段點選的 SN 設定 UI：分隔符 + 各段角色 chip + 即時抽取預覽 + 命中統計
    function SnPatternPicker({ cfgLabel, autoAlign, setCfg, firstFile, allFiles, perColCrop, onOpenIdxCrop, headerOrder, pushHistory }) {
      const DELIMS = [
        { v: "-", label: "-" },
        { v: "_", label: "_" },
        { v: ".", label: "." },
        { v: " ", label: "空白" },
      ];

      const delim = cfgLabel.delim || "-";
      const firstStem = firstFile ? (firstFile.name || "").replace(/\.[^./]+$/, "") : "";
      const segs = firstStem ? firstStem.split(delim) : [];
      // roles 對齊長度；缺值補 skip
      const roles = (cfgLabel.roles || []).slice(0, segs.length);
      while (roles.length < segs.length) roles.push("skip");

      const snIdx = roles.indexOf("sn");
      const idxIdx = roles.indexOf("idx");

      // ── 依位置模式（無分隔符，固定取前 N 個字當 SN）──
      const splitMode = cfgLabel.splitMode || "delim";
      // 預設切點：字母/數字邊界（結尾連續數字之前）→ SN 長度
      const autoPos = (() => {
        const m = firstStem.match(/^(.*?)(\d+)$/);
        if (m && m[1].length) return m[1].length;
        return Math.max(1, Math.ceil((firstStem.length || 2) / 2));
      })();
      const posMax = Math.max(1, (firstStem.length || 1) - 1);
      const posN = Math.max(1, Math.min(posMax, cfgLabel.splitPos ?? autoPos));
      const buildPosPattern = (n) => (autoAlign ? `{group:${n}}{idx}` : `{group:${n}}{skip}`);

      // 沒勾「依檔名對位」時，idx 角色視為 skip（既不出現在 pattern、也不擋 SN 選取）
      const effRole = (i) => {
        const r = roles[i] || "skip";
        if (r === "idx" && !autoAlign) return "skip";
        return r;
      };

      const buildPattern = (rs) =>
        segs.map((_, i) => {
          let r = rs[i] || "skip";
          if (r === "idx" && !autoAlign) r = "skip";
          return r === "sn" ? "{group}" : r === "idx" ? "{idx}" : "{skip}";
        }).join(delim);

      const updateLabel = (patch) =>
        setCfg((c) => ({ ...c, label: { ...c.label, ...patch } }));

      // 檔案 / 分隔符 變動時自動同步 pattern + roles 長度（僅依分隔符模式）
      useEffect(() => {
        if (cfgLabel.rawMode || splitMode === "pos") return;
        if (!segs.length) return;
        const targetPattern = buildPattern(roles);
        const rolesChanged = (cfgLabel.roles || []).length !== roles.length;
        if (targetPattern !== cfgLabel.pattern || rolesChanged) {
          updateLabel({ pattern: targetPattern, roles });
        }
      }, [firstStem, delim, cfgLabel.rawMode, autoAlign, splitMode]);

      // 依位置模式：保持 pattern = {group:N}{idx|skip}
      useEffect(() => {
        if (splitMode !== "pos" || !firstStem) return;
        const want = buildPosPattern(posN);
        if (want !== cfgLabel.pattern || cfgLabel.splitPos == null) {
          updateLabel({ splitPos: posN, pattern: want });
        }
      }, [splitMode, posN, autoAlign, firstStem]);

      // SN 列：點 chip = 設為 SN；點已選的 = 取消；該段已是 idx (且對位啟用中) 則禁用
      const toggleSn = (i) => {
        if (effRole(i) === "idx") return;
        const newRoles = roles.map((r) => (r === "sn" ? "skip" : r));
        if (roles[i] !== "sn") newRoles[i] = "sn";
        updateLabel({ roles: newRoles, pattern: buildPattern(newRoles), rawMode: false });
      };

      // idx 列：點 chip = 設為 idx；點已選的 = 取消；該段已是 SN 則禁用
      const toggleIdx = (i) => {
        if (effRole(i) === "sn") return;
        const newRoles = roles.map((r) => (r === "idx" ? "skip" : r));
        if (roles[i] !== "idx") newRoles[i] = "idx";
        updateLabel({ roles: newRoles, pattern: buildPattern(newRoles), rawMode: false });
      };

      const onDelimChange = (d) => {
        const newSegs = firstStem ? firstStem.split(d) : [];
        // 預設第 1 段 = sn，第 2 段 = idx
        const newRoles = newSegs.map((_, i) => (i === 0 ? "sn" : i === 1 ? "idx" : "skip"));
        const pattern = newSegs.map((_, i) =>
          newRoles[i] === "sn" ? "{group}" : newRoles[i] === "idx" ? "{idx}" : "{skip}"
        ).join(d);
        updateLabel({ delim: d, roles: newRoles, pattern, rawMode: false });
      };

      const switchMode = (mode) => {
        if (mode === splitMode) return;
        if (mode === "pos") {
          const n = cfgLabel.splitPos ?? autoPos;
          updateLabel({ splitMode: "pos", splitPos: n, pattern: buildPosPattern(n), rawMode: false });
        } else {
          updateLabel({ splitMode: "delim", pattern: buildPattern(roles), rawMode: false });
        }
      };
      const setPos = (n) => {
        const v = Math.max(1, Math.min(posMax, n));
        updateLabel({ splitMode: "pos", splitPos: v, pattern: buildPosPattern(v) });
      };

      const hasSn = splitMode === "pos" ? !!firstStem : snIdx >= 0;
      const preview = firstFile && hasSn ? tryExtract(firstFile.name, cfgLabel.pattern) : null;

      let okCount = 0;
      if (hasSn && allFiles && allFiles.length) {
        for (const f of allFiles) if (tryExtract(f.name, cfgLabel.pattern)) okCount++;
      }
      const total = (allFiles || []).length;

      const CHIP_CLS = {
        sn:   { sel: "bg-emerald-500 border-emerald-600 text-white ring-2 ring-emerald-200",
                idle: "bg-white border-slate-300 text-slate-700 hover:bg-emerald-50" },
        idx:  { sel: "bg-sky-500 border-sky-600 text-white ring-2 ring-sky-200",
                idle: "bg-white border-slate-300 text-slate-700 hover:bg-sky-50" },
      };
      const DISABLED_CLS = "bg-slate-100 border-slate-200 text-slate-400 cursor-not-allowed line-through";

      const ChipRow = ({ selectedIdx, onPick, kind }) => (
        <div className="flex flex-wrap gap-1">
          {segs.map((s, i) => {
            const isSel = selectedIdx === i;
            // 該段被另一角色佔走 → disable
            const eff = effRole(i);
            const takenBy = eff === "sn" && kind === "idx" ? "SN"
                          : eff === "idx" && kind === "sn" ? "對位"
                          : null;
            const cls = takenBy
              ? DISABLED_CLS
              : (isSel ? CHIP_CLS[kind].sel : CHIP_CLS[kind].idle);
            return (
              <button key={i}
                disabled={!!takenBy}
                title={takenBy ? `此段已被「${takenBy}」選用` : ""}
                onClick={() => onPick(i)}
                className={`px-3 py-1.5 rounded border text-xs font-mono ${cls}`}>
                {s || <span className="opacity-50">(空)</span>}
              </button>
            );
          })}
        </div>
      );

      return (
        <div className="space-y-3">
          {/* 「依位置」模式 UI 暫時隱藏 (code 保留)；分群一律走依分隔符 */}
          {splitMode !== "pos" && (
            <div className="flex items-center gap-2">
              <span className="text-xs text-slate-600">分隔符</span>
              <div className="flex border rounded overflow-hidden text-xs">
                {DELIMS.map((d) => (
                  <button key={d.v}
                    onClick={() => onDelimChange(d.v)}
                    className={`px-2 py-0.5 ${delim === d.v ? "bg-slate-700 text-white" : "hover:bg-slate-100"}`}>
                    {d.label}
                  </button>
                ))}
              </div>
            </div>
          )}

          {!firstFile ? (
            <div className="text-xs text-slate-400 border rounded p-2 bg-slate-50">
              請先上傳圖片，再設定 SN 取法
            </div>
          ) : splitMode === "pos" ? (
            <>
              <div>
                <div className="text-xs text-slate-700 mb-1">
                  <b>SN 取前幾個字？</b>
                  <span className="text-[10px] text-slate-400 ml-1">範例 <span className="font-mono">{firstFile.name}</span></span>
                </div>
                {/* 視覺化切點：綠=SN，藍=其餘（對位數字） */}
                <div className="flex flex-wrap items-center gap-0.5 font-mono text-sm mb-2 select-none">
                  {firstStem.split("").map((ch, i) => (
                    <React.Fragment key={i}>
                      {i === posN && <span className="inline-block w-1 bg-rose-500 rounded" style={{ height: "1.4em" }} title="切點"></span>}
                      <span className={`px-1 py-0.5 rounded ${i < posN ? "bg-emerald-100 text-emerald-800" : "bg-sky-100 text-sky-800"}`}>{ch === " " ? "␣" : ch}</span>
                    </React.Fragment>
                  ))}
                </div>
                <div className="flex items-center gap-2 mb-2">
                  <span className="text-xs text-slate-600">SN 取前</span>
                  <button onClick={() => setPos(posN - 1)} className="border rounded w-6 h-6 text-sm hover:bg-slate-100">−</button>
                  <span className="font-mono text-sm w-6 text-center">{posN}</span>
                  <button onClick={() => setPos(posN + 1)} className="border rounded w-6 h-6 text-sm hover:bg-slate-100">+</button>
                  <span className="text-xs text-slate-600">個字</span>
                  <button onClick={() => setPos(autoPos)} className="ml-2 text-[10px] px-2 py-0.5 border rounded text-slate-600 hover:bg-slate-100" title="字母/數字邊界自動偵測">自動 ({autoPos})</button>
                </div>
                <div className="text-xs p-2 border rounded bg-emerald-50">
                  抽出 SN：<b className="font-mono text-emerald-800">{preview ? preview.group : "(無法抽出)"}</b>
                  {autoAlign && <span className="ml-3">對位欄：<b className="font-mono text-sky-800">{preview && preview.idx != null ? preview.idx : "(無)"}</b></span>}
                  <div className="text-[10px] text-slate-500 mt-0.5">
                    {okCount === total
                      ? `全部 ${total} 個檔案皆可抽出 ✓`
                      : `${okCount} / ${total} 個檔案可抽出${okCount < total ? "（其餘以原檔名顯示）" : ""}`}
                  </div>
                </div>
              </div>
              {autoAlign && (
                <div className="pt-2 border-t bg-sky-50 -mx-1 px-2 py-2 rounded space-y-2">
                  <div className="text-xs text-sky-800 font-semibold">🎯 對位欄位（切點後的數字自動展開）</div>
                  <IdxColumnsEditor
                    label={cfgLabel}
                    allFiles={allFiles}
                    updateLabel={updateLabel}
                    perColCrop={perColCrop}
                    onOpenIdxCrop={onOpenIdxCrop}
                    headerOrder={headerOrder}
                    pushHistory={pushHistory}
                  />
                </div>
              )}
            </>
          ) : (
            <>
              <div>
                <div className="text-xs text-slate-700 mb-1">
                  <b>SN 取哪一段？</b>
                  <span className="text-[10px] text-slate-400 ml-1">範例 <span className="font-mono">{firstFile.name}</span></span>
                </div>
                <ChipRow selectedIdx={snIdx} onPick={toggleSn} kind="sn" />

                {hasSn ? (
                  <div className="text-xs mt-2 p-2 border rounded bg-emerald-50">
                    抽出 SN：<b className="font-mono text-emerald-800">{preview ? preview.group : "(無法抽出)"}</b>
                    <div className="text-[10px] text-slate-500 mt-0.5">
                      {okCount === total
                        ? `全部 ${total} 個檔案皆可抽出 ✓`
                        : `${okCount} / ${total} 個檔案可抽出${okCount < total ? "（其餘以原檔名顯示）" : ""}`}
                    </div>
                  </div>
                ) : (
                  <div className="text-xs mt-2 p-2 border border-amber-300 rounded bg-amber-50 text-amber-800">
                    ⚠ 尚未選 SN — 請點選上方任一段
                  </div>
                )}
              </div>

              {autoAlign && (
                <div className="pt-2 border-t bg-sky-50 -mx-1 px-2 py-2 rounded space-y-2">
                  <div>
                    <div className="text-xs text-sky-800 mb-1 font-semibold">🎯 對位用哪一段？</div>
                    <ChipRow selectedIdx={idxIdx} onPick={toggleIdx} kind="idx" />
                    {idxIdx >= 0 ? (
                      <div className="text-[10px] text-slate-600 mt-1">
                        該段內容將自動展開成欄位（見下方）
                      </div>
                    ) : (
                      <div className="text-[10px] text-amber-700 mt-1">
                        ⚠ 對位模式已啟用但未選欄位段 — 對位將無效
                      </div>
                    )}
                  </div>
                  {idxIdx >= 0 && (
                    <IdxColumnsEditor
                      label={cfgLabel}
                      allFiles={allFiles}
                      updateLabel={updateLabel}
                      perColCrop={perColCrop}
                      onOpenIdxCrop={onOpenIdxCrop}
                      headerOrder={headerOrder}
                      pushHistory={pushHistory}
                    />
                  )}
                </div>
              )}
            </>
          )}

        </div>
      );
    }

    // 視覺化裁剪 modal：拖一個矩形、回傳相對比例
    function CropEditor({ file, initial, onApply, onCancel }) {
      const imgRef = useRef(null);
      const boxRef = useRef(null);
      // 依圖片實際尺寸 + 視窗算出顯示寬，讓小圖也放大填滿（否則 250px 小圖視窗會很小）
      const [dispW, setDispW] = useState(null);
      const onImgLoad = (e) => {
        const nW = e.target.naturalWidth, nH = e.target.naturalHeight;
        if (!nW || !nH) return;
        const maxW = window.innerWidth * 0.8, maxH = window.innerHeight * 0.7;
        const scale = Math.min(maxW / nW, maxH / nH);   // 可 >1 → 放大小圖
        setDispW(Math.round(nW * scale));
      };
      const [box, setBox] = useState(() => {
        const ini = initial || { left: 0.15, top: 0.15, right: 0.85, bottom: 0.85, enabled: false };
        return ini.enabled
          ? { left: ini.left, top: ini.top, right: ini.right, bottom: ini.bottom }
          : { left: 0.15, top: 0.15, right: 0.85, bottom: 0.85 };
      });
      const dragRef = useRef(null);   // { mode: 'new'|'move'|'l'|'r'|'t'|'b'|'tl'|..., startX, startY, startBox }

      // 鍵盤快捷：Enter = 套用、Esc = 關閉
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            onApply({ enabled: true, ...box });
          } else if (e.key === "Escape") {
            e.preventDefault();
            onCancel();
          }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [box, onApply, onCancel]);

      const getRel = (e) => {
        const el = boxRef.current;
        if (!el) return [0, 0];
        const rect = el.getBoundingClientRect();
        return [
          Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)),
          Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height)),
        ];
      };

      const onPointerDown = (e, mode) => {
        e.preventDefault();
        e.stopPropagation();
        const [x, y] = getRel(e);
        dragRef.current = { mode, startX: x, startY: y, startBox: { ...box } };
        if (mode === "new") {
          setBox({ left: x, top: y, right: x, bottom: y });
        }
        const onMove = (ev) => {
          const d = dragRef.current;
          if (!d) return;
          const [nx, ny] = getRel(ev);
          const sb = d.startBox;
          let nb = { ...box };
          if (d.mode === "new") {
            nb = {
              left: Math.min(d.startX, nx), top: Math.min(d.startY, ny),
              right: Math.max(d.startX, nx), bottom: Math.max(d.startY, ny),
            };
          } else if (d.mode === "move") {
            const dx = nx - d.startX, dy = ny - d.startY;
            const w = sb.right - sb.left, h = sb.bottom - sb.top;
            let nl = Math.max(0, Math.min(1 - w, sb.left + dx));
            let nt = Math.max(0, Math.min(1 - h, sb.top + dy));
            nb = { left: nl, top: nt, right: nl + w, bottom: nt + h };
          } else {
            nb = { ...sb };
            if (d.mode.includes("l")) nb.left = Math.min(sb.right - 0.02, nx);
            if (d.mode.includes("r")) nb.right = Math.max(sb.left + 0.02, nx);
            if (d.mode.includes("t")) nb.top = Math.min(sb.bottom - 0.02, ny);
            if (d.mode.includes("b")) nb.bottom = Math.max(sb.top + 0.02, ny);
          }
          setBox(nb);
        };
        const onUp = () => {
          dragRef.current = null;
          window.removeEventListener("mousemove", onMove);
          window.removeEventListener("mouseup", onUp);
        };
        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onUp);
      };

      const pct = (v) => (v * 100).toFixed(1);
      const w = box.right - box.left;
      const h = box.bottom - box.top;

      const HANDLES = [
        { k: "tl", style: { left: 0, top: 0, cursor: "nwse-resize" } },
        { k: "tr", style: { right: 0, top: 0, cursor: "nesw-resize" } },
        { k: "bl", style: { left: 0, bottom: 0, cursor: "nesw-resize" } },
        { k: "br", style: { right: 0, bottom: 0, cursor: "nwse-resize" } },
        { k: "t",  style: { left: "50%", top: 0, transform: "translate(-50%, -50%)", cursor: "ns-resize" } },
        { k: "b",  style: { left: "50%", bottom: 0, transform: "translate(-50%, 50%)", cursor: "ns-resize" } },
        { k: "l",  style: { left: 0, top: "50%", transform: "translate(-50%, -50%)", cursor: "ew-resize" } },
        { k: "r",  style: { right: 0, top: "50%", transform: "translate(50%, -50%)", cursor: "ew-resize" } },
      ];

      return (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4"
          onClick={onCancel}>
          <div className="bg-white rounded-lg shadow-xl p-4 max-w-[90vw] max-h-[92vh] flex flex-col gap-3"
            onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between">
              <div className="text-sm font-semibold">✂️ 設定裁剪區域</div>
              <div className="text-[10px] text-slate-500 font-mono">
                L {pct(box.left)}% · T {pct(box.top)}% · R {pct(box.right)}% · B {pct(box.bottom)}% · {pct(w)}×{pct(h)}%
              </div>
            </div>
            <div className="text-[11px] text-slate-500">
              拖曳框內可移動 · 拖曳邊角縮放 · 拖曳框外重新框選
            </div>
            <div ref={boxRef}
              onMouseDown={(e) => onPointerDown(e, "new")}
              className="relative bg-slate-900 select-none w-fit mx-auto"
              style={{ maxHeight: "70vh", maxWidth: "80vw" }}>
              <img ref={imgRef}
                src={`/api/thumb?path=${encodeURIComponent(file.path)}&size=1600`}
                draggable={false} onLoad={onImgLoad}
                style={{ display: "block", width: dispW ? dispW : "auto", height: "auto", maxHeight: "70vh", maxWidth: "80vw", userSelect: "none", pointerEvents: "none" }} />
              {/* 暗化 4 個遮罩 */}
              <div className="absolute bg-black/55 pointer-events-none" style={{ left: 0, top: 0, right: 0, height: `${box.top * 100}%` }} />
              <div className="absolute bg-black/55 pointer-events-none" style={{ left: 0, bottom: 0, right: 0, height: `${(1 - box.bottom) * 100}%` }} />
              <div className="absolute bg-black/55 pointer-events-none" style={{ left: 0, top: `${box.top * 100}%`, width: `${box.left * 100}%`, height: `${h * 100}%` }} />
              <div className="absolute bg-black/55 pointer-events-none" style={{ right: 0, top: `${box.top * 100}%`, width: `${(1 - box.right) * 100}%`, height: `${h * 100}%` }} />
              {/* 裁剪框 */}
              <div
                onMouseDown={(e) => onPointerDown(e, "move")}
                className="absolute border-2 border-red-500 cursor-move"
                style={{
                  left: `${box.left * 100}%`,
                  top: `${box.top * 100}%`,
                  width: `${w * 100}%`,
                  height: `${h * 100}%`,
                }}>
                {HANDLES.map((H) => (
                  <div key={H.k}
                    onMouseDown={(e) => onPointerDown(e, H.k)}
                    className="absolute bg-red-500 border border-white"
                    style={{ width: 12, height: 12, ...H.style }} />
                ))}
              </div>
            </div>
            <div className="flex items-center gap-2 justify-end text-sm">
              <div className="text-[10px] text-slate-400 mr-auto">⏎ 套用 · Esc 關閉</div>
              <button onClick={() => setBox({ left: 0.15, top: 0.15, right: 0.85, bottom: 0.85 })}
                className="border rounded px-3 py-1 hover:bg-slate-100">重置框</button>
              <button onClick={() => onApply({ enabled: false, left: 0, top: 0, right: 1, bottom: 1 })}
                className="border rounded px-3 py-1 hover:bg-slate-100">取消裁剪</button>
              <button onClick={onCancel}
                className="border rounded px-3 py-1 hover:bg-slate-100">關閉 (Esc)</button>
              <button onClick={() => onApply({ enabled: true, ...box })}
                className="border rounded px-3 py-1 bg-emerald-600 text-white hover:bg-emerald-700">套用 (⏎)</button>
            </div>
          </div>
        </div>
      );
    }

    // 依檔名模式上傳後：先讓使用者 double-check 抽出的 idx 欄位，確認無誤再繼續
    function IdxConfirmModal({ data, onConfirm, onCancel }) {
      const confirmRef = useRef(null);
      const nIdx = data ? data.idxList.length : 0;
      // 開啟時把焦點移到「確認」鈕（否則焦點還停在剛觸發的 file input → 按 Enter 會再開檔案視窗）；
      //   並攔截 Enter=確認、Esc=取消。
      useEffect(() => {
        if (!data) return;
        if (confirmRef.current) confirmRef.current.focus();
        const onKey = (e) => {
          if (e.key === "Enter") { e.preventDefault(); if (nIdx > 0) onConfirm(); }
          else if (e.key === "Escape") { e.preventDefault(); onCancel(); }
        };
        document.addEventListener("keydown", onKey);
        return () => document.removeEventListener("keydown", onKey);
      }, [data, nIdx]);
      if (!data) return null;
      const { total, idxList, counts, groups, noIdx, caseDupes } = data;
      // 確認框的欄位 chip 依字母順序顯示（全數字 → 數值排）；僅影響此處顯示，不動實際對位欄序
      const sortedIdx = [...idxList].sort((a, b) =>
        idxList.every((x) => !isNaN(parseFloat(x)))
          ? parseFloat(a) - parseFloat(b)
          : a.localeCompare(b));
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick={onCancel}>
          <div className="bg-white rounded-xl shadow-2xl max-w-lg w-full max-h-[88vh] overflow-auto" onClick={(e) => e.stopPropagation()}>
